<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240">
  <defs>
    <!-- Background gradient: deep space blue -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="50%"  stop-color="#0f1f3d"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <!-- Glow effect for accent line -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e2d45" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="240" fill="url(#bg)"/>

  <!-- Subtle grid overlay -->
  <rect width="1200" height="240" fill="url(#grid)" opacity="0.4"/>

  <!-- Decorative left accent bar -->
  <rect x="0" y="0" width="4" height="240" fill="#3b82f6" opacity="0.9"/>

  <!-- Decorative right accent bar -->
  <rect x="1196" y="0" width="4" height="240" fill="#3b82f6" opacity="0.9"/>

  <!-- Circuit-like decorative lines — left side -->
  <g opacity="0.25" stroke="#3b82f6" stroke-width="1" fill="none">
    <polyline points="60,40 120,40 140,60 140,100"/>
    <polyline points="80,200 130,200 150,180 150,140"/>
    <circle cx="140" cy="100" r="3" fill="#3b82f6"/>
    <circle cx="150" cy="140" r="3" fill="#3b82f6"/>
    <circle cx="60" cy="40" r="2" fill="#3b82f6"/>
    <circle cx="80" cy="200" r="2" fill="#3b82f6"/>
  </g>

  <!-- Circuit-like decorative lines — right side -->
  <g opacity="0.25" stroke="#3b82f6" stroke-width="1" fill="none">
    <polyline points="1140,40 1080,40 1060,60 1060,100"/>
    <polyline points="1120,200 1070,200 1050,180 1050,140"/>
    <circle cx="1060" cy="100" r="3" fill="#3b82f6"/>
    <circle cx="1050" cy="140" r="3" fill="#3b82f6"/>
    <circle cx="1140" cy="40" r="2" fill="#3b82f6"/>
    <circle cx="1120" cy="200" r="2" fill="#3b82f6"/>
  </g>

  <!-- Kubernetes hexagon icon — simplified, left of center -->
  <g transform="translate(440, 120)" opacity="0.12">
    <polygon points="0,-44 38,-22 38,22 0,44 -38,22 -38,-22"
             fill="none" stroke="#60a5fa" stroke-width="2"/>
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14"
             fill="none" stroke="#60a5fa" stroke-width="1"/>
    <line x1="0" y1="-44" x2="0" y2="-28" stroke="#60a5fa" stroke-width="1"/>
    <line x1="38" y1="-22" x2="24" y2="-14" stroke="#60a5fa" stroke-width="1"/>
    <line x1="38" y1="22" x2="24" y2="14" stroke="#60a5fa" stroke-width="1"/>
    <line x1="0" y1="44" x2="0" y2="28" stroke="#60a5fa" stroke-width="1"/>
    <line x1="-38" y1="22" x2="-24" y2="14" stroke="#60a5fa" stroke-width="1"/>
    <line x1="-38" y1="-22" x2="-24" y2="-14" stroke="#60a5fa" stroke-width="1"/>
  </g>

  <!-- Server rack icon — right of center -->
  <g transform="translate(760, 100)" opacity="0.10" fill="none" stroke="#60a5fa" stroke-width="1.5">
    <rect x="-30" y="-50" width="60" height="100" rx="3"/>
    <rect x="-24" y="-42" width="48" height="12" rx="2"/>
    <rect x="-24" y="-24" width="48" height="12" rx="2"/>
    <rect x="-24" y="-6" width="48" height="12" rx="2"/>
    <rect x="-24" y="12" width="48" height="12" rx="2"/>
    <rect x="-24" y="30" width="48" height="12" rx="2"/>
    <circle cx="14" cy="-36" r="3" fill="#3b82f6" opacity="0.6"/>
    <circle cx="14" cy="-18" r="3" fill="#22c55e" opacity="0.6"/>
    <circle cx="14" cy="0" r="3" fill="#22c55e" opacity="0.6"/>
    <circle cx="14" cy="18" r="3" fill="#22c55e" opacity="0.6"/>
    <circle cx="14" cy="36" r="3" fill="#eab308" opacity="0.6"/>
  </g>

  <!-- Horizontal accent line -->
  <line x1="200" y1="168" x2="1000" y2="168" stroke="#1e3a5f" stroke-width="1" filter="url(#glow)"/>

  <!-- Main title -->
  <text x="600" y="95"
        font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="52"
        font-weight="700"
        fill="#f0f6fc"
        text-anchor="middle"
        letter-spacing="2">kagiso.me</text>

  <!-- Blue accent dot in title -->
  <circle cx="612" cy="76" r="5" fill="#3b82f6" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="600" y="140"
        font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="18"
        font-weight="400"
        fill="#6e9ecf"
        text-anchor="middle"
        letter-spacing="6">homelab · infrastructure</text>

  <!-- Tag line -->
  <text x="600" y="198"
        font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="12"
        fill="#3b6fa0"
        text-anchor="middle"
        letter-spacing="3">k3s · FluxCD · TrueNAS · Prometheus · SOPS</text>

  <!-- Corner dots -->
  <circle cx="20" cy="20" r="3" fill="#3b82f6" opacity="0.5"/>
  <circle cx="1180" cy="20" r="3" fill="#3b82f6" opacity="0.5"/>
  <circle cx="20" cy="220" r="3" fill="#3b82f6" opacity="0.5"/>
  <circle cx="1180" cy="220" r="3" fill="#3b82f6" opacity="0.5"/>
</svg>
