  <text x="70" y="56" fill="#f0f6fc" font-family="'SF Mono','Cascadia Code',monospace" font-size="24" font-weight="700">HA k3s topology</text>
  <text x="70" y="84" fill="#84a9d6" font-family="'SF Mono','Cascadia Code',monospace" font-size="13">All three physical nodes are k3s servers and schedulable workers. kube-vip keeps the API stable at 10.0.10.100.</text>

