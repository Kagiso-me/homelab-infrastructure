# =============================================================================
# Media Stack — Docker Compose
# Host: 10.0.10.20 | TrueNAS: 10.0.10.80
# User: kagiso (PUID=1000, PGID=1000) | TZ: Africa/Johannesburg
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in values
#   2. NFS mounts configured (/mnt/media, /mnt/downloads) — see Guide 02
#   3. Deploy this stack BEFORE proxy-stack (creates media-net network)
# =============================================================================

name: media-stack

networks:
  media-net:
    name: media-net
    driver: bridge
    # media-net is created by this stack and referenced as external by proxy-stack.yml
    # Deploy media-stack first, then proxy-stack.

services:

  # ---------------------------------------------------------------------------
  # Plex — Media server
  # Hardware transcoding via Intel VA-API (requires /dev/dri)
  # Web UI: http://10.0.10.20:32400/web
  # ---------------------------------------------------------------------------
  plex:
    image: lscr.io/linuxserver/plex:${PLEX_VERSION:-latest}
    container_name: plex
    restart: unless-stopped
    networks:
      - media-net
    ports:
      - "32400:32400"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Africa/Johannesburg}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM:-}
    volumes:
      - /srv/docker/appdata/plex:/config
      - /mnt/media:/media:ro
      - /srv/docker/appdata/plex/transcode:/transcode
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "render"
      - "video"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:32400/identity || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Sonarr — TV series management
  # Web UI: http://10.0.10.20:8989
  # ---------------------------------------------------------------------------
  sonarr:
    image: lscr.io/linuxserver/sonarr:${SONARR_VERSION:-latest}
    container_name: sonarr
    restart: unless-stopped
    networks:
      - media-net
    ports:
      - "8989:8989"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Africa/Johannesburg}
    volumes:
      - /srv/docker/appdata/sonarr:/config
      - /mnt/media:/media
      - /mnt/downloads:/downloads
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8989/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Radarr — Movie management
  # Web UI: http://10.0.10.20:7878
  # ---------------------------------------------------------------------------
  radarr:
    image: lscr.io/linuxserver/radarr:${RADARR_VERSION:-latest}
    container_name: radarr
    restart: unless-stopped
    networks:
      - media-net
    ports:
      - "7878:7878"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Africa/Johannesburg}
    volumes:
      - /srv/docker/appdata/radarr:/config
      - /mnt/media:/media
      - /mnt/downloads:/downloads
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:7878/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Lidarr — Music management
  # Web UI: http://10.0.10.20:8686
  # ---------------------------------------------------------------------------
  lidarr:
    image: lscr.io/linuxserver/lidarr:${LIDARR_VERSION:-latest}
    container_name: lidarr
    restart: unless-stopped
    networks:
      - media-net
    ports:
      - "8686:8686"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Africa/Johannesburg}
    volumes:
      - /srv/docker/appdata/lidarr:/config
      - /mnt/media:/media
      - /mnt/downloads:/downloads
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8686/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Prowlarr — Indexer manager
  # Web UI: http://10.0.10.20:9696
  # ---------------------------------------------------------------------------
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:${PROWLARR_VERSION:-latest}
    container_name: prowlarr
    restart: unless-stopped
    networks:
      - media-net
    ports:
      - "9696:9696"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Africa/Johannesburg}
    volumes:
      - /srv/docker/appdata/prowlarr:/config
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9696/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Overseerr — Media request management
  # Web UI: http://10.0.10.20:5055
  # ---------------------------------------------------------------------------
  overseerr:
    image: lscr.io/linuxserver/overseerr:${OVERSEERR_VERSION:-latest}
    container_name: overseerr
    restart: unless-stopped
    networks:
      - media-net
    ports:
      - "5055:5055"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Africa/Johannesburg}
    volumes:
      - /srv/docker/appdata/overseerr:/config
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:5055/api/v1/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # SABnzbd — Usenet download client
  # Web UI: http://10.0.10.20:8085
  # NOTE: Host port 8085 (not 8080) to avoid conflict with cAdvisor in monitoring-stack
  # ---------------------------------------------------------------------------
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:${SABNZBD_VERSION:-latest}
    container_name: sabnzbd
    restart: unless-stopped
    networks:
      - media-net
    ports:
      - "8085:8080"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Africa/Johannesburg}
    volumes:
      - /srv/docker/appdata/sabnzbd:/config
      - /mnt/downloads:/downloads
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/api?mode=version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Bazarr — Subtitle management
  # Web UI: http://10.0.10.20:6767
  # ---------------------------------------------------------------------------
  bazarr:
    image: lscr.io/linuxserver/bazarr:${BAZARR_VERSION:-latest}
    container_name: bazarr
    restart: unless-stopped
    networks:
      - media-net
    ports:
      - "6767:6767"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Africa/Johannesburg}
    volumes:
      - /srv/docker/appdata/bazarr:/config
      - /mnt/media:/media
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:6767/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Navidrome — Music streaming server (Subsonic-compatible)
  # Web UI: http://10.0.10.20:4533
  # ---------------------------------------------------------------------------
  navidrome:
    image: deluan/navidrome:${NAVIDROME_VERSION:-latest}
    container_name: navidrome
    restart: unless-stopped
    networks:
      - media-net
    ports:
      - "4533:4533"
    environment:
      - ND_SCANSCHEDULE=1h
      - ND_LOGLEVEL=info
      - ND_SESSIONTIMEOUT=24h
      - ND_BASEURL=
      - ND_LASTFM_APIKEY=${NAVIDROME_ND_LASTFM_APIKEY:-}
      - ND_LASTFM_SECRET=${NAVIDROME_ND_LASTFM_SECRET:-}
      - TZ=${TZ:-Africa/Johannesburg}
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - /srv/docker/appdata/navidrome:/data
      - /mnt/media/music:/music:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4533/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
