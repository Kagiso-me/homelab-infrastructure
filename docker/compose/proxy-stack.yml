# =============================================================================
# Proxy Stack — Docker Compose
# Nginx Proxy Manager — reverse proxy with automatic TLS (Let's Encrypt)
# Host: 10.0.10.20
#
# TLS Strategy:
#   NPM uses Let's Encrypt DNS-01 challenge via Cloudflare API to issue
#   valid certificates for *.kagiso.me subdomains. This eliminates browser
#   warnings on the LAN without exposing any ports to the internet.
#
#   Setup: NPM Admin UI → SSL Certificates → Add → Let's Encrypt
#     - Domain: *.kagiso.me
#     - Use DNS Challenge: Yes
#     - DNS Provider: Cloudflare
#     - API Token: (same Cloudflare token from Guide 00.5)
#
# Prerequisites:
#   1. media-stack must be running first (creates media-net network)
#   2. Cloudflare API token with Zone:Read + DNS:Edit for kagiso.me
# =============================================================================

name: proxy-stack

networks:
  media-net:
    external: true

services:

  # ---------------------------------------------------------------------------
  # Nginx Proxy Manager — Reverse proxy and TLS termination
  # Admin UI: http://10.0.10.20:81
  # Default login: admin@example.com / changeme (change immediately)
  # ---------------------------------------------------------------------------
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:${NPM_VERSION:-latest}
    container_name: nginx-proxy-manager
    restart: unless-stopped
    networks:
      - media-net
    ports:
      - "80:80"       # HTTP (redirects to HTTPS)
      - "81:81"       # Admin UI
      - "443:443"     # HTTPS
    environment:
      - DISABLE_IPV6=true
    volumes:
      - /srv/docker/appdata/npm/data:/data
      - /etc/letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:81/api || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
