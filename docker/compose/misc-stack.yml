# =============================================================================
# Misc Stack — Docker Compose
# Host: 10.0.10.20
#
# Miscellaneous self-hosted apps that don't belong in the media or platform
# stacks.
#
# Network: misc-net (internal) + host port exposure
# Prerequisites:
#   1. .env file at /srv/docker/compose/.env
# =============================================================================

name: misc-stack

networks:
  misc-net:
    name: misc-net
    driver: bridge

services:

  # ---------------------------------------------------------------------------
  # Open Dronelog — DJI/Litchi flight log analyzer
  # Web UI: http://10.0.10.20:8081
  # Data: /srv/docker/appdata/open-dronelog
  # Docs: https://github.com/arpanghosh8453/open-dronelog
  # ---------------------------------------------------------------------------
  open-dronelog:
    image: ghcr.io/arpanghosh8453/open-dronelog:3.2.2
    container_name: open-dronelog
    restart: unless-stopped
    networks:
      - misc-net
    ports:
      - "8081:80"
    environment:
      - DATA_DIR=/data/drone-logbook
      - KEEP_UPLOADED_FILES=true
    volumes:
      - /srv/docker/appdata/open-dronelog:/data/drone-logbook
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Ollama — local LLM inference engine (CPU)
  # API: http://10.0.10.20:11434
  # Models stored at: /srv/docker/appdata/ollama
  # Pull models: docker exec -it ollama ollama pull <model>
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    networks:
      - misc-net
    ports:
      - "11434:11434"
    volumes:
      - /srv/docker/appdata/ollama:/root/.ollama
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Open WebUI — ChatGPT-style UI for Ollama
  # Web UI: http://10.0.10.20:3000
  # Data: /srv/docker/appdata/open-webui
  # Docs: https://github.com/open-webui/open-webui
  # ---------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    networks:
      - misc-net
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - /srv/docker/appdata/open-webui:/app/backend/data
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
