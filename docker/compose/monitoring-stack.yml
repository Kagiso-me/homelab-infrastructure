# =============================================================================
# Monitoring Exporters — Docker Compose
# Host: docker (10.0.10.20) | TZ: Africa/Johannesburg
#
# Prometheus, Grafana, Loki, and Alertmanager have been decommissioned from
# this host. Monitoring is now consolidated into the k3s kube-prometheus-stack.
#
# This compose file runs lightweight exporters only:
#   - node-exporter  — host metrics scraped by k3s Prometheus
#   - cAdvisor       — Docker container metrics scraped by k3s Prometheus
#   - promtail       — ships Docker logs to k3s Loki
#
# Scrape targets are configured in:
#   platform/observability/kube-prometheus-stack/helmrelease.yaml
#
# Prerequisites:
#   1. k3s cluster running with kube-prometheus-stack deployed
#   2. Promtail config at /srv/docker/appdata/promtail/promtail-config.yml
#   3. Textfile collector directory: sudo mkdir -p /var/lib/node_exporter/textfile_collector
# =============================================================================

name: monitoring-exporters

services:

  # ---------------------------------------------------------------------------
  # Node Exporter — host hardware and OS metrics
  # Scraped by k3s Prometheus at 10.0.10.20:9100
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:${NODE_EXPORTER_VERSION:-latest}
    container_name: node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--collector.textfile.directory=/var/lib/node_exporter/textfile_collector"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /var/lib/node_exporter/textfile_collector:/var/lib/node_exporter/textfile_collector:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # cAdvisor — Docker container resource and performance metrics
  # Scraped by k3s Prometheus at 10.0.10.20:8080
  # ---------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_VERSION:-latest}
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    command:
      - "--housekeeping_interval=30s"
      - "--max_housekeeping_interval=35s"
      - "--event_storage_event_limit=default=0"
      - "--event_storage_age_limit=default=0"
      - "--disable_metrics=percpu,sched,tcp,udp,disk,diskIO,accelerator,hugetlb,referenced_memory,cpu_topology,resctrl"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Promtail — ships Docker container logs to k3s Loki
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:${PROMTAIL_VERSION:-latest}
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - /srv/docker/appdata/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /run/docker.sock:/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9080/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
