auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki

ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
  chunk_idle_period: 5m
  chunk_retain_period: 30s

schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: loki_index_
        period: 24h

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/boltdb-shipper-active
    cache_location: /loki/boltdb-shipper-cache
    shared_store: filesystem
  filesystem:
    directory: /loki/chunks

compactor:
  working_directory: /loki/compactor
  shared_store: filesystem
  retention_enabled: true
  retention_delete_delay: 2h

limits_config:
  retention_period: 336h   # 14 days
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  max_query_series: 5000
  max_query_lookback: 336h

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: http://alertmanager:9093
  enable_api: true

# Alerting rules are loaded from the ruler.storage.local.directory above.
# Place rule files under /loki/rules/<tenant_id>/<file>.yml
# For a single-tenant setup (auth_enabled: false) use the "fake" tenant directory:
#   /loki/rules/fake/alerts.yml
#
# The file below documents the expected content of that rules file.
# Copy it into the Loki data volume at the path shown above.
#
# ---
# groups:
#   - name: homelab-log-alerts
#     rules:
#
#       # Alert when any job emits more than 10 error-level log lines per minute
#       # sustained over a 5-minute window.  Covers all Promtail jobs (docker,
#       # system, backup, …).
#       - alert: HighLogErrorRate
#         expr: |
#           sum by (job, container) (
#             rate({job=~".+"} |~ "(?i)(error|err|critical|fatal|exception)" [5m])
#           ) * 60 > 10
#         for: 5m
#         labels:
#           severity: warning
#         annotations:
#           summary: "High error log rate detected ({{ $labels.job }}/{{ $labels.container }})"
#           description: >
#             Job {{ $labels.job }} / container {{ $labels.container }} is emitting
#             more than 10 error-level log lines per minute for the past 5 minutes.
#             Current rate: {{ $value | printf "%.1f" }}/min.
#
#       # Detect OOMKilled events in Kubernetes logs forwarded to Loki.
#       # Kubernetes writes "OOMKilled" into the reason field of pod events and
#       # into the container-status message; both typically surface in the kubelet
#       # or kube-system logs ingested from the k8s nodes.
#       - alert: KubernetesOOMKilled
#         expr: |
#           sum by (pod, namespace, node) (
#             count_over_time(
#               {job=~"kubernetes.*|k8s.*"} |~ "OOMKilled" [5m]
#             )
#           ) > 0
#         for: 0m
#         labels:
#           severity: critical
#         annotations:
#           summary: "OOMKilled detected in Kubernetes logs ({{ $labels.namespace }}/{{ $labels.pod }})"
#           description: >
#             Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} on node
#             {{ $labels.node }} was OOMKilled.  Check memory limits and container
#             resource usage immediately.
