---
# Prometheus configuration for homelab monitoring stack
#
# This Prometheus instance runs on the Docker media server (10.0.10.20) and is
# responsible for scraping all non-Kubernetes targets plus the k8s node-exporters
# as external hosts. Kubernetes internal metrics (pods, deployments, etc.) are
# handled by the kube-prometheus-stack instance running inside the cluster via
# ServiceMonitors. This instance federates or receives remote-write from that
# stack as needed, but primarily covers bare-metal and VM-level observability.
#
# Alertmanager is pre-configured with Slack routing:
#   #homelab-alerts   — severity: warning
#   #homelab-critical — severity: critical

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: homelab
    environment: production

# Rule files — alert definitions are split by concern into separate files.
rule_files:
  - /etc/prometheus/alerts/*.yml

# Alertmanager integration — the alertmanager container is on the same
# Docker Compose network and reachable by service name.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# ---------------------------------------------------------------------------
# Scrape configurations
# ---------------------------------------------------------------------------
scrape_configs:

  # ---------------------------------------------------------------------------
  # 1. prometheus — self-scrape
  #    Prometheus exposes its own metrics at /metrics on port 9090.
  #    Useful for tracking scrape durations, rule evaluation latency, TSDB
  #    cardinality, and WAL activity.
  # ---------------------------------------------------------------------------
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: prometheus

  # ---------------------------------------------------------------------------
  # 2. node-k8s-nodes — node-exporter on Kubernetes hosts (external scrape)
  #    The kube-prometheus-stack inside the cluster handles pod/deployment
  #    metrics via ServiceMonitors. This job scrapes the underlying Linux
  #    nodes directly at node-exporter's port so this Docker-hosted Prometheus
  #    also has host-level metrics (CPU, memory, disk, network) for the k8s
  #    machines.
  #
  #    Nodes:
  #      tywin  (10.0.10.11) — control plane
  #      jaime  (10.0.10.12) — worker
  #      tyrion (10.0.10.13) — worker
  #
  #    Relabeling replaces the default "<ip>:<port>" instance label with a
  #    human-readable hostname so dashboards and alerts use node names.
  # ---------------------------------------------------------------------------
  - job_name: node-k8s-nodes
    static_configs:
      - targets: ['10.0.10.11:9100']
        labels:
          instance: tywin
          role: control-plane
      - targets: ['10.0.10.12:9100']
        labels:
          instance: jaime
          role: worker
      - targets: ['10.0.10.13:9100']
        labels:
          instance: tyrion
          role: worker
    relabel_configs:
      # Preserve the instance label set in static_configs (already a hostname).
      # The default behaviour would overwrite it with __address__; keeping it
      # explicit here makes the intent clear and survives config refactors.
      - source_labels: [instance]
        target_label: instance

  # ---------------------------------------------------------------------------
  # 3. node-docker-host — node-exporter on the Docker media server (10.0.10.20)
  #    This host runs Jellyfin, Sonarr, Radarr, Prowlarr, Nginx Proxy Manager,
  #    and other media-stack containers. It also writes textfile metrics (backup
  #    timestamps, NFS mount health) into the node-exporter textfile directory.
  #    The textfile collector is enabled on the exporter itself; no special
  #    Prometheus config is required — the metrics appear automatically in the
  #    /metrics endpoint.
  # ---------------------------------------------------------------------------
  - job_name: node-docker-host
    static_configs:
      - targets: ['10.0.10.20:9100']
        labels:
          instance: docker-host

  # ---------------------------------------------------------------------------
  # 4. node-truenas — node-exporter on TrueNAS HP MicroServer (10.0.10.80)
  #    node-exporter is started with --collector.zfs and --collector.smartmon
  #    flags on this host to expose ZFS pool and vdev statistics alongside
  #    standard Linux metrics. The smartmon textfile collector reads
  #    smartmontools output and writes it into the textfile directory.
  #    Note: fine-grained SMART attribute data comes from smartctl-exporter
  #    (job: smartctl-truenas below); the smartmon textfile collector gives a
  #    quick pass/fail and temperature summary.
  # ---------------------------------------------------------------------------
  - job_name: node-truenas
    static_configs:
      - targets: ['10.0.10.80:9100']
        labels:
          instance: truenas

  # ---------------------------------------------------------------------------
  # 5. node-rpi — node-exporter on Raspberry Pi control hub (10.0.10.10)
  #    The RPi hosts cluster management tooling (kubectl, Flux CLI, scripts)
  #    and writes textfile metrics for its own backup job (SSH keys, GPG
  #    material, kubeconfig). SD card wear makes disk space more critical here
  #    than on other hosts — see RpiSDCard* alerts in infrastructure.yml.
  # ---------------------------------------------------------------------------
  - job_name: node-rpi
    static_configs:
      - targets: ['10.0.10.10:9100']
        labels:
          instance: rpi-control

  # ---------------------------------------------------------------------------
  # 6. cadvisor-docker — cAdvisor on Docker host (10.0.10.20:8080)
  #    cAdvisor exposes per-container CPU, memory, network I/O, and filesystem
  #    metrics. Used for container-level resource tracking and the
  #    DockerContainerDown / DockerContainerRestarting alerts.
  #
  #    Relabeling strips the cAdvisor-injected container_label_* labels down to
  #    a manageable set to control cardinality.
  # ---------------------------------------------------------------------------
  - job_name: cadvisor-docker
    static_configs:
      - targets: ['10.0.10.20:8080']
        labels:
          instance: docker-host
    # Keep only useful container labels; drop the rest to limit series cardinality.
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'container_(cpu|memory|network|fs|last_seen|start_time).*'
        action: keep
      # Drop system/pause containers that create noise without insight.
      - source_labels: [name]
        regex: 'k8s_.*|POD_.*'
        action: drop

  # ---------------------------------------------------------------------------
  # 7. smartctl-truenas — smartctl-exporter on TrueNAS (10.0.10.80:9633)
  #    smartctl-exporter (by Prometheus Community) polls each physical disk via
  #    smartctl and exposes detailed SMART attributes as Prometheus metrics.
  #    This gives per-attribute values (reallocated sectors, pending sectors,
  #    temperature, command timeouts, etc.) that feed the alerts in truenas.yml.
  #    The scrape_interval is lengthened to 5m because SMART polls are slow and
  #    spinning drives incur a slight seek penalty.
  # ---------------------------------------------------------------------------
  - job_name: smartctl-truenas
    scrape_interval: 5m
    scrape_timeout: 60s
    static_configs:
      - targets: ['10.0.10.80:9633']
        labels:
          instance: truenas

  # ---------------------------------------------------------------------------
  # 8. loki — scrape Loki's own internal metrics
  #    Loki is on the same Docker Compose network and reachable by service name.
  #    Useful for tracking ingest rate, chunk cache hit ratio, compactor lag,
  #    and query latency from the Loki side (complementing Grafana datasource
  #    health checks).
  # ---------------------------------------------------------------------------
  - job_name: loki
    static_configs:
      - targets: ['loki:3100']
        labels:
          instance: loki

  # ---------------------------------------------------------------------------
  # 9. traefik-k8s — Traefik ingress controller metrics
  #    Traefik runs inside the Kubernetes cluster and exposes a metrics endpoint
  #    on its dedicated metrics port. The kube-prometheus-stack can scrape this
  #    via a ServiceMonitor (preferred for in-cluster Prometheus). This job
  #    scrapes Traefik's metrics port as exposed via the LoadBalancer / NodePort
  #    at 10.0.10.110:9100 so this external Prometheus also has ingress data.
  #
  #    NOTE: If kube-prometheus-stack already covers Traefik via a ServiceMonitor
  #    and you are federating metrics here, disable this job to avoid duplicate
  #    series. Port 9100 is a placeholder — adjust to Traefik's actual metrics
  #    port (commonly 8082 or the value of --metrics.prometheus.entryPoint).
  # ---------------------------------------------------------------------------
  - job_name: traefik-k8s
    static_configs:
      - targets: ['10.0.10.110:9100']
        labels:
          instance: traefik
