---
# TrueNAS alert rules — ZFS pool health + SMART disk health
#
# Metrics sources:
#
#   node-exporter (job: node-truenas, port 9100)
#     Started with --collector.zfs to expose ZFS kernel statistics:
#       node_zfs_pool_state          — pool health state (ONLINE/DEGRADED/FAULTED etc.)
#       node_zfs_pool_scan_errors_*  — checksum, read, write errors from last scrub
#       node_zfs_pool_vdev_*         — per-vdev error counters
#
#   smartctl-exporter (job: smartctl-truenas, port 9633)
#     Exposes per-drive SMART attributes as labelled metrics:
#       smartctl_device_attribute{attribute_name="...", attribute_id="..."}
#       smartctl_device_smart_status  — overall SMART pass/fail (1=passed, 0=failed)
#       smartctl_device_info          — drive make/model metadata
#
# Key SMART attribute IDs to monitor:
#   ID 5   — Reallocated_Sector_Ct   (any non-zero value is a warning sign)
#   ID 10  — Spin_Retry_Count        (HDD spin-up failures; SSDs may not have this)
#   ID 190 — Airflow_Temperature_Cel (some drives; prefer ID 194)
#   ID 194 — Temperature_Celsius     (>50°C sustained = elevated risk)
#   ID 197 — Current_Pending_Sector  (sectors that may fail on next write)
#   ID 198 — Offline_Uncorrectable   (sectors that could not be corrected in offline scan)
#   ID 199 — UDMA_CRC_Error_Count    (cable/connection errors)
#
# Severity routing via Alertmanager:
#   warning  -> #homelab-alerts
#   critical -> #homelab-critical

groups:

  # ---------------------------------------------------------------------------
  # ZFS pool health
  #
  # node-exporter with --collector.zfs exposes node_zfs_pool_state as a gauge
  # with a "state" label. ONLINE=1, all others (DEGRADED, FAULTED, REMOVED,
  # UNAVAIL, SUSPENDED) map to non-1 values depending on the exporter version.
  #
  # The pattern below checks for non-ONLINE state by filtering on state!="ONLINE"
  # combined with the value being 1 (present/active). Adjust for your exporter.
  # ---------------------------------------------------------------------------
  - name: truenas.zfs_pool
    rules:

      - alert: ZFSPoolDegraded
        # node_zfs_pool_state{state="DEGRADED"} == 1 means the pool is online
        # but one or more drives have failed or been removed. The pool is still
        # serving data via RAID redundancy, but is no longer fault-tolerant.
        # Replace the failed vdev immediately before a second failure causes
        # data loss.
        expr: node_zfs_pool_state{state="DEGRADED"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ZFS pool {{ $labels.pool }} on TrueNAS is DEGRADED"
          description: >
            ZFS pool {{ $labels.pool }} has entered a DEGRADED state, meaning
            one or more constituent drives or vdevs have failed or been removed.
            The pool is still online and serving data (redundancy is absorbing
            the failure), but it is NO LONGER FAULT-TOLERANT. A second drive
            failure before replacement will result in data loss.

            Immediate actions:
            1. Open TrueNAS UI → Storage → Pools → inspect {{ $labels.pool }}
            2. Identify the faulted vdev and physical disk
            3. Replace the failed disk as soon as possible
            4. Monitor resilvering progress in the UI or with: zpool status {{ $labels.pool }}
          runbook: "https://wiki.homelab/runbooks/zfs-pool-degraded"

      - alert: ZFSPoolFaulted
        # FAULTED means the pool cannot serve data. This is a data-service
        # outage — all NFS exports from this pool are offline.
        expr: node_zfs_pool_state{state="FAULTED"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ZFS pool {{ $labels.pool }} on TrueNAS is FAULTED — data access lost"
          description: >
            ZFS pool {{ $labels.pool }} has entered a FAULTED state. This means
            the pool has lost so many drives that it can no longer serve data.
            ALL NFS exports from this pool (k8s-volumes, k8s-backups, media) are
            offline. Kubernetes PVCs will start failing and media services will
            lose access to storage.

            This is an urgent data-service outage. Investigate immediately:
            zpool status {{ $labels.pool }}
            Check TrueNAS UI → Storage for disk status and SMART test results.
          runbook: "https://wiki.homelab/runbooks/zfs-pool-faulted"

      - alert: ZFSPoolUnavail
        expr: node_zfs_pool_state{state="UNAVAIL"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ZFS pool {{ $labels.pool }} on TrueNAS is UNAVAIL"
          description: >
            ZFS pool {{ $labels.pool }} is in state UNAVAIL — it cannot be
            imported or accessed. This is typically caused by all constituent
            drives being removed, a power loss during a write that corrupted
            the pool's on-disk labels, or the pool being forcibly exported.
            Investigate with: zpool import and review TrueNAS system logs.
          runbook: "https://wiki.homelab/runbooks/zfs-pool-unavail"

      - alert: ZFSPoolScrubErrors
        # scrub_errors is the cumulative count of errors found during the most
        # recent completed scrub. Any non-zero value means the pool found data
        # that could not be repaired from redundancy — a sign of hardware
        # failure or silent data corruption.
        expr: node_zfs_pool_scan_errors_total > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "ZFS pool {{ $labels.pool }} scrub found {{ $value }} unrepaired errors"
          description: >
            The most recent scrub of ZFS pool {{ $labels.pool }} completed with
            {{ $value }} unrepaired checksum errors. These are sectors where ZFS
            detected corruption and was UNABLE to reconstruct the correct data
            from redundancy (parity was also corrupted or the pool has no
            redundancy).

            Unrepaired scrub errors mean data is silently corrupt. Actions:
            1. Run a fresh scrub to confirm: zpool scrub {{ $labels.pool }}
            2. Check SMART data for all drives in the pool
            3. Review which files are affected: zpool status -v {{ $labels.pool }}
            4. Restore affected files from backup if necessary
          runbook: "https://wiki.homelab/runbooks/zfs-scrub-errors"

      - alert: ZFSPoolChecksumErrors
        # Rising checksum error counters on a vdev indicate read corruption —
        # either a failing drive, a faulty SAS/SATA cable, or a HBA problem.
        # ZFS can correct these via redundancy (mirror/raidz) but sustained
        # errors indicate hardware that needs attention.
        expr: >
          increase(node_zfs_pool_vdev_read_errors_total[24h]) > 10
          or
          increase(node_zfs_pool_vdev_checksum_errors_total[24h]) > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "ZFS pool {{ $labels.pool }} has elevated vdev errors in the past 24h"
          description: >
            ZFS pool {{ $labels.pool }} vdev {{ $labels.vdev }} has accumulated
            more than 10 read or checksum errors in the past 24 hours
            (value: {{ $value }}). ZFS is correcting these from redundancy but
            the underlying device is showing signs of degradation.

            Actions:
            1. zpool status {{ $labels.pool }} — identify the specific vdev
            2. Check SMART data for the identified drive
            3. Replace the drive proactively if errors are increasing
          runbook: "https://wiki.homelab/runbooks/zfs-vdev-errors"

      - alert: ZFSScrubNotRun
        # ZFS scrubs should run weekly (configured in TrueNAS scheduled tasks).
        # If no scrub has completed in 10 days, something is wrong with the
        # schedule or scrub is failing to start.
        # node_zfs_pool_scan_end_time is the Unix timestamp of the last completed scan.
        expr: >
          time() - node_zfs_pool_scan_end_time > 10 * 24 * 3600
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "ZFS pool {{ $labels.pool }} has not been scrubbed in over 10 days"
          description: >
            The most recent completed scrub of ZFS pool {{ $labels.pool }} was
            {{ $value | humanizeDuration }} ago. TrueNAS should be configured
            to scrub weekly. Regular scrubs are essential for detecting and
            correcting silent data corruption before it becomes irrecoverable.

            Check the TrueNAS scheduled scrub task:
            UI → Data Protection → Scrub Tasks
          runbook: "https://wiki.homelab/runbooks/zfs-scrub-not-run"

  # ---------------------------------------------------------------------------
  # SMART disk health
  #
  # smartctl-exporter exposes individual SMART attributes using the metric:
  #   smartctl_device_attribute{
  #     device="/dev/sdX",
  #     attribute_name="Reallocated_Sector_Ct",
  #     attribute_id="5",
  #     type="raw"          ← or "normalized" or "worst"
  #   }
  #
  # We use type="raw" for the actual count values.
  # We use smartctl_device_smart_status for overall pass/fail.
  # ---------------------------------------------------------------------------
  - name: truenas.smart_health
    rules:

      - alert: DiskSMARTFailed
        # smartctl_device_smart_status == 0 means the drive has reported that
        # its SMART overall assessment is FAILED. This is the drive's own
        # self-assessment that it is likely to fail imminently. Replace NOW.
        expr: smartctl_device_smart_status == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SMART overall health FAILED on disk {{ $labels.device }} (TrueNAS)"
          description: >
            Drive {{ $labels.device }} on TrueNAS ({{ $labels.model_name }},
            serial: {{ $labels.serial_number }}) has reported a SMART overall
            health assessment of FAILED. This is the drive's own prediction that
            it will fail within 24 hours. Back up all data and replace this
            drive immediately.

            Verify with: smartctl -H {{ $labels.device }}
            Identify the drive's slot in the TrueNAS UI → Storage → Disks
          runbook: "https://wiki.homelab/runbooks/disk-smart-failed"

      - alert: DiskReallocatedSectors
        # ID 5 — Reallocated_Sector_Ct
        # Each reallocated sector means the drive silently moved data from a
        # failing sector to a spare. Any non-zero value means the drive has
        # experienced physical media damage. The drive will continue to work
        # until it runs out of spare sectors (Reallocated_Event_Count continues
        # to climb toward 0 for Current_Pending_Sector).
        # Alert immediately at any non-zero value as a warning.
        # Treat counts >10 as critical — the drive is failing.
        expr: >
          smartctl_device_attribute{attribute_name="Reallocated_Sector_Ct", type="raw"} > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Drive {{ $labels.device }} has {{ $value }} reallocated sectors (TrueNAS)"
          description: >
            SMART attribute Reallocated_Sector_Ct (ID 5) on drive {{ $labels.device }}
            ({{ $labels.model_name }}, serial: {{ $labels.serial_number }}) is
            {{ $value }}. A non-zero value means the drive has already encountered
            physical media damage and silently remapped those sectors to spare
            space. The drive is degraded.

            Monitor closely — if this count increases, replace the drive.
            Run a SMART extended test: smartctl -t long {{ $labels.device }}
            Check reallocated count trend over time in Grafana.
          runbook: "https://wiki.homelab/runbooks/disk-reallocated-sectors"

      - alert: DiskReallocatedSectorsCritical
        expr: >
          smartctl_device_attribute{attribute_name="Reallocated_Sector_Ct", type="raw"} > 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Drive {{ $labels.device }} has {{ $value }} reallocated sectors — imminent failure (TrueNAS)"
          description: >
            Drive {{ $labels.device }} ({{ $labels.model_name }}, serial:
            {{ $labels.serial_number }}) has accumulated {{ $value }} reallocated
            sectors. A count this high indicates significant and progressive media
            damage. Drive failure is likely imminent.

            Replace this drive now. Do NOT wait for the drive to fail outright —
            at this stage the ZFS pool's redundancy is your only protection.
            1. Identify the drive's bay in TrueNAS UI
            2. Order a replacement drive (same or larger size)
            3. Replace when available and allow ZFS to resilver
          runbook: "https://wiki.homelab/runbooks/disk-reallocated-sectors-critical"

      - alert: DiskPendingSectors
        # ID 197 — Current_Pending_Sector
        # Sectors that have been read with errors and are waiting to be
        # reallocated on the next successful write. If the write succeeds,
        # they are reallocated (ID 5 increases); if the read keeps failing,
        # they stay pending. Any non-zero value indicates active read errors.
        expr: >
          smartctl_device_attribute{attribute_name="Current_Pending_Sector", type="raw"} > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Drive {{ $labels.device }} has {{ $value }} pending sectors (TrueNAS)"
          description: >
            SMART attribute Current_Pending_Sector (ID 197) on drive
            {{ $labels.device }} ({{ $labels.model_name }}, serial:
            {{ $labels.serial_number }}) is {{ $value }}.

            Pending sectors are areas of the drive that produced read errors
            and are queued for reallocation. Until they are rewritten, they
            risk data loss on the next read. ZFS may be silently failing to
            read data from these sectors.

            Run a SMART extended test immediately: smartctl -t long {{ $labels.device }}
            Initiate a ZFS scrub on all pools: zpool scrub core && zpool scrub archive && zpool scrub tera
            If sectors do not clear after a scrub + write pass, replace the drive.
          runbook: "https://wiki.homelab/runbooks/disk-pending-sectors"

      - alert: DiskUncorrectableSectors
        # ID 198 — Offline_Uncorrectable
        # Sectors that were found to be unreadable during an offline test and
        # could NOT be remapped. These are sectors with confirmed, unrecoverable
        # data loss. Even a count of 1 means data has been permanently lost
        # from this sector (though ZFS may have recovered the data from a mirror).
        expr: >
          smartctl_device_attribute{attribute_name="Offline_Uncorrectable", type="raw"} > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Drive {{ $labels.device }} has {{ $value }} uncorrectable sectors — data loss risk (TrueNAS)"
          description: >
            SMART attribute Offline_Uncorrectable (ID 198) on drive {{ $labels.device }}
            ({{ $labels.model_name }}, serial: {{ $labels.serial_number }}) is
            {{ $value }}. These are sectors that failed during offline tests and
            could not be corrected. This represents a confirmed unrecoverable
            hardware error on this drive.

            ZFS may have already corrected any data-level errors through
            redundancy, but the drive's physical media is damaged. Replace
            this drive at the earliest opportunity.
          runbook: "https://wiki.homelab/runbooks/disk-uncorrectable-sectors"

      - alert: DiskTemperatureHigh
        # ID 194 — Temperature_Celsius (most drives) or ID 190 — Airflow_Temperature_Cel
        # For spinning hard drives:
        #   < 40°C  — normal operating range
        #   40–50°C — acceptable but elevated; check airflow
        #   > 50°C  — alarming; correlates with accelerated failure rates
        #   > 60°C  — danger zone; immediate cooling required
        # HP MicroServer Gen8 has limited airflow — temperatures can creep up.
        expr: >
          smartctl_device_attribute{attribute_name=~"Temperature_Celsius|Airflow_Temperature_Cel", type="raw"} > 50
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Drive {{ $labels.device }} temperature is {{ $value }}°C (TrueNAS)"
          description: >
            SMART temperature attribute on drive {{ $labels.device }}
            ({{ $labels.model_name }}, serial: {{ $labels.serial_number }})
            has been above 50°C for 15 minutes (current: {{ $value }}°C).

            Elevated drive temperatures significantly accelerate wear and
            increase failure probability. HP MicroServer Gen8 is compact —
            check that the front fan is running and not blocked, and that
            airflow through the drive bays is unobstructed.

            Verify: ipmitool sdr type Temperature (if IPMI is accessible)
          runbook: "https://wiki.homelab/runbooks/disk-temperature-high"

      - alert: DiskTemperatureCritical
        expr: >
          smartctl_device_attribute{attribute_name=~"Temperature_Celsius|Airflow_Temperature_Cel", type="raw"} > 60
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Drive {{ $labels.device }} temperature is critically high ({{ $value }}°C) — TrueNAS"
          description: >
            Drive {{ $labels.device }} ({{ $labels.model_name }}) has been at
            {{ $value }}°C for 5 minutes. This is above the safe operating
            threshold for virtually all hard drives. Drive failure due to
            thermal stress is likely if temperature is not reduced.

            Immediate action: check fans, airflow, and ambient temperature.
            If the temperature does not drop, consider shutting down TrueNAS
            and resolving the cooling issue before drives fail.
          runbook: "https://wiki.homelab/runbooks/disk-temperature-critical"

      - alert: DiskSpinRetryCount
        # ID 10 — Spin_Retry_Count
        # For spinning drives: each time the motor failed to spin up the drive
        # on the first attempt. Any non-zero value indicates a drive struggling
        # to start — often a sign of motor wear or bearing failure.
        # SSDs will not have this attribute.
        expr: >
          smartctl_device_attribute{attribute_name="Spin_Retry_Count", type="raw"} > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Drive {{ $labels.device }} has {{ $value }} spin retry events (TrueNAS)"
          description: >
            SMART attribute Spin_Retry_Count (ID 10) on drive {{ $labels.device }}
            ({{ $labels.model_name }}, serial: {{ $labels.serial_number }}) is
            {{ $value }}. This indicates the drive motor failed to spin up
            correctly on at least one occasion. Spin retry events on a hard
            drive suggest mechanical wear — motor or bearing degradation.

            Monitor for increasing values. A rising count is a reliable early
            predictor of mechanical failure on HDDs.
          runbook: "https://wiki.homelab/runbooks/disk-spin-retry"

      - alert: DiskCRCErrors
        # ID 199 — UDMA_CRC_Error_Count
        # Errors in data transmission between the drive and the HBA/controller.
        # Unlike other SMART attributes, these are typically caused by the
        # SATA/SAS cable or connector, not the drive itself. But a rising
        # count should be investigated.
        expr: >
          increase(smartctl_device_attribute{attribute_name="UDMA_CRC_Error_Count", type="raw"}[24h]) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Drive {{ $labels.device }} accumulated {{ $value }} CRC errors in 24h (TrueNAS)"
          description: >
            SMART attribute UDMA_CRC_Error_Count (ID 199) on drive {{ $labels.device }}
            ({{ $labels.model_name }}, serial: {{ $labels.serial_number }}) has
            increased by {{ $value }} in the past 24 hours. CRC errors occur
            during data transmission between the drive and the host controller.

            Most likely causes (check in order):
            1. Faulty or loose SATA data cable — reseat or replace the cable
            2. Poor contact in the SATA power connector
            3. Failing HBA/SATA controller
            4. (Rarely) the drive itself has a failing interface circuit

            Replace the cable first — it is the cheapest fix and most common cause.
          runbook: "https://wiki.homelab/runbooks/disk-crc-errors"

      - alert: DiskPowerCycleAnomaly
        # Power cycle count increases each time the drive powers on.
        # A sudden large increase (e.g., >5 in an hour) indicates unexpected
        # power cycling — a sign of power supply instability, loose connections,
        # or TrueNAS restarting repeatedly.
        expr: >
          increase(smartctl_device_attribute{attribute_name="Power_Cycle_Count", type="raw"}[1h]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Drive {{ $labels.device }} power-cycled {{ $value }} times in the past hour (TrueNAS)"
          description: >
            Drive {{ $labels.device }} ({{ $labels.model_name }}) has powered
            on/off more than {{ $value }} times in the past hour. Frequent
            unexpected power cycles stress drive mechanics and firmware.
            This may indicate:
            - An unstable power supply or UPS failing to hold voltage
            - A loose power connector to this drive
            - TrueNAS itself restarting repeatedly (check system logs)
          runbook: "https://wiki.homelab/runbooks/disk-power-cycle-anomaly"

  # ---------------------------------------------------------------------------
  # smartctl-exporter availability
  # If the exporter itself goes down, all SMART alerts will stop firing
  # (absent metrics). This watchdog ensures the exporter is always reachable.
  # ---------------------------------------------------------------------------
  - name: truenas.exporter_health
    rules:

      - alert: SmartctlExporterDown
        expr: up{job="smartctl-truenas"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "smartctl-exporter on TrueNAS (10.0.10.80:9633) is unreachable"
          description: >
            Prometheus cannot scrape the smartctl-exporter on TrueNAS
            (10.0.10.80:9633) — the target has been down for more than 5 minutes.
            All SMART disk health alerts (reallocated sectors, pending sectors,
            temperature, etc.) have been silenced because the metric source is
            unavailable. Disk failures will go undetected.

            Check the smartctl-exporter Docker container on TrueNAS:
            docker ps | grep smartctl
            docker logs smartctl-exporter --tail 50
          runbook: "https://wiki.homelab/runbooks/smartctl-exporter-down"
