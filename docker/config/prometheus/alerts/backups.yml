---
# Backup monitoring alert rules
#
# All backup jobs write a standard set of textfile metrics to the
# node-exporter textfile collector directory on the relevant host. These
# metrics use a consistent label scheme (job=<name>) to enable generic
# alerting and dashboarding.
#
# Textfile metric conventions (written by backup scripts):
#
#   backup_job_status{job="..."}              1 = last run succeeded, 0 = failed
#   backup_last_success_timestamp{job="..."}  Unix timestamp of last successful run
#   backup_size_bytes{job="..."}              Size of last backup archive in bytes
#   backup_duration_seconds{job="..."}        Duration of last backup run in seconds
#   backup_failures_total{job="..."}          Cumulative count of failed backup runs
#
# Expected job labels:
#   job="etcd"           — daily etcd snapshots (cron on tywin, 10.0.10.11)
#   job="docker-appdata" — daily Docker media stack volumes (10.0.10.32)
#   job="rpi-keys"       — RPi key material backup (10.0.10.10, 48h cadence)
#
# Adding a new backup target only requires the script to write the five
# metrics above with the correct job= label. No new alert rules are needed.
#
# Velero metrics (native, no textfile needed):
#   velero_backup_success_total
#   velero_backup_failure_total
#   velero_backup_last_successful_timestamp
#   velero_backup_storage_location_phase
#
# Severity routing via Alertmanager:
#   warning  -> #homelab-alerts (Discord)
#   critical -> #homelab-critical (Discord)

groups:

  # ---------------------------------------------------------------------------
  # Generic backup job alerts
  #
  # These rules fire generically across all jobs that write the standardised
  # textfile metrics. Adding a new backup target requires no new alert rules.
  # ---------------------------------------------------------------------------
  - name: backups.jobs
    rules:

      - alert: BackupJobFailed
        # Fires when a backup script explicitly reports failure (status == 0).
        # for: 5m avoids noise from transient failures that self-resolve.
        expr: backup_job_status == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Backup job {{ $labels.job }} reported failure"
          description: >
            The backup_job_status metric for job {{ $labels.job }} has been 0
            (failure) for at least 5 minutes. The most recent backup attempt did
            not complete successfully. Check the backup script logs on the relevant
            host and verify the destination has a recent archive.
          runbook: "https://wiki.homelab/runbooks/backup-job-failed"

      - alert: DailyBackupStale
        # 90000s = 25h — 1 hour of slack on top of the expected 24h cadence.
        # RPi is excluded here and covered by the looser RpiBackupStale rule.
        expr: >
          time() - backup_last_success_timestamp{job!="rpi-keys"} > 90000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Backup {{ $labels.job }} is {{ $value | humanizeDuration }} old"
          description: >
            Backup job {{ $labels.job }} has not completed a successful run in over
            25 hours. The backup script may have failed silently without updating
            backup_job_status, or the cron job may have been misconfigured. Check
            cron logs on the relevant host and confirm the destination has an
            archive from today.
          runbook: "https://wiki.homelab/runbooks/backup-stale"

      - alert: RpiBackupStale
        # 172800s = 48h — RPi key material changes infrequently.
        # Severity warning (not critical) — the RPi is not a data-producing host.
        expr: >
          time() - backup_last_success_timestamp{job="rpi-keys"} > 172800
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RPi key material backup is {{ $value | humanizeDuration }} old"
          description: >
            The rpi-keys backup has not completed successfully in over 48 hours.
            The RPi (10.0.10.10) stores SSH keys, GPG keys, kubeconfig, and
            cluster management scripts. An out-of-date backup means recent key
            rotations would be lost if the SD card fails.
          runbook: "https://wiki.homelab/runbooks/backup-stale"

      - alert: EtcdBackupMetricsMissing
        # Fires when the metric disappears entirely — more severe than a stale
        # timestamp because we cannot measure the gap at all.
        expr: absent(backup_last_success_timestamp{job="etcd"})
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "etcd backup metrics missing from Prometheus"
          description: >
            No backup_last_success_timestamp{job="etcd"} series present in
            Prometheus. The etcd backup cron job on tywin (10.0.10.11) is likely
            not running, or the textfile metric was deleted. The etcd database is
            not being protected. Inspect: /etc/cron.d/etcd-backup and the
            node-exporter textfile collector directory on tywin.
          runbook: "https://wiki.homelab/runbooks/backup-metrics-missing"

      - alert: DockerBackupMetricsMissing
        expr: absent(backup_last_success_timestamp{job="docker-appdata"})
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Docker appdata backup metrics missing from Prometheus"
          description: >
            No backup_last_success_timestamp{job="docker-appdata"} series present.
            The Docker backup cron job on 10.0.10.32 is likely not running. Media
            container configuration, Sonarr/Radarr databases, and Plex metadata
            are not being backed up.
          runbook: "https://wiki.homelab/runbooks/backup-metrics-missing"

      - alert: RpiBackupMetricsMissing
        expr: absent(backup_last_success_timestamp{job="rpi-keys"})
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "RPi key backup metrics missing from Prometheus"
          description: >
            No backup_last_success_timestamp{job="rpi-keys"} series present.
            The RPi backup script on 10.0.10.10 may have never run successfully
            or its textfile metric was removed. SSH keys and kubeconfig are not
            being backed up.
          runbook: "https://wiki.homelab/runbooks/backup-metrics-missing"

      - alert: BackupSizeSuspicious
        # Per-job minimum thresholds. No threshold for rpi-keys as its size
        # varies too much depending on key rotation cadence.
        expr: |
          (backup_size_bytes{job="etcd"} < 1000000)
          or
          (backup_size_bytes{job="docker-appdata"} < 10000000)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backup size for {{ $labels.job }} is suspiciously small ({{ $value | humanize1024 }}B)"
          description: >
            The backup_size_bytes for {{ $labels.job }} is below its expected
            minimum (etcd: 1 MB; docker-appdata: 10 MB). The backup script may
            have produced an incomplete or corrupt archive. Inspect the backup
            file on the destination and verify with the appropriate tool
            (etcdutl snapshot status, tar -tzf, etc.).
          runbook: "https://wiki.homelab/runbooks/backup-suspicious-size"

  # ---------------------------------------------------------------------------
  # Velero — Kubernetes PVC backups
  #
  # Velero exposes its own Prometheus metrics natively; no textfile needed.
  # Threshold: 25h (90000s) for daily scheduled backups.
  # ---------------------------------------------------------------------------
  - name: backups.velero
    rules:

      - alert: VeleroBackupFailed
        expr: >
          velero_backup_success_total == 0
          and on(schedule)
          velero_backup_failure_total > 0
        labels:
          severity: critical
        annotations:
          summary: "Velero backup schedule {{ $labels.schedule }} has no successes and has failures"
          description: >
            Velero backup schedule {{ $labels.schedule }} has accumulated
            {{ printf `velero_backup_failure_total{schedule="%s"}` $labels.schedule | query | first | value }}
            failure(s) and zero successful backups. PVC data is not being protected.
            Investigate with: velero backup get --selector schedule={{ $labels.schedule }}
          runbook: "https://wiki.homelab/runbooks/velero-backup-failed"

      - alert: VeleroBackupTooOld
        expr: time() - velero_backup_last_successful_timestamp > 90000
        labels:
          severity: critical
        annotations:
          summary: "Velero schedule {{ $labels.schedule }} last succeeded {{ $value | humanizeDuration }} ago"
          description: >
            The most recent successful Velero backup for schedule {{ $labels.schedule }}
            completed {{ $value | humanizeDuration }} ago, exceeding the 25-hour
            threshold. PVC snapshots are out of date. Check for failed backup runs
            and inspect Velero controller logs.
          runbook: "https://wiki.homelab/runbooks/velero-backup-too-old"

      - alert: VeleroBackupStorageUnavailable
        expr: >
          velero_backup_storage_location_phase{phase="Unavailable"} == 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Velero storage location {{ $labels.backupstoragelocation }} is unavailable"
          description: >
            The Velero BackupStorageLocation {{ $labels.backupstoragelocation }} has been
            reporting phase=Unavailable for more than 5 minutes. Velero cannot write new
            backups or read existing ones. Check connectivity to the object storage
            backend: kubectl describe backupstoragelocation -n velero {{ $labels.backupstoragelocation }}
          runbook: "https://wiki.homelab/runbooks/velero-storage-unavailable"
