---
# Kubernetes alert rules
#
# These rules target metrics produced by:
#   - kube-state-metrics  (kube_* series)
#   - node-exporter       (node_* series, scraped externally by this Prometheus)
#   - kubelet             (kubelet_* series)
#   - cert-manager        (certmanager_* series)
#   - Flux / GitOps Toolkit (gotk_* series)
#   - Traefik             (traefik_* series)
#
# Severity labels route via Alertmanager:
#   warning  -> #homelab-alerts
#   critical -> #homelab-critical

groups:

  # ---------------------------------------------------------------------------
  # Node health
  # Covers the three k8s nodes scraped by the node-k8s-nodes job:
  #   tywin (10.0.10.11), jaime (10.0.10.12), tyrion (10.0.10.13)
  # ---------------------------------------------------------------------------
  - name: kubernetes.node_health
    rules:

      - alert: NodeNotReady
        expr: kube_node_status_condition{condition="Ready",status="true"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Kubernetes node {{ $labels.node }} is not ready"
          description: >
            Node {{ $labels.node }} has been in a NotReady state for more than
            5 minutes. Workloads on this node cannot be scheduled and existing
            pods may be evicted. Investigate kubelet logs and node conditions
            immediately.
          runbook: "https://wiki.homelab/runbooks/k8s-node-not-ready"

      - alert: NodeMemoryHigh
        expr: >
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on node {{ $labels.instance }} ({{ $value | printf \"%.1f\" }}%)"
          description: >
            Node {{ $labels.instance }} memory utilisation has been above 85%
            for 10 minutes. Current value: {{ $value | printf "%.1f" }}%.
            Check for memory-hungry pods with: kubectl top pods -A --sort-by=memory
          runbook: "https://wiki.homelab/runbooks/node-memory-pressure"

      - alert: NodeMemoryCritical
        expr: >
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical memory exhaustion on node {{ $labels.instance }} ({{ $value | printf \"%.1f\" }}%)"
          description: >
            Node {{ $labels.instance }} memory utilisation has exceeded 95% for
            5 minutes. OOM kills are likely imminent. Immediately identify and
            evict or limit high-memory pods.
          runbook: "https://wiki.homelab/runbooks/node-memory-pressure"

      - alert: NodeCPUHigh
        expr: >
          100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on node {{ $labels.instance }} ({{ $value | printf \"%.1f\" }}%)"
          description: >
            Node {{ $labels.instance }} CPU utilisation has been above 85% for
            15 minutes. Current value: {{ $value | printf "%.1f" }}%.
            Identify CPU-intensive workloads with: kubectl top pods -A --sort-by=cpu
          runbook: "https://wiki.homelab/runbooks/node-cpu-pressure"

      - alert: NodeDiskFull
        expr: >
          (
            node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"}
            / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"}
          ) * 100 < 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low root disk space on {{ $labels.instance }} ({{ $value | printf \"%.1f\" }}% free)"
          description: >
            Root filesystem on {{ $labels.instance }} has less than 20% free
            space remaining ({{ $value | printf "%.1f" }}% free).
            Run `df -h` and clear logs, images, or unused data.
          runbook: "https://wiki.homelab/runbooks/node-disk-space"

      - alert: NodeDiskCritical
        expr: >
          (
            node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"}
            / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"}
          ) * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical root disk space on {{ $labels.instance }} ({{ $value | printf \"%.1f\" }}% free)"
          description: >
            Root filesystem on {{ $labels.instance }} has less than 10% free
            space remaining ({{ $value | printf "%.1f" }}% free). Kubelet may
            evict pods and the node may become NotReady. Immediate action required.
          runbook: "https://wiki.homelab/runbooks/node-disk-space"

      - alert: NodeDiskPredictedFull
        expr: >
          predict_linear(node_filesystem_avail_bytes{mountpoint="/"}[6h], 4 * 3600) < 0
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Disk on {{ $labels.instance }} predicted to fill within 4 hours"
          description: >
            Based on the fill rate observed over the past 6 hours, the root
            filesystem on {{ $labels.instance }} is projected to run out of
            space within 4 hours. Investigate and free space proactively before
            the node becomes unhealthy.
          runbook: "https://wiki.homelab/runbooks/node-disk-space"

  # ---------------------------------------------------------------------------
  # Pod health
  # ---------------------------------------------------------------------------
  - name: kubernetes.pod_health
    rules:

      - alert: PodCrashLooping
        expr: >
          rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
          description: >
            Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }}
            has restarted at least once in the last 15 minutes and is continuing
            to crash-loop. Check logs: kubectl logs -n {{ $labels.namespace }} {{ $labels.pod }} --previous
          runbook: "https://wiki.homelab/runbooks/pod-crash-loop"

      - alert: PodCrashLoopingFrequent
        expr: >
          rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 5
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping rapidly (>5 restarts / 15m)"
          description: >
            Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }}
            has restarted more than 5 times in the last 15 minutes. This is
            causing significant disruption. Investigate immediately.
            kubectl describe pod -n {{ $labels.namespace }} {{ $labels.pod }}
          runbook: "https://wiki.homelab/runbooks/pod-crash-loop"

      - alert: PodNotReady
        # Exclude pods that are intentionally completed (Jobs/CronJobs finish with Succeeded).
        expr: >
          kube_pod_status_ready{condition="false"} == 1
          unless on(namespace, pod)
          kube_pod_status_phase{phase=~"Succeeded|Completed"} == 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been not-ready for 10m"
          description: >
            Pod {{ $labels.namespace }}/{{ $labels.pod }} has reported a Ready
            condition of false for more than 10 minutes. The pod is not
            succeeded/completed, so this is unexpected. Check events and logs.
            kubectl describe pod -n {{ $labels.namespace }} {{ $labels.pod }}
          runbook: "https://wiki.homelab/runbooks/pod-not-ready"

      - alert: PodOOMKilled
        expr: >
          kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} was OOM killed"
          description: >
            Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }}
            was terminated due to out-of-memory. Either the container's memory
            limit is set too low or there is a memory leak. Increase the limit
            or investigate the application.
          runbook: "https://wiki.homelab/runbooks/pod-oom-killed"

      - alert: DeploymentReplicasMismatch
        expr: >
          kube_deployment_status_replicas_available != kube_deployment_spec_replicas
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has fewer replicas than desired"
          description: >
            Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has
            {{ $value }} available replicas but desires
            {{ printf `kube_deployment_spec_replicas{namespace="%s",deployment="%s"}` $labels.namespace $labels.deployment | query | first | value }} replicas.
            Pods may be pending, crash-looping, or unschedulable.
          runbook: "https://wiki.homelab/runbooks/deployment-replicas-mismatch"

  # ---------------------------------------------------------------------------
  # PersistentVolumeClaim storage
  # ---------------------------------------------------------------------------
  - name: kubernetes.storage
    rules:

      - alert: PVCUsageHigh
        expr: >
          (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is {{ $value | printf \"%.1f\" }}% full"
          description: >
            PersistentVolumeClaim {{ $labels.persistentvolumeclaim }} in
            namespace {{ $labels.namespace }} has exceeded 80% utilisation
            (current: {{ $value | printf "%.1f" }}%). Consider expanding the
            PVC or cleaning up unused data before it fills completely.
          runbook: "https://wiki.homelab/runbooks/pvc-full"

      - alert: PVCUsageCritical
        expr: >
          (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is critically full ({{ $value | printf \"%.1f\" }}%)"
          description: >
            PersistentVolumeClaim {{ $labels.persistentvolumeclaim }} in
            namespace {{ $labels.namespace }} has exceeded 90% utilisation
            (current: {{ $value | printf "%.1f" }}%). Applications writing to
            this volume may start failing. Expand the PVC immediately.
          runbook: "https://wiki.homelab/runbooks/pvc-full"

      - alert: PVCPending
        expr: >
          kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} has been Pending for 10m"
          description: >
            PersistentVolumeClaim {{ $labels.persistentvolumeclaim }} in
            namespace {{ $labels.namespace }} has been stuck in Pending state
            for more than 10 minutes. The storage class provisioner may be
            unavailable or there may be no matching PersistentVolume.
            kubectl describe pvc -n {{ $labels.namespace }} {{ $labels.persistentvolumeclaim }}
          runbook: "https://wiki.homelab/runbooks/pvc-pending"

  # ---------------------------------------------------------------------------
  # TLS certificate health (cert-manager)
  # ---------------------------------------------------------------------------
  - name: kubernetes.certificates
    rules:

      - alert: CertificateExpiringSoon
        expr: >
          certmanager_certificate_expiration_timestamp_seconds - time() < 30 * 24 * 3600
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in less than 30 days"
          description: >
            cert-manager Certificate {{ $labels.name }} in namespace
            {{ $labels.namespace }} will expire in
            {{ $value | humanizeDuration }}. cert-manager should renew it
            automatically; if this alert persists, check cert-manager logs and
            the Certificate's status for ACME challenge failures.
          runbook: "https://wiki.homelab/runbooks/certificate-expiry"

      - alert: CertificateExpiringCritical
        expr: >
          certmanager_certificate_expiration_timestamp_seconds - time() < 7 * 24 * 3600
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in less than 7 days"
          description: >
            cert-manager Certificate {{ $labels.name }} in namespace
            {{ $labels.namespace }} will expire in
            {{ $value | humanizeDuration }}. Automatic renewal has failed.
            Manually trigger renewal or investigate ACME / DNS challenges.
            kubectl cert-manager renew -n {{ $labels.namespace }} {{ $labels.name }}
          runbook: "https://wiki.homelab/runbooks/certificate-expiry"

      - alert: CertificateNotReady
        expr: >
          certmanager_certificate_ready_status{condition="True"} == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} is not in Ready state"
          description: >
            cert-manager Certificate {{ $labels.name }} in namespace
            {{ $labels.namespace }} has not reported a Ready condition of True
            for 10 minutes. This may indicate a failed ACME challenge, missing
            DNS record, or an issuer problem.
            kubectl describe certificate -n {{ $labels.namespace }} {{ $labels.name }}
          runbook: "https://wiki.homelab/runbooks/certificate-not-ready"

  # ---------------------------------------------------------------------------
  # Flux GitOps
  # Flux Toolkit exposes gotk_reconcile_condition and gotk_suspend_status
  # metrics from the flux-system namespace controllers.
  # ---------------------------------------------------------------------------
  - name: kubernetes.flux
    rules:

      - alert: FluxReconciliationFailed
        expr: >
          gotk_reconcile_condition{type="Ready",status="False"} == 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Flux {{ $labels.kind }} {{ $labels.namespace }}/{{ $labels.name }} reconciliation failed"
          description: >
            Flux {{ $labels.kind }} resource {{ $labels.name }} in namespace
            {{ $labels.namespace }} has been in a Failed reconciliation state
            for 5 minutes. The cluster may be drifting from its desired Git
            state. Check the Flux controller logs and the resource status:
            flux get {{ $labels.kind | lower }}s -n {{ $labels.namespace }}
          runbook: "https://wiki.homelab/runbooks/flux-reconciliation-failed"

      - alert: FluxReconciliationStalled
        expr: >
          gotk_reconcile_condition{type="Ready",status="False"} == 1
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Flux {{ $labels.kind }} {{ $labels.namespace }}/{{ $labels.name }} reconciliation stalled for 30m"
          description: >
            Flux {{ $labels.kind }} resource {{ $labels.name }} in namespace
            {{ $labels.namespace }} has been stalled in a failed reconciliation
            state for 30 minutes. This is not a transient failure — the
            controller is unable to make progress. Investigate the root cause:
            failed dependencies, invalid manifests, or an unavailable source.
            flux describe {{ $labels.kind | lower }} -n {{ $labels.namespace }} {{ $labels.name }}
          runbook: "https://wiki.homelab/runbooks/flux-reconciliation-stalled"

      - alert: FluxSuspended
        expr: >
          gotk_suspend_status == 1
        for: 60m
        labels:
          severity: warning
        annotations:
          summary: "Flux {{ $labels.kind }} {{ $labels.namespace }}/{{ $labels.name }} has been suspended for 1h"
          description: >
            Flux {{ $labels.kind }} resource {{ $labels.name }} in namespace
            {{ $labels.namespace }} has been suspended for more than 1 hour.
            While suspension is sometimes intentional (maintenance), leaving
            resources suspended means the cluster may drift from Git.
            Resume with: flux resume {{ $labels.kind | lower }} -n {{ $labels.namespace }} {{ $labels.name }}
          runbook: "https://wiki.homelab/runbooks/flux-suspended"

  # ---------------------------------------------------------------------------
  # Traefik ingress controller
  # ---------------------------------------------------------------------------
  - name: kubernetes.ingress
    rules:

      - alert: TraefikHighErrorRate
        expr: >
          (
            rate(traefik_service_requests_total{code=~"5.."}[5m])
            / rate(traefik_service_requests_total[5m])
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Traefik service {{ $labels.service }} has >5% 5xx error rate"
          description: >
            Traefik service {{ $labels.service }} has a 5xx error rate of
            {{ $value | humanizePercentage }} over the last 5 minutes, which
            exceeds the 5% threshold. Investigate the upstream service and
            check Traefik access logs for the failing requests.
          runbook: "https://wiki.homelab/runbooks/traefik-error-rate"

      - alert: TraefikHighLatency
        expr: >
          histogram_quantile(
            0.95,
            rate(traefik_service_request_duration_seconds_bucket[5m])
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Traefik p95 latency for service {{ $labels.service }} exceeds 2s"
          description: >
            The 95th percentile request duration for Traefik service
            {{ $labels.service }} has been above 2 seconds for 5 minutes
            (current p95: {{ $value | printf "%.2f" }}s). The upstream service
            may be slow, under load, or experiencing connection issues.
          runbook: "https://wiki.homelab/runbooks/traefik-high-latency"
