---
# Infrastructure alert rules — Docker host, Raspberry Pi, TrueNAS
#
# Covers host-level health for the three non-Kubernetes nodes:
#   Docker media server  10.0.10.20  (job: node-docker-host, cadvisor-docker)
#   Raspberry Pi hub     10.0.10.10   (job: node-rpi)
#   TrueNAS MicroServer  10.0.10.80  (job: node-truenas)
#
# ZFS pool and SMART disk alerts for TrueNAS are in truenas.yml.
#
# Severity routing via Alertmanager:
#   warning  -> #homelab-alerts
#   critical -> #homelab-critical

groups:

  # ---------------------------------------------------------------------------
  # Docker media server (10.0.10.20)
  # Runs Jellyfin, Sonarr, Radarr, Prowlarr, Nginx Proxy Manager, and other
  # media-stack containers. Also hosts this Prometheus, Grafana, Alertmanager,
  # and Loki.
  # ---------------------------------------------------------------------------
  - name: infrastructure.docker_host
    rules:

      - alert: DockerHostDown
        expr: up{job="node-docker-host"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Docker media server (10.0.10.20) is unreachable"
          description: >
            Prometheus cannot scrape node-exporter on the Docker host
            (10.0.10.20) — the target has been down for more than 3 minutes.
            All media services (Jellyfin, Sonarr, Radarr, etc.) are likely
            unavailable. This Prometheus and Grafana are also hosted here, so
            alerting may be degraded. Check host power and network connectivity.
          runbook: "https://wiki.homelab/runbooks/docker-host-down"

      - alert: DockerContainerDown
        # absent() on a container_last_seen metric fires when the named
        # container has stopped or been removed, so cAdvisor is no longer
        # emitting metrics for it. The regex matches any of the core
        # media-stack containers.
        expr: >
          absent(container_last_seen{name=~"jellyfin|sonarr|radarr|prowlarr|npm"})
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "One or more core media containers appear to be down"
          description: >
            cAdvisor has not seen a container_last_seen metric matching
            jellyfin|sonarr|radarr|prowlarr|npm for 5 minutes. One or more
            critical media containers have stopped or crashed without restarting.
            Check with: docker ps -a | grep -E 'jellyfin|sonarr|radarr|prowlarr|npm'
            and inspect logs: docker logs <container-name> --tail 50
          runbook: "https://wiki.homelab/runbooks/docker-container-down"

      - alert: DockerContainerRestarting
        # container_start_time_seconds increases each time a container starts.
        # A rate > 0.016 per second over 1 hour corresponds to more than ~1
        # restart per hour (1/3600 ≈ 0.000278/s; 0.016/s would be extreme —
        # use a more realistic threshold: ~1 restart per hour = 1/3600 ≈ 0.00028).
        # Adjusted: rate > 0.0003 over 1h catches containers restarting
        # roughly once per hour. Comment retained for operator clarity.
        expr: >
          rate(container_start_time_seconds{name!=""}[1h]) > 0.0003
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} on Docker host is restarting frequently"
          description: >
            Container {{ $labels.name }} has been restarting more than
            approximately once per hour for the past 10 minutes
            (observed rate: {{ $value | printf "%.5f" }}/s).
            This indicates an unstable container that is not entering a
            CrashLoopBackOff state (Docker restart policy is retrying).
            Inspect logs: docker logs {{ $labels.name }} --tail 100
          runbook: "https://wiki.homelab/runbooks/docker-container-restarting"

      - alert: DockerHostDiskFull
        # The primary media storage mount is /srv. Alert when <20% remains.
        expr: >
          (
            node_filesystem_avail_bytes{job="node-docker-host", mountpoint="/srv"}
            / node_filesystem_size_bytes{job="node-docker-host", mountpoint="/srv"}
          ) * 100 < 20
        labels:
          severity: warning
        annotations:
          summary: "Docker host /srv filesystem is {{ $value | printf \"%.1f\" }}% free"
          description: >
            The /srv filesystem on the Docker media server (10.0.10.20) has less
            than 20% free space ({{ $value | printf "%.1f" }}% remaining).
            This mount holds Docker volumes and application data. If it fills
            completely, container writes will fail and databases may corrupt.
            Identify large consumers: du -sh /srv/* | sort -rh | head -20
          runbook: "https://wiki.homelab/runbooks/docker-host-disk-full"

      - alert: DockerHostMemoryHigh
        expr: >
          (1 - (node_memory_MemAvailable_bytes{job="node-docker-host"} / node_memory_MemTotal_bytes{job="node-docker-host"})) * 100 > 90
        labels:
          severity: warning
        annotations:
          summary: "Docker host memory utilisation is {{ $value | printf \"%.1f\" }}%"
          description: >
            The Docker media server (10.0.10.20) memory utilisation has exceeded
            90% (current: {{ $value | printf "%.1f" }}%). With many containers
            sharing the host, high memory pressure can cause container OOM kills
            and application instability.
            Identify memory consumers: docker stats --no-stream --format "table {{.Name}}\t{{.MemUsage}}"
          runbook: "https://wiki.homelab/runbooks/docker-host-memory-high"

      - alert: DockerNFSMountMissing
        # node_filesystem_avail_bytes should have a non-zero value for healthy
        # NFS mounts. A value of exactly 0 (or the series being absent entirely)
        # indicates the mount has been lost or was never established.
        # This fires when any of the three NFS mounts used by the media stack
        # is lost: /mnt/media, /mnt/downloads, /mnt/archive.
        expr: >
          node_filesystem_avail_bytes{
            job="node-docker-host",
            mountpoint=~"/mnt/media|/mnt/downloads|/mnt/archive"
          } == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "NFS mount {{ $labels.mountpoint }} on Docker host has been lost"
          description: >
            The NFS mount at {{ $labels.mountpoint }} on the Docker media server
            (10.0.10.20) is reporting zero available bytes, which indicates the
            mount has been lost or the underlying NFS export is unavailable.
            Containers that depend on this path (Jellyfin, Sonarr, Radarr) will
            fail to read or write media.
            Check TrueNAS NFS service and re-mount:
            mount -a  (or restart the autofs/systemd mount unit)
          runbook: "https://wiki.homelab/runbooks/docker-nfs-mount-missing"

  # ---------------------------------------------------------------------------
  # Raspberry Pi control hub (10.0.10.10)
  # Hosts cluster management tooling: kubectl, Flux CLI, Helm, cron scripts.
  # The RPi is not in the critical data path, but losing it breaks the ability
  # to manage the cluster interactively. SD card wear is the primary concern —
  # alert on disk space earlier than other hosts (30% / 15% thresholds).
  # ---------------------------------------------------------------------------
  - name: infrastructure.rpi
    rules:

      - alert: RpiDown
        expr: up{job="node-rpi"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Raspberry Pi control hub (10.0.10.10) is unreachable"
          description: >
            Prometheus cannot scrape node-exporter on the Raspberry Pi
            (10.0.10.10) — the target has been down for more than 5 minutes.
            Cluster management scripts, kubeconfig, and SSH key material stored
            on the RPi are unavailable. Check RPi power and SD card health.
          runbook: "https://wiki.homelab/runbooks/rpi-down"

      - alert: RpiSDCardFull
        # SD cards have limited write endurance. Alerting at 30% (rather than
        # the usual 20%) gives more time to act before writes start failing.
        expr: >
          (
            node_filesystem_avail_bytes{job="node-rpi", mountpoint="/"}
            / node_filesystem_size_bytes{job="node-rpi", mountpoint="/"}
          ) * 100 < 30
        labels:
          severity: warning
        annotations:
          summary: "RPi SD card root filesystem is {{ $value | printf \"%.1f\" }}% free"
          description: >
            The Raspberry Pi root filesystem (SD card) has less than 30% free
            space ({{ $value | printf "%.1f" }}% remaining). SD cards fail more
            suddenly than HDDs and have a lower write endurance; acting early
            prevents data loss. Clean up logs, remove unused packages, or
            replace with a larger card.
            df -h / && du -sh /* 2>/dev/null | sort -rh | head -10
          runbook: "https://wiki.homelab/runbooks/rpi-sdcard-full"

      - alert: RpiSDCardCritical
        expr: >
          (
            node_filesystem_avail_bytes{job="node-rpi", mountpoint="/"}
            / node_filesystem_size_bytes{job="node-rpi", mountpoint="/"}
          ) * 100 < 15
        labels:
          severity: critical
        annotations:
          summary: "RPi SD card root filesystem critically full ({{ $value | printf \"%.1f\" }}% free)"
          description: >
            The Raspberry Pi root filesystem has less than 15% free space
            ({{ $value | printf "%.1f" }}% remaining). The system may become
            read-only or stop functioning soon. Immediate action required:
            free space or replace the SD card. Back up key material first.
          runbook: "https://wiki.homelab/runbooks/rpi-sdcard-full"

  # ---------------------------------------------------------------------------
  # TrueNAS HP MicroServer (10.0.10.80)
  # Primary NAS: ZFS storage pool for media, backups, and NFS exports.
  # ZFS pool and SMART health alerts are in truenas.yml; this group covers
  # host-level availability and filesystem space on the pool mount.
  # ---------------------------------------------------------------------------
  - name: infrastructure.truenas
    rules:

      - alert: TrueNASDown
        expr: up{job="node-truenas"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "TrueNAS MicroServer (10.0.10.80) is unreachable"
          description: >
            Prometheus cannot scrape node-exporter on TrueNAS (10.0.10.80) —
            the target has been down for more than 3 minutes. All NFS exports
            serving the Docker host and Kubernetes PVCs are unavailable.
            Media services will begin failing as NFS mounts stall. Check
            TrueNAS power, network, and the node-exporter service.
          runbook: "https://wiki.homelab/runbooks/truenas-down"

      - alert: TrueNASDiskFull
        # Monitor space across all ZFS pool mounts: core (k8s PVCs), archive (backups),
        # and tera (media). Matches /mnt/core, /mnt/archive, /mnt/tera and their datasets.
        expr: >
          (
            node_filesystem_avail_bytes{job="node-truenas", mountpoint=~"/mnt/(core|archive|tera).*"}
            / node_filesystem_size_bytes{job="node-truenas", mountpoint=~"/mnt/(core|archive|tera).*"}
          ) * 100 < 20
        labels:
          severity: warning
        annotations:
          summary: "TrueNAS pool {{ $labels.mountpoint }} is {{ $value | printf \"%.1f\" }}% free"
          description: >
            ZFS dataset at {{ $labels.mountpoint }} on TrueNAS has less than
            20% free space ({{ $value | printf "%.1f" }}% remaining). ZFS
            requires free space to perform copy-on-write operations; as the
            pool fills, performance degrades and snapshots begin to fail.
            Review pool usage in the TrueNAS UI and remove old snapshots or
            expand the pool.
          runbook: "https://wiki.homelab/runbooks/truenas-disk-full"

      - alert: TrueNASDiskCritical
        expr: >
          (
            node_filesystem_avail_bytes{job="node-truenas", mountpoint=~"/mnt/(core|archive|tera).*"}
            / node_filesystem_size_bytes{job="node-truenas", mountpoint=~"/mnt/(core|archive|tera).*"}
          ) * 100 < 10
        labels:
          severity: critical
        annotations:
          summary: "TrueNAS pool {{ $labels.mountpoint }} critically full ({{ $value | printf \"%.1f\" }}% free)"
          description: >
            ZFS dataset at {{ $labels.mountpoint }} on TrueNAS has less than
            10% free space ({{ $value | printf "%.1f" }}% remaining). At this
            level ZFS write performance severely degrades and the pool may become
            read-only. Delete old snapshots immediately and stop non-essential
            writes. Consider adding a new vdev or disk.
          runbook: "https://wiki.homelab/runbooks/truenas-disk-full"
