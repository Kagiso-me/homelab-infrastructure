server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ---------------------------------------------------------------------------
  # 1. Docker container logs — auto-discovered via Docker socket
  # ---------------------------------------------------------------------------
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: status
            values: [running]
    relabel_configs:
      # Strip leading slash from container name → container label
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container
      # Docker Compose service name
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      # Docker Compose project / app name
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: app
      # Drop containers that have no resolved name (should not happen, safety net)
      - source_labels: [container]
        regex: ''
        action: drop
    pipeline_stages:
      # Parse the standard Docker JSON log wrapper (timestamp, stream, log)
      - docker: {}
      # --- nginx-proxy-manager: extract HTTP method, path, and status code ---
      - match:
          selector: '{container="nginx-proxy-manager"}'
          stages:
            - regex:
                expression: '(?P<method>\S+) (?P<path>\S+) HTTP/\d\.\d" (?P<status>\d+)'
            - labels:
                method:
                status:
      # --- *arr apps: extract log level from bracket prefix ---
      - match:
          selector: '{container=~"sonarr|radarr|prowlarr|lidarr"}'
          stages:
            - regex:
                expression: '\[(?P<level>\w+)\]'
            - labels:
                level:

  # ---------------------------------------------------------------------------
  # 2. System logs from the Docker host
  # ---------------------------------------------------------------------------
  - job_name: system
    static_configs:
      - targets: [localhost]
        labels:
          job: system
          host: docker-host
          __path__: /var/log/{syslog,auth.log,kern.log,dpkg.log}
    pipeline_stages:
      # --- auth.log: label notable security events ---
      - match:
          selector: '{filename="/var/log/auth.log"}'
          stages:
            - regex:
                expression: '(?P<event>Failed password|Accepted publickey|Invalid user|authentication failure)'
            - labels:
                event:

  # ---------------------------------------------------------------------------
  # 3. Docker host backup logs
  # ---------------------------------------------------------------------------
  - job_name: backup-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: backup
          host: docker-host
          __path__: /var/log/docker-backup.log
