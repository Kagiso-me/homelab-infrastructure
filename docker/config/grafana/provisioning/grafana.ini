[server]
root_url = http://10.0.1.20:3000

[auth]
disable_login_form = false

[security]
admin_user = admin
# admin_password is set via GF_SECURITY_ADMIN_PASSWORD env var

[users]
allow_sign_up = false

[alerting]
enabled = true

[unified_alerting]
enabled = true

[log]
mode = console
level = warn

[analytics]
reporting_enabled = false
check_for_updates = false
