apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base/grafana
  # Staging mirrors prod apps but with staging-specific patches applied.
  # Add apps here as they are promoted from testing to staging.
patches:
  - patch: |-
      - op: replace
        path: /spec/entryPoints
        value: ["websecure"]
    target:
      kind: IngressRoute
  # Resource reductions for staging — override in individual app patches as needed.
