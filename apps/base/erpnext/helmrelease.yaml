apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: erpnext
  namespace: apps
spec:
  interval: 30m
  chart:
    spec:
      chart: erpnext
      version: ">=7.0.261"
      sourceRef:
        kind: HelmRepository
        name: frappe
        namespace: flux-system
      interval: 24h
  timeout: 20m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
    - kind: Secret
      name: erpnext-secret
      valuesKey: mariadb-root-password
      targetPath: mariadb.auth.rootPassword
    - kind: Secret
      name: erpnext-secret
      valuesKey: mariadb-password
      targetPath: mariadb.auth.password
    - kind: Secret
      name: erpnext-secret
      valuesKey: admin-password
      targetPath: jobs.createSite.adminPassword
  values:
    # MariaDB is managed by this release — ERPNext requires MariaDB, not PostgreSQL.
    mariadb:
      enabled: true
      auth:
        database: erpnext
        username: erpnext
        # rootPassword and password injected via valuesFrom
      primary:
        persistence:
          enabled: true
          storageClass: nfs-truenas
          size: 20Gi

    # Use shared Redis instance — DB index 4.
    redis-cache:
      enabled: false
    redis-queue:
      enabled: false

    redis:
      host: redis-master.databases.svc.cluster.local
      port: 6379
      cacheDb: 4
      queueDb: 5

    persistence:
      worker:
        enabled: true
        storageClass: nfs-truenas
        size: 10Gi

    jobs:
      createSite:
        enabled: true
        siteName: erp.local.kagiso.me
        # adminPassword injected via valuesFrom

    ingress:
      enabled: false
