apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: erpnext
  namespace: apps
spec:
  interval: 30m
  chart:
    spec:
      chart: erpnext
      version: ">=7.0.261"
      sourceRef:
        kind: HelmRepository
        name: frappe
        namespace: flux-system
      interval: 24h
  timeout: 20m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
    - kind: Secret
      name: erpnext-secret
      valuesKey: mariadb-root-password
      targetPath: "mariadb-subchart.auth.rootPassword"
    - kind: Secret
      name: erpnext-secret
      valuesKey: mariadb-password
      targetPath: "mariadb-subchart.auth.password"
    - kind: Secret
      name: erpnext-secret
      valuesKey: admin-password
      targetPath: jobs.createSite.adminPassword
  values:
    "mariadb-subchart":
      enabled: true
      auth:
        database: erpnext
        username: erpnext
        # rootPassword and password injected via valuesFrom
      primary:
        persistence:
          enabled: true
          storageClass: nfs-truenas
          size: 20Gi

    persistence:
      worker:
        enabled: true
        # local-path avoids NFS root-squash chown failures in the frappe init container.
        storageClass: local-path
        size: 10Gi

    jobs:
      createSite:
        enabled: true
        siteName: erp.local.kagiso.me
        # adminPassword injected via valuesFrom

    ingress:
      enabled: false
