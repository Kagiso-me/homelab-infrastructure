apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: apps
spec:
  interval: 30m
  chart:
    spec:
      chart: n8n
      version: ">=1.16.0"
      sourceRef:
        kind: HelmRepository
        name: community-charts
        namespace: flux-system
      interval: 24h
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
    - kind: Secret
      name: n8n-secret
      valuesKey: db-password
      targetPath: main.config.db.postgresdb.password
  values:
    # Disable bundled PostgreSQL and Redis — using shared central instances.
    postgresql:
      enabled: false
    redis:
      enabled: false

    main:
      config:
        generic:
          timezone: Africa/Johannesburg

        # PostgreSQL backend.
        db:
          type: postgresdb
          postgresdb:
            host: postgresql.databases.svc.cluster.local
            port: 5432
            database: n8n
            user: n8n
            # password injected via valuesFrom

        # Queue mode — requires PostgreSQL + Redis.
        executions:
          mode: queue

        queue:
          bull:
            redis:
              host: redis-master.databases.svc.cluster.local
              port: 6379
              db: 3
              # password injected via extraEnv below

      extraEnv:
        - name: QUEUE_BULL_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: n8n-secret
              key: redis-password
        # N8N_ENCRYPTION_KEY protects stored credentials at rest.
        - name: N8N_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: n8n-secret
              key: encryption-key

    persistence:
      enabled: true
      storageClass: nfs-truenas
      accessMode: ReadWriteMany
      size: 5Gi

    ingress:
      enabled: false
