apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: apps
spec:
  interval: 30m
  chart:
    spec:
      chart: n8n
      version: ">=1.16.0"
      sourceRef:
        kind: HelmRepository
        name: community-charts
        namespace: flux-system
      interval: 24h
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
    - kind: Secret
      name: n8n-secret
      valuesKey: db-password
      targetPath: externalPostgresql.password
    - kind: Secret
      name: n8n-secret
      valuesKey: redis-password
      targetPath: externalRedis.password
  values:
    # Disable bundled PostgreSQL and Redis — using shared central instances.
    postgresql:
      enabled: false
    redis:
      enabled: false

    # External PostgreSQL.
    externalPostgresql:
      host: postgresql.databases.svc.cluster.local
      port: 5432
      database: n8n
      username: n8n
      # password injected via valuesFrom

    # External Redis — DB index 3 (Authentik=0, Nextcloud=1, Immich=2).
    externalRedis:
      host: redis-master.databases.svc.cluster.local
      port: 6379
      database: 3
      # password injected via valuesFrom

    # PostgreSQL backend + queue mode.
    db:
      type: postgresdb

    worker:
      mode: queue

    # N8N_ENCRYPTION_KEY protects stored credentials at rest.
    # WARNING: changing this after first deploy invalidates all stored credentials.
    main:
      extraEnvVars:
        N8N_ENCRYPTION_KEY:
          valueFrom:
            secretKeyRef:
              name: n8n-secret
              key: encryption-key
        GENERIC_TIMEZONE: Africa/Johannesburg

      persistence:
        enabled: true
        storageClass: nfs-truenas
        accessMode: ReadWriteOnce
        size: 5Gi

    ingress:
      enabled: false
