apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: apps
spec:
  interval: 30m
  chart:
    spec:
      chart: n8n
      version: ">=1.16.0"
      sourceRef:
        kind: HelmRepository
        name: community-charts
        namespace: flux-system
      interval: 24h
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
    - kind: Secret
      name: n8n-secret
      valuesKey: db-password
      targetPath: externalPostgresql.password
    - kind: Secret
      name: n8n-secret
      valuesKey: redis-password
      targetPath: externalRedis.password
    - kind: Secret
      name: n8n-secret
      valuesKey: encryption-key
      targetPath: encryptionKey
  values:
    # Disable bundled PostgreSQL and Redis — using shared central instances.
    postgresql:
      enabled: false
    redis:
      enabled: false

    # External PostgreSQL.
    externalPostgresql:
      host: postgresql-primary.databases.svc.cluster.local
      port: 5432
      database: n8n
      username: n8n
      # password injected via valuesFrom

    # External Redis — DB index 3 (Authentik=0, Nextcloud=1, Immich=2).
    externalRedis:
      host: redis-master.databases.svc.cluster.local
      port: 6379
      database: 3
      # password injected via valuesFrom

    # PostgreSQL backend + queue mode.
    db:
      type: postgresdb

    worker:
      mode: queue
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgresql-primary.databases.svc.cluster.local 5432; do
                echo "Waiting for PostgreSQL..."; sleep 2;
              done

    # encryptionKey injected via valuesFrom.
    # WARNING: changing this after first deploy invalidates all stored credentials.

    timezone: Africa/Johannesburg

    ingress:
      enabled: false

    # Override dnsConfig to avoid stale search domains from nodes
    # whose /etc/resolv.conf still has old home network search domains.
    dnsConfig:
      searches:
        - apps.svc.cluster.local
        - svc.cluster.local
        - cluster.local

    main:
      # Wait for PostgreSQL to accept connections before n8n starts.
      # This prevents ENOTFOUND errors when the pod starts before DNS/network
      # is fully ready on the node.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgresql-primary.databases.svc.cluster.local 5432; do
                echo "Waiting for PostgreSQL..."; sleep 2;
              done
      persistence:
        enabled: true
        storageClass: nfs-truenas
        accessMode: ReadWriteOnce
        size: 5Gi
