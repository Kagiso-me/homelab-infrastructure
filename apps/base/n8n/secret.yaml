apiVersion: v1
kind: Secret
metadata:
  name: n8n-secret
  namespace: apps
type: Opaque
stringData:
  # Password for the 'n8n' PostgreSQL user.
  # Pre-create the DB and user before first deploy:
  #   kubectl exec -n databases deploy/postgresql -- psql -U postgres -c "CREATE USER n8n WITH PASSWORD '<password>';"
  #   kubectl exec -n databases deploy/postgresql -- psql -U postgres -c "CREATE DATABASE n8n OWNER n8n;"
  db-password: CHANGEME

  # Shared Redis password — same value as in platform/databases/redis/secret.yaml.
  redis-password: CHANGEME

  # Random 32-char key used to encrypt stored credentials at rest.
  # Generate with: openssl rand -hex 32
  # WARNING: changing this after first deploy will invalidate all stored credentials.
  encryption-key: CHANGEME
