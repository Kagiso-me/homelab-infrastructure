apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: n8n
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    # Only expose webhook paths publicly — UI is internal only.
    - match: Host(`n8n.kagiso.me`) && PathPrefix(`/webhook/`, `/webhook-test/`)
      kind: Rule
      services:
        - name: n8n
          port: 5678
  tls: {}
