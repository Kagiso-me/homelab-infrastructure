# Grafana IngressRoute
# Grafana itself is deployed by kube-prometheus-stack HelmRelease.
# This resource exposes it via Traefik with TLS from Let's Encrypt.
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana.kagiso.me`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
  tls:
    secretName: grafana-tls
---
# Certificate issued by Let's Encrypt via HTTP-01 challenge.
# kagiso.me is publicly reachable so letsencrypt-prod works.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: monitoring
spec:
  secretName: grafana-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - grafana.kagiso.me
