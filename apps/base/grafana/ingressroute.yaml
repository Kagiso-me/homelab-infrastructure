# Grafana IngressRoute
# Grafana itself is deployed by kube-prometheus-stack HelmRelease.
# TLS is served automatically by the *.kagiso.me wildcard cert via the Traefik
# default TLSStore (platform/networking/traefik-config/tls-store.yaml).
# No per-service Certificate resource is needed.
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana.kagiso.me`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
  tls: {}
