apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: apps
spec:
  interval: 30m
  chart:
    spec:
      chart: nextcloud
      version: ">=4.0.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: flux-system
      interval: 24h
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  # Inject secrets as Helm values — keeps credentials out of this file.
  valuesFrom:
    - kind: Secret
      name: nextcloud-secret
      valuesKey: admin-password
      targetPath: nextcloud.password
    - kind: Secret
      name: nextcloud-secret
      valuesKey: postgresql-password
      targetPath: externalDatabase.password
    - kind: Secret
      name: nextcloud-secret
      valuesKey: smtp-password
      targetPath: nextcloud.mail.smtp.password
  values:
    # Run as www-data (uid 33) so the entrypoint skips rsync --chown (which fails
    # on NFS with mapall). NET_BIND_SERVICE allows Apache to bind to port 80 as
    # a non-root user.
    podSecurityContext:
      fsGroup: 1000
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true

    nextcloud:
      host: cloud.kagiso.me
      username: admin
      # password injected via valuesFrom

      # Redis password injected as env var; used in redis.config.php via getenv()
      # OIDC credentials injected as env vars; used in z-oidc.config.php via getenv()
      extraEnv:
        - name: REDIS_HOST_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-secret
              key: redis-password
        - name: OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: nextcloud-secret
              key: oidc-client-id
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: nextcloud-secret
              key: oidc-client-secret

      # Disable chart's auto-generated redis/proxy configs — we provide our own below.
      defaultConfigs:
        redis.config.php: false
        reverse-proxy.config.php: false

      configs:
        # Reverse-proxy settings — required when running behind Traefik.
        # trusted_proxies must cover the pod network so X-Forwarded-For is trusted.
        z-reverse-proxy.config.php: |-
          <?php
          $CONFIG = array (
            'overwriteprotocol' => 'https',
            'overwritehost' => 'cloud.kagiso.me',
            'trusted_proxies' => array('10.42.0.0/16'),
            'forwarded_for_headers' => array('HTTP_X_FORWARDED_FOR'),
          );
        # Redis caching — use dbindex 1 to avoid key collisions with Authentik (uses 0).
        z-redis.config.php: |-
          <?php
          $CONFIG = array (
            'memcache.local' => '\OC\Memcache\APCu',
            'memcache.distributed' => '\OC\Memcache\Redis',
            'memcache.locking' => '\OC\Memcache\Redis',
            'redis' => array(
              'host' => 'redis-master.databases.svc.cluster.local',
              'port' => 6379,
              'password' => getenv('REDIS_HOST_PASSWORD'),
              'dbindex' => 1,
              'timeout' => 1.5,
            ),
          );
        # Authentik OIDC via oidc_login app.
        # Requires the app to be enabled first:
        #   kubectl exec -n apps deploy/nextcloud-nextcloud -- php /var/www/html/occ app:enable oidc_login
        # Redirect URI to register in Authentik: https://cloud.kagiso.me/apps/oidc_login/oidc
        z-oidc.config.php: |-
          <?php
          $CONFIG = array (
            'oidc_login_provider_url'      => 'https://auth.kagiso.me/application/o/nextcloud/',
            'oidc_login_client_id'         => getenv('OIDC_CLIENT_ID'),
            'oidc_login_client_secret'     => getenv('OIDC_CLIENT_SECRET'),
            'oidc_login_auto_redirect'     => false,
            'oidc_login_end_session_redirect' => true,
            'oidc_login_button_text'       => 'Log in with Authentik',
            'oidc_login_hide_password_form' => false,
            'oidc_login_scope'             => 'openid profile email',
            'oidc_login_attributes'        => array(
              'id'     => 'preferred_username',
              'name'   => 'name',
              'mail'   => 'email',
              'groups' => 'groups',
            ),
            'oidc_create_groups'           => false,
            'oidc_login_disable_registration' => false,
          );

      mail:
        enabled: true
        fromAddress: noreply
        domain: kagiso.me
        smtp:
          host: smtp.resend.com
          port: 587
          secure: tls
          authtype: LOGIN
          name: resend
          # password (Resend API key) injected via valuesFrom

    # Bundled database disabled — using the shared central PostgreSQL instance.
    # The 'nextcloud' database and user must be created before first deploy —
    # see apps/base/nextcloud/README instructions.
    internalDatabase:
      enabled: false

    externalDatabase:
      enabled: true
      type: postgresql
      host: postgresql.databases.svc.cluster.local
      database: nextcloud
      user: nextcloud
      # password injected via valuesFrom

    # Bundled Redis disabled — using the shared central Redis instance.
    redis:
      enabled: false

    # Give Nextcloud time to complete first-run DB setup before probes fire.
    livenessProbe:
      initialDelaySeconds: 120
      periodSeconds: 30
      failureThreshold: 5
    readinessProbe:
      initialDelaySeconds: 60
      periodSeconds: 15
      failureThreshold: 10
    startupProbe:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 30

    persistence:
      enabled: true
      storageClass: nfs-truenas
      accessMode: ReadWriteMany
      size: 50Gi

    # Disable built-in ingress — Traefik IngressRoute is used instead.
    ingress:
      enabled: false

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        interval: 30s
