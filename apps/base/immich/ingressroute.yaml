apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: immich
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    # Block /admin from the public internet — accessible only via internal ingress.
    - match: Host(`photos.kagiso.me`) && PathPrefix(`/admin`)
      kind: Rule
      middlewares:
        - name: block-admin
          namespace: ingress
      services:
        - name: immich-server
          port: 2283
    # Allow all other paths publicly.
    - match: Host(`photos.kagiso.me`)
      kind: Rule
      services:
        - name: immich-server
          port: 2283
  tls: {}
