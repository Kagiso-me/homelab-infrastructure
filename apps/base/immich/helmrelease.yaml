apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: apps
spec:
  interval: 30m
  chart:
    spec:
      chart: immich
      version: ">=0.10.0"
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
      interval: 24h
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
    - kind: Secret
      name: immich-secret
      valuesKey: db-password
      targetPath: env.DB_PASSWORD
  values:
    env:
      TZ: Africa/Johannesburg
      DB_HOSTNAME: postgresql-primary.databases.svc.cluster.local
      DB_PORT: "5432"
      DB_DATABASE_NAME: immich
      DB_USERNAME: immich
      # DB_PASSWORD injected via valuesFrom
      REDIS_HOSTNAME: redis-master.databases.svc.cluster.local
      REDIS_PORT: "6379"
      REDIS_DBINDEX: "2"
      # REDIS_PASSWORD injected as extraEnv below

    # Redis password via env var from secret — DB password uses valuesFrom above.
    # Immich reads REDIS_PASSWORD natively from the environment.
    extraEnv:
      - name: REDIS_PASSWORD
        valueFrom:
          secretKeyRef:
            name: immich-secret
            key: redis-password

    immich:
      persistence:
        library:
          existingClaim: immich-library-pvc

    server:
      ingress:
        main:
          enabled: false

    # Disable bundled Valkey (Redis-compatible) — using shared central Redis.
    valkey:
      enabled: false

    # Machine learning enabled with default settings (CPU-only).
    # Models are cached to an emptyDir; for persistent model cache, add a PVC.
    machine-learning:
      enabled: true
      env:
        TRANSFORMERS_CACHE: /cache
        MACHINE_LEARNING_CACHE_FOLDER: /cache

    metrics:
      enabled: true
