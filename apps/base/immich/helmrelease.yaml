apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: apps
spec:
  interval: 30m
  chart:
    spec:
      chart: immich
      version: ">=0.10.0"
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
      interval: 24h
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
    - kind: Secret
      name: immich-secret
      valuesKey: db-password
      targetPath: controllers.main.containers.main.env.DB_PASSWORD
  values:
    controllers:
      main:
        containers:
          main:
            env:
              TZ: Africa/Johannesburg
              DB_HOSTNAME: postgresql-primary.databases.svc.cluster.local
              DB_PORT: "5432"
              DB_DATABASE_NAME: immich
              DB_USERNAME: immich
              # DB_PASSWORD injected via valuesFrom
              REDIS_HOSTNAME: redis-master.databases.svc.cluster.local
              REDIS_PORT: "6379"
              REDIS_DBINDEX: "2"
              REDIS_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-secret
                    key: redis-password

    immich:
      persistence:
        library:
          existingClaim: immich-library-pvc
      metrics:
        enabled: true

    server:
      ingress:
        main:
          enabled: false

    # Disable bundled Valkey (Redis-compatible) — using shared central Redis.
    valkey:
      enabled: false

    # Machine learning enabled with default settings (CPU-only).
    machine-learning:
      enabled: true
      env:
        TRANSFORMERS_CACHE: /cache
        MACHINE_LEARNING_CACHE_FOLDER: /cache
