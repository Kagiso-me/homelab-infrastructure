apiVersion: v1
kind: Secret
metadata:
  name: immich-secret
  namespace: apps
type: Opaque
stringData:
  # Password for the 'immich' PostgreSQL user.
  # Pre-create the DB and user before first deploy:
  #   kubectl exec -n databases deploy/postgresql -- psql -U postgres -c "CREATE USER immich WITH PASSWORD '<password>';"
  #   kubectl exec -n databases deploy/postgresql -- psql -U postgres -c "CREATE DATABASE immich OWNER immich;"
  db-password: CHANGEME

  # Shared Redis password — same value as in platform/databases/redis/secret.yaml.
  redis-password: CHANGEME
