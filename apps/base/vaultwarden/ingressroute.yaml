apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vaultwarden
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    # Block /admin from the public internet — accessible only via internal ingress.
    - match: Host(`vault.kagiso.me`) && PathPrefix(`/admin`)
      kind: Rule
      middlewares:
        - name: block-admin
          namespace: ingress
      services:
        - name: vaultwarden
          port: 80
    # Allow all other paths publicly.
    - match: Host(`vault.kagiso.me`)
      kind: Rule
      middlewares:
        - name: ingress-secure-headers@kubernetescrd
        - name: ingress-compress@kubernetescrd
        - name: ingress-crowdsec-bouncer@kubernetescrd
        - name: ingress-auth-rate-limit@kubernetescrd
      services:
        - name: vaultwarden
          port: 80
  tls: {}
