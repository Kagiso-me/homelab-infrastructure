apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: apps
spec:
  interval: 30m
  chart:
    spec:
      chart: vaultwarden
      version: ">=0.35.0"
      sourceRef:
        kind: HelmRepository
        name: guerzon
        namespace: flux-system
      interval: 24h
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
    - kind: Secret
      name: vaultwarden-secret
      valuesKey: db-password
      targetPath: database.password
    - kind: Secret
      name: vaultwarden-secret
      valuesKey: admin-token
      targetPath: adminToken.value
  values:
    # Disable bundled database — using shared central PostgreSQL.
    database:
      type: postgresql
      host: postgresql-primary.databases.svc.cluster.local
      port: 5432
      dbName: vaultwarden
      username: vaultwarden
      # password injected via valuesFrom

    adminToken:
      existingSecret: ""
      existingSecretKey: ""
      # value injected via valuesFrom

    domain: "https://vault.kagiso.me"

    # Disable open registration — admin invites only.
    signupsAllowed: false

    # Persistence for data and attachments.
    storage:
      data:
        name: vaultwarden-data
        size: 5Gi
        class: nfs-truenas
        accessMode: ReadWriteOnce

    ingress:
      enabled: false

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi
