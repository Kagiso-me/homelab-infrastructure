apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
  namespace: apps
spec:
  interval: 30m
  chart:
    spec:
      chart: seerr-chart
      version: ">=3.0.0"
      sourceRef:
        kind: HelmRepository
        name: seerr
        namespace: flux-system
      interval: 24h
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    image:
      registry: ghcr.io
      repository: seerr-team/seerr
      tag: ""  # defaults to chart appVersion

    extraEnv:
      - name: TZ
        value: Africa/Johannesburg

    service:
      type: ClusterIP
      port: 80

    config:
      persistence:
        size: 5Gi
        accessModes:
          - ReadWriteOnce
        existingClaim: seerr-config

    ingress:
      enabled: false

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 512Mi
