apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: umami
  namespace: apps
spec:
  interval: 30m
  chart:
    spec:
      chart: umami
      version: ">=7.7.20"
      sourceRef:
        kind: HelmRepository
        name: umami
        namespace: flux-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    umami:
      appSecret:
        existingSecret: umami-secret
      # Disable bundled PostgreSQL — using shared central instance
      postgresql:
        enabled: false

    database:
      existingSecret: umami-secret
      databaseUrlKey: database-url

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
