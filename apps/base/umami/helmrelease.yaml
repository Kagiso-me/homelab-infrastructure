apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: umami
  namespace: apps
spec:
  interval: 30m
  chart:
    spec:
      chart: umami
      version: ">=0.1.0"
      sourceRef:
        kind: HelmRepository
        name: umami
        namespace: flux-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
    - kind: Secret
      name: umami-secret
      valuesKey: app-secret
      targetPath: umami.appSecret
    - kind: Secret
      name: umami-secret
      valuesKey: database-url
      targetPath: umami.databaseUrl
  values:
    umami:
      # Disable bundled PostgreSQL — using shared central instance
      postgresql:
        enabled: false

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
