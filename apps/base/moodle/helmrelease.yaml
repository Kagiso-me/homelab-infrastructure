apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: moodle
  namespace: apps
spec:
  interval: 30m
  chart:
    spec:
      chart: moodle
      version: ">=26.0.5"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
    - kind: Secret
      name: moodle-secret
      valuesKey: moodle-password
      targetPath: moodlePassword
    - kind: Secret
      name: moodle-secret
      valuesKey: postgresql-password
      targetPath: externalDatabase.password
  values:
    moodleUsername: admin
    moodleEmail: ktjeane@outlook.com
    moodleSiteName: "Kagiso LMS"

    # Use shared PostgreSQL — disable bundled database
    postgresql:
      enabled: false
    externalDatabase:
      host: postgresql.databases.svc.cluster.local
      port: 5432
      user: moodle
      database: moodle

    # Disable bundled MariaDB (bitnami chart defaults to MariaDB, override to postgres)
    mariadb:
      enabled: false

    # Local-only — no external ingress
    ingress:
      enabled: false

    service:
      type: ClusterIP

    persistence:
      enabled: true
      storageClass: nfs-truenas
      size: 10Gi
      accessModes:
        - ReadWriteOnce

    # Moodle first-run is slow — give it time
    startupProbe:
      enabled: true
      initialDelaySeconds: 120
      periodSeconds: 15
      failureThreshold: 40
      timeoutSeconds: 10
    livenessProbe:
      enabled: true
      initialDelaySeconds: 180
      periodSeconds: 30
      failureThreshold: 6
      timeoutSeconds: 10
    readinessProbe:
      enabled: true
      initialDelaySeconds: 60
      periodSeconds: 15
      failureThreshold: 10
      timeoutSeconds: 5

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 1Gi

    # Moove theme — modern UI
    extraEnvVars:
      - name: MOODLE_REVERSEPROXY
        value: "yes"
      - name: MOODLE_SSLPROXY
        value: "yes"
