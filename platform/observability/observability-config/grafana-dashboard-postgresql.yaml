apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-postgresql
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Databases"
data:
  postgresql.json: |
    {
      "title": "PostgreSQL Overview",
      "uid": "postgresql-overview",
      "description": "PostgreSQL performance — connections, transactions, cache hit ratio, locks, and database sizes",
      "tags": ["databases", "postgresql"],
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-3h", "to": "now"},
      "timepicker": {},
      "graphTooltip": 1,
      "templating": {
        "list": [
          {
            "name": "datasource",
            "label": "Datasource",
            "type": "datasource",
            "query": "prometheus",
            "refresh": 1,
            "current": {},
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "PostgreSQL Status",
          "gridPos": {"x": 0, "y": 0, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {"type": "value", "options": {"0": {"text": "DOWN", "color": "red"}, "1": {"text": "UP", "color": "green"}}}
              ],
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]},
              "color": {"mode": "thresholds"}
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "textMode": "auto", "graphMode": "none"},
          "targets": [{"expr": "pg_up{job=~\".*postgresql.*\"}", "legendFormat": "status", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Active Connections",
          "gridPos": {"x": 4, "y": 0, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 50}, {"color": "red", "value": 80}]},
              "color": {"mode": "thresholds"},
              "unit": "short"
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "textMode": "auto", "graphMode": "area"},
          "targets": [{"expr": "sum(pg_stat_database_numbackends{job=~\".*postgresql.*\", datname!~\"template.*|postgres\"})", "legendFormat": "connections", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]
        },
        {
          "id": 3,
          "type": "gauge",
          "title": "Cache Hit Ratio",
          "gridPos": {"x": 8, "y": 0, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "min": 0, "max": 1,
              "unit": "percentunit",
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 0.9}, {"color": "green", "value": 0.95}]},
              "color": {"mode": "thresholds"}
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "orientation": "auto", "showThresholdLabels": false, "showThresholdMarkers": true},
          "targets": [{"expr": "sum(pg_stat_database_blks_hit{job=~\".*postgresql.*\"}) / (sum(pg_stat_database_blks_hit{job=~\".*postgresql.*\"}) + sum(pg_stat_database_blks_read{job=~\".*postgresql.*\"}) + 1)", "legendFormat": "hit ratio", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Transactions / sec",
          "gridPos": {"x": 12, "y": 0, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "color": {"mode": "thresholds"}
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "textMode": "auto", "graphMode": "area"},
          "targets": [{"expr": "sum(rate(pg_stat_database_xact_commit{job=~\".*postgresql.*\"}[5m])) + sum(rate(pg_stat_database_xact_rollback{job=~\".*postgresql.*\"}[5m]))", "legendFormat": "tps", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Uptime",
          "gridPos": {"x": 16, "y": 0, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "color": {"mode": "thresholds"}
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "textMode": "auto", "graphMode": "none"},
          "targets": [{"expr": "time() - pg_postmaster_start_time_seconds{job=~\".*postgresql.*\"}", "legendFormat": "uptime", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Connections by Database",
          "gridPos": {"x": 0, "y": 4, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 10}}
          },
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [{"expr": "pg_stat_database_numbackends{job=~\".*postgresql.*\", datname!~\"template.*|postgres\"}", "legendFormat": "{{datname}}", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Transactions / sec",
          "gridPos": {"x": 12, "y": 4, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"unit": "ops", "custom": {"lineWidth": 2, "fillOpacity": 10}}
          },
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {"expr": "sum by (datname) (rate(pg_stat_database_xact_commit{job=~\".*postgresql.*\", datname!~\"template.*|postgres\"}[5m]))", "legendFormat": "commit {{datname}}", "datasource": {"type": "prometheus", "uid": "${datasource}"}},
            {"expr": "sum by (datname) (rate(pg_stat_database_xact_rollback{job=~\".*postgresql.*\", datname!~\"template.*|postgres\"}[5m]))", "legendFormat": "rollback {{datname}}", "datasource": {"type": "prometheus", "uid": "${datasource}"}}
          ]
        },
        {
          "id": 8,
          "type": "bargauge",
          "title": "Database Sizes",
          "gridPos": {"x": 0, "y": 12, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"unit": "bytes", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1073741824}, {"color": "red", "value": 5368709120}]}, "color": {"mode": "thresholds"}}
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "orientation": "horizontal", "displayMode": "gradient"},
          "targets": [{"expr": "pg_database_size_bytes{job=~\".*postgresql.*\", datname!~\"template.*|postgres\"}", "legendFormat": "{{datname}}", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Deadlocks",
          "gridPos": {"x": 12, "y": 12, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 10},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]},
              "color": {"mode": "thresholds"}
            }
          },
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [{"expr": "rate(pg_stat_database_deadlocks{job=~\".*postgresql.*\", datname!~\"template.*|postgres\"}[5m])", "legendFormat": "{{datname}}", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Block I/O Latency",
          "description": "Time spent reading and writing disk blocks. High values indicate storage pressure.",
          "gridPos": {"x": 0, "y": 20, "w": 24, "h": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"unit": "ms", "custom": {"lineWidth": 2, "fillOpacity": 10}}
          },
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {"expr": "sum by (datname) (rate(pg_stat_database_blk_read_time{job=~\".*postgresql.*\", datname!~\"template.*|postgres\"}[5m]))", "legendFormat": "read {{datname}}", "datasource": {"type": "prometheus", "uid": "${datasource}"}},
            {"expr": "sum by (datname) (rate(pg_stat_database_blk_write_time{job=~\".*postgresql.*\", datname!~\"template.*|postgres\"}[5m]))", "legendFormat": "write {{datname}}", "datasource": {"type": "prometheus", "uid": "${datasource}"}}
          ]
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Pod CPU Usage",
          "description": "Actual CPU usage vs configured request (250m). Use to right-size resource requests.",
          "gridPos": {"x": 0, "y": 28, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"unit": "cores", "custom": {"lineWidth": 2, "fillOpacity": 10}}
          },
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {"expr": "sum by (container) (rate(container_cpu_usage_seconds_total{namespace=\"databases\", pod=~\"postgresql.*\", container!=\"\", container!=\"POD\"}[5m]))", "legendFormat": "{{container}} (actual)", "datasource": {"type": "prometheus", "uid": "${datasource}"}},
            {"expr": "kube_pod_container_resource_requests{namespace=\"databases\", pod=~\"postgresql.*\", container=\"postgresql\", resource=\"cpu\"}", "legendFormat": "postgresql (request)", "datasource": {"type": "prometheus", "uid": "${datasource}"}}
          ]
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Pod Memory Usage",
          "description": "Actual memory working set vs configured request (256Mi). Use to right-size resource requests.",
          "gridPos": {"x": 12, "y": 28, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"unit": "bytes", "custom": {"lineWidth": 2, "fillOpacity": 10}}
          },
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {"expr": "sum by (container) (container_memory_working_set_bytes{namespace=\"databases\", pod=~\"postgresql.*\", container!=\"\", container!=\"POD\"})", "legendFormat": "{{container}} (actual)", "datasource": {"type": "prometheus", "uid": "${datasource}"}},
            {"expr": "kube_pod_container_resource_requests{namespace=\"databases\", pod=~\"postgresql.*\", container=\"postgresql\", resource=\"memory\"}", "legendFormat": "postgresql (request)", "datasource": {"type": "prometheus", "uid": "${datasource}"}}
          ]
        }
      ]
    }
