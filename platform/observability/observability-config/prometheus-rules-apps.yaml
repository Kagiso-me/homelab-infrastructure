apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-apps-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: pods
      rules:
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total[30m]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} restarting frequently"
            description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value | printf \"%.0f\" }} times in the last 30 minutes."
        - alert: PodNotReady
          expr: kube_pod_status_phase{phase=~"Pending|Unknown"} > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in {{ $labels.phase }} phase for more than 10 minutes."
        - alert: PodOOMKilled
          expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Container {{ $labels.container }} in {{ $labels.pod }} was OOM killed"
            description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} was terminated due to out-of-memory."
        - alert: DeploymentUnavailable
          expr: kube_deployment_status_replicas_available / kube_deployment_spec_replicas < 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has unavailable replicas"
            description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has {{ $value | printf \"%.0f\" }}% of desired replicas available."
        - alert: ContainerHighMemory
          expr: (container_memory_working_set_bytes{container!="", container!="POD"} / on(namespace, pod, container) kube_pod_container_resource_limits{resource="memory"}) > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Container {{ $labels.container }} using >90% memory limit"
            description: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} is using {{ $value | printf \"%.0f\" }}% of its memory limit."
        - alert: HighPodRestartRate
          expr: sum by(namespace)(increase(kube_pod_container_status_restarts_total[1h])) > 10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High restart rate in namespace {{ $labels.namespace }}"
            description: "Namespace {{ $labels.namespace }} has had {{ $value | printf \"%.0f\" }} container restarts in the last hour."
    - name: databases
      rules:
        - alert: PostgreSQLDown
          expr: pg_up == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "PostgreSQL is down"
            description: "PostgreSQL instance has been unreachable for more than 2 minutes."
        - alert: PostgreSQLHighConnections
          expr: sum(pg_stat_database_numbackends) / pg_settings_max_connections > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL connections above 80%"
            description: "PostgreSQL is using {{ $value | printf \"%.0f\" }}% of maximum connections."
        - alert: RedisDown
          expr: redis_up == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Redis is down"
            description: "Redis instance has been unreachable for more than 2 minutes."
        - alert: RedisHighMemory
          expr: redis_memory_used_bytes / (redis_memory_max_bytes > 0) > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Redis memory above 90%"
            description: "Redis is using {{ $value | printf \"%.0f\" }}% of its maximum configured memory."
    - name: services
      rules:
        - alert: AuthentikDown
          expr: up{job=~".*authentik.*"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Authentik is unreachable"
            description: "Authentik SSO service has been down for more than 2 minutes. Login services are affected."
        - alert: AuthentikHighLoginFailures
          expr: rate(authentik_login_requests_total{successful="false"}[5m]) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High Authentik login failure rate"
            description: "Authentik is seeing {{ $value | printf \"%.2f\" }} failed logins per second. Possible brute-force or misconfiguration."
        - alert: NextcloudDown
          expr: up{job=~".*nextcloud.*"} == 0
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "Nextcloud is unreachable"
            description: "Nextcloud metrics endpoint has been unreachable for more than 3 minutes."
