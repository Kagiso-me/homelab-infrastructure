# AlertmanagerConfig — routes alerts to Discord via Slack-compatible webhooks.
# Credentials (Discord webhook URLs, watchdog URL) are stored in alertmanager-secret.yaml (SOPS-encrypted).
# This config applies to alerts in the 'monitoring' namespace only
# (AlertmanagerConfig is namespace-scoped).
#
# Discord webhooks use the /slack suffix to accept Slack-formatted payloads.
# Each receiver uses a separate webhook URL bound to its own Discord channel.
# The `channel` field is required by Alertmanager but ignored by Discord.
# See ADR-010 for why Discord was chosen over Slack.
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: homelab-alerts
  namespace: monitoring
  labels:
    alertmanagerConfig: homelab
spec:
  route:
    receiver: discord-alerts
    groupBy:
      - alertname
      - namespace
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    routes:
      # Critical alerts go to a dedicated Discord channel
      - receiver: discord-critical
        matchers:
          - name: severity
            value: critical
        repeatInterval: 1h
      # Watchdog (always-on heartbeat) sent to healthchecks.io only
      - receiver: watchdog-webhook
        matchers:
          - name: alertname
            value: Watchdog

  receivers:
    - name: discord-alerts
      slackConfigs:
        - apiURL:
            name: alertmanager-secret
            key: discord-alerts-url
          channel: "#homelab-alerts"   # required field, ignored by Discord
          sendResolved: true
          title: '{{ if eq .Status "firing" }}⚠️ FIRING ({{ .Alerts.Firing | len }}){{ else }}✅ RESOLVED{{ end }} — {{ .CommonLabels.alertname }}'
          text: >-
            {{ range .Alerts -}}
            *{{ .Labels.alertname }}* | `{{ .Labels.severity }}`
            {{ if .Labels.instance }}📍 *Instance:* {{ .Labels.instance }}{{ end }}
            {{ if .Labels.namespace }}📦 *Namespace:* {{ .Labels.namespace }}{{ end }}
            {{ if .Labels.pod }}🔹 *Pod:* {{ .Labels.pod }}{{ end }}
            {{ if .Annotations.summary }}📝 {{ .Annotations.summary }}{{ end }}
            {{ if .Annotations.description }}{{ .Annotations.description }}{{ end }}
            {{ if .StartsAt }}⏱️ *Started:* {{ .StartsAt.Format "2006-01-02 15:04 MST" }}{{ end }}
            ---
            {{ end }}

    - name: discord-critical
      slackConfigs:
        - apiURL:
            name: alertmanager-secret
            key: discord-critical-url
          channel: "#homelab-critical"  # required field, ignored by Discord
          sendResolved: true
          title: '{{ if eq .Status "firing" }}🔥 CRITICAL ({{ .Alerts.Firing | len }}){{ else }}✅ RESOLVED{{ end }} — {{ .CommonLabels.alertname }}'
          text: >-
            {{ range .Alerts -}}
            *{{ .Labels.alertname }}* | `critical`
            {{ if .Labels.instance }}📍 *Instance:* {{ .Labels.instance }}{{ end }}
            {{ if .Labels.namespace }}📦 *Namespace:* {{ .Labels.namespace }}{{ end }}
            {{ if .Labels.pod }}🔹 *Pod:* {{ .Labels.pod }}{{ end }}
            {{ if .Annotations.summary }}📝 {{ .Annotations.summary }}{{ end }}
            {{ if .Annotations.description }}{{ .Annotations.description }}{{ end }}
            {{ if .StartsAt }}⏱️ *Started:* {{ .StartsAt.Format "2006-01-02 15:04 MST" }}{{ end }}
            🔗 <https://grafana.kagiso.me|Grafana>
            ---
            {{ end }}

    - name: watchdog-webhook
      webhookConfigs:
        - urlSecret:
            name: alertmanager-secret
            key: watchdog-webhook-url
          sendResolved: false
