# AlertmanagerConfig — routes alerts to Slack and a generic webhook.
# Credentials (webhook URLs, Slack API URL) are stored in alertmanager-secret.yaml (SOPS-encrypted).
# This config applies to alerts in the 'monitoring' namespace only
# (AlertmanagerConfig is namespace-scoped).
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: homelab-alerts
  namespace: monitoring
  labels:
    alertmanagerConfig: homelab
spec:
  route:
    receiver: slack-alerts
    groupBy:
      - alertname
      - namespace
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    routes:
      # Critical alerts go to a dedicated Slack channel and the webhook
      - receiver: slack-critical
        matchers:
          - name: severity
            value: critical
        repeatInterval: 1h
      # Watchdog (always-on heartbeat) sent to webhook only — keeps alerting pipeline verified
      - receiver: watchdog-webhook
        matchers:
          - name: alertname
            value: Watchdog

  receivers:
    - name: slack-alerts
      slackConfigs:
        - apiURL:
            name: alertmanager-secret
            key: slack-api-url
          channel: "#homelab-alerts"
          sendResolved: true
          title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
          text: >-
            {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }}
            *Severity:* {{ .Labels.severity }}
            *Namespace:* {{ .Labels.namespace }}
            *Description:* {{ .Annotations.description }}
            {{ end }}

    - name: slack-critical
      slackConfigs:
        - apiURL:
            name: alertmanager-secret
            key: slack-api-url
          channel: "#homelab-critical"
          sendResolved: true
          title: ':fire: CRITICAL: {{ .CommonLabels.alertname }}'
          text: >-
            {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }}
            *Namespace:* {{ .Labels.namespace }}
            *Description:* {{ .Annotations.description }}
            *Runbook:* {{ .Annotations.runbook_url }}
            {{ end }}
      webhookConfigs:
        - urlSecret:
            name: alertmanager-secret
            key: webhook-url
          sendResolved: true

    - name: watchdog-webhook
      webhookConfigs:
        - urlSecret:
            name: alertmanager-secret
            key: watchdog-webhook-url
          sendResolved: false
