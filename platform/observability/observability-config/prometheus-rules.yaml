apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: external-infrastructure
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
    - name: truenas.zfs
      rules:
        - alert: ZfsPoolDegraded
          expr: node_zfs_pool_state{job="node-truenas", state!="online"} == 1
          for: 5m
          labels:
            severity: critical
            host: truenas
          annotations:
            summary: "ZFS pool {{ $labels.pool }} is {{ $labels.state }}"
            description: "Pool {{ $labels.pool }} on TrueNAS is not online. Immediate attention required."
            runbook: "https://wiki.homelab/runbooks/zfs-pool-degraded"

        - alert: ZfsPoolScrubStale
          expr: (time() - node_zfs_pool_scrub_time_seconds{job="node-truenas"}) > (35 * 86400)
          for: 1h
          labels:
            severity: warning
            host: truenas
          annotations:
            summary: "ZFS pool {{ $labels.pool }} scrub is overdue"
            description: "Pool {{ $labels.pool }} has not been scrubbed in over 35 days."
            runbook: "https://wiki.homelab/runbooks/zfs-scrub-stale"

    - name: truenas.smart
      rules:
        - alert: SmartDiskHealthFailed
          expr: smartctl_device_smart_status{job="smartctl-truenas"} == 0
          for: 5m
          labels:
            severity: critical
            host: truenas
          annotations:
            summary: "SMART health failed on {{ $labels.device }}"
            description: "Drive {{ $labels.device }} is reporting SMART health failure on TrueNAS."
            runbook: "https://wiki.homelab/runbooks/smart-disk-health-failed"

        - alert: SmartReallocationWarning
          expr: smartctl_device_attribute{job="smartctl-truenas", attribute_name="Reallocated_Sector_Ct", value_type="raw"} > 10
          for: 30m
          labels:
            severity: warning
            host: truenas
          annotations:
            summary: "Reallocated sectors on {{ $labels.device }}"
            description: "Drive {{ $labels.device }} has {{ $value }} reallocated sectors."
            runbook: "https://wiki.homelab/runbooks/smart-reallocated-sectors"

        - alert: SmartTemperatureCritical
          expr: smartctl_device_attribute{job="smartctl-truenas", attribute_name="Temperature_Celsius", value_type="raw"} > 60
          for: 10m
          labels:
            severity: critical
            host: truenas
          annotations:
            summary: "Drive {{ $labels.device }} temperature critical ({{ $value }}°C)"
            description: "Drive temperature exceeds 60°C. Risk of failure."
            runbook: "https://wiki.homelab/runbooks/smart-temperature-critical"

    - name: external.nodes
      rules:
        - alert: ExternalNodeDown
          expr: up{job=~"node-rpi|node-docker-vm|node-truenas"} == 0
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.instance }} is unreachable"
            description: "node-exporter on {{ $labels.instance }} has been unreachable for 3 minutes."
            runbook: "https://wiki.homelab/runbooks/node-down"

        - alert: ExternalNodeDiskFull
          expr: |
            (
              node_filesystem_avail_bytes{job=~"node-docker-vm|node-truenas", fstype!~"tmpfs|fuse.lxcfs"}
              / node_filesystem_size_bytes{job=~"node-docker-vm|node-truenas", fstype!~"tmpfs|fuse.lxcfs"}
            ) < 0.15
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Disk space low on {{ $labels.instance }} ({{ $labels.mountpoint }})"
            description: "Less than 15% disk space remaining on {{ $labels.mountpoint }}."
            runbook: "https://wiki.homelab/runbooks/disk-full"

        - alert: ExternalNodeHighMemory
          expr: |
            (
              1 - (node_memory_MemAvailable_bytes{job=~"node-rpi|node-docker-vm"}
              / node_memory_MemTotal_bytes{job=~"node-rpi|node-docker-vm"})
            ) > 0.90
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage on {{ $labels.instance }} ({{ $value | humanizePercentage }})"
            description: "Memory usage on {{ $labels.instance }} has been above 90% for 10 minutes."
            runbook: "https://wiki.homelab/runbooks/high-memory"

    - name: databases
      rules:
        - alert: PostgreSQLDown
          expr: pg_up{job=~".*postgresql.*"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "PostgreSQL is unreachable"
            description: "postgres_exporter cannot connect to PostgreSQL. All apps depending on the shared database are affected."
            runbook: "https://wiki.homelab/runbooks/postgresql-down"

        - alert: PostgreSQLHighConnections
          expr: |
            sum(pg_stat_database_numbackends{job=~".*postgresql.*"})
            / sum(pg_settings_max_connections{job=~".*postgresql.*"}) > 0.80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL connection usage above 80%"
            description: "{{ $value | humanizePercentage }} of max_connections in use. Risk of connection exhaustion."
            runbook: "https://wiki.homelab/runbooks/postgresql-high-connections"

        - alert: RedisDown
          expr: redis_up{job=~".*redis.*"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Redis is unreachable"
            description: "redis_exporter cannot connect to Redis. Session and cache services are degraded."
            runbook: "https://wiki.homelab/runbooks/redis-down"

        - alert: RedisHighMemory
          expr: redis_memory_used_bytes{job=~".*redis.*"} / redis_memory_max_bytes{job=~".*redis.*"} > 0.90
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Redis memory usage above 90%"
            description: "Redis is using {{ $value | humanizePercentage }} of its configured maxmemory. Eviction may begin."
            runbook: "https://wiki.homelab/runbooks/redis-high-memory"

        - alert: DatabaseBackupJobFailed
          expr: kube_job_status_failed{namespace="databases", job_name=~"postgresql-backup.*"} > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL backup job failed"
            description: "The postgresql-backup CronJob has a failed run. Check logs: kubectl logs -n databases -l job-name=<job>"
            runbook: "https://wiki.homelab/runbooks/backup-job-failed"

        - alert: DatabaseBackupNotRun
          expr: |
            (time() - kube_cronjob_status_last_schedule_time{namespace="databases", cronjob="postgresql-backup"}) > 90000
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL backup has not run in 25 hours"
            description: "The postgresql-backup CronJob last ran {{ $value | humanizeDuration }} ago."
            runbook: "https://wiki.homelab/runbooks/backup-job-failed"

    - name: external.backups
      rules:
        - alert: EtcdBackupDirectoryEmpty
          # Filesystem-side check: the etcd backup destination on TrueNAS
          # reports zero bytes, indicating no snapshots have been written.
          # This is complementary to the textfile-metric alerts in the
          # Docker-hosted Prometheus (backups.yml) — it catches the case
          # where backups stopped reaching the destination even if the
          # source script appears healthy.
          expr: >
            node_directory_size_bytes{
              job="node-truenas",
              path="/mnt/archive/backups/k8s/etcd"
            } == 0
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "etcd backup directory on TrueNAS is empty"
            description: >
              The directory /mnt/archive/backups/k8s/etcd on TrueNAS is
              reporting zero bytes. No etcd snapshots appear to have been
              written to the destination. Verify the backup cron job on tywin
              is running and that the NFS/SMB mount is reachable from tywin.
            runbook: "https://wiki.homelab/runbooks/backup-metrics-missing"
