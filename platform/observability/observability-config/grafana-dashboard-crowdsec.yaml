apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-crowdsec
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Security"
data:
  crowdsec.json: |
    {
      "title": "CrowdSec",
      "uid": "crowdsec-security",
      "description": "CrowdSec — active bans, decisions, attack scenarios, and threat geo origins",
      "tags": ["security", "crowdsec"],
      "schemaVersion": 38,
      "version": 2,
      "refresh": "1m",
      "time": {"from": "now-24h", "to": "now"},
      "timepicker": {},
      "graphTooltip": 1,
      "templating": {
        "list": [
          {
            "name": "datasource",
            "label": "Datasource",
            "type": "datasource",
            "query": "prometheus",
            "refresh": 1,
            "current": {},
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 100,
          "type": "row",
          "title": "Status",
          "collapsed": false,
          "gridPos": {"x": 0, "y": 0, "w": 24, "h": 1},
          "panels": []
        },
        {
          "id": 1,
          "type": "stat",
          "title": "Active Bans",
          "description": "Total number of IPs currently banned by CrowdSec decisions.",
          "gridPos": {"x": 0, "y": 1, "w": 4, "h": 5},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 10}, {"color": "red", "value": 100}]},
              "color": {"mode": "thresholds"},
              "noValue": "N/A"
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "textMode": "auto",
            "graphMode": "area",
            "justifyMode": "center"
          },
          "targets": [
            {"expr": "sum(cs_active_decisions)", "legendFormat": "bans", "datasource": {"type": "prometheus", "uid": "${datasource}"}}
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "New Decisions (1h)",
          "description": "New banning decisions issued in the last hour.",
          "gridPos": {"x": 4, "y": 1, "w": 4, "h": 5},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "color": {"mode": "fixed", "fixedColor": "#FF9830"},
              "noValue": "N/A"
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "value",
            "textMode": "auto",
            "graphMode": "area",
            "justifyMode": "center"
          },
          "targets": [
            {"expr": "increase(cs_active_decisions[1h])", "legendFormat": "new decisions", "datasource": {"type": "prometheus", "uid": "${datasource}"}}
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Alerts (24h)",
          "description": "Number of bucket overflows (triggered attack scenarios) in the last 24 hours.",
          "gridPos": {"x": 8, "y": 1, "w": 4, "h": 5},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]},
              "color": {"mode": "thresholds"},
              "noValue": "N/A"
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "textMode": "auto",
            "graphMode": "area",
            "justifyMode": "center"
          },
          "targets": [
            {"expr": "increase(cs_buckets_overflow_total[24h])", "legendFormat": "alerts", "datasource": {"type": "prometheus", "uid": "${datasource}"}}
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "LAPI Status",
          "description": "Whether the CrowdSec Local API is reachable by Prometheus.",
          "gridPos": {"x": 12, "y": 1, "w": 4, "h": 5},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {"type": "value", "options": {"0": {"text": "DOWN", "color": "red"}, "1": {"text": "UP", "color": "green"}}}
              ],
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]},
              "color": {"mode": "thresholds"},
              "noValue": "N/A"
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "textMode": "auto",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "targets": [
            {"expr": "up{job=~\".*crowdsec.*lapi.*\"}", "legendFormat": "lapi", "datasource": {"type": "prometheus", "uid": "${datasource}"}}
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Agents Online",
          "description": "Number of CrowdSec agents currently reporting to LAPI.",
          "gridPos": {"x": 16, "y": 1, "w": 4, "h": 5},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]},
              "color": {"mode": "thresholds"},
              "noValue": "N/A"
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "value",
            "textMode": "auto",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "targets": [
            {"expr": "count(up{job=~\".*crowdsec.*agent.*\"} == 1)", "legendFormat": "agents", "datasource": {"type": "prometheus", "uid": "${datasource}"}}
          ]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Bouncer Requests (1h)",
          "description": "Number of auth check requests made by bouncers to LAPI in the last hour.",
          "gridPos": {"x": 20, "y": 1, "w": 4, "h": 5},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "color": {"mode": "fixed", "fixedColor": "#5794F2"},
              "noValue": "N/A"
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "value",
            "textMode": "auto",
            "graphMode": "area",
            "justifyMode": "center"
          },
          "targets": [
            {"expr": "increase(gin_requests_total{job=~\".*bouncer.*\"}[1h]) or vector(0)", "legendFormat": "bouncer requests", "datasource": {"type": "prometheus", "uid": "${datasource}"}}
          ]
        },
        {
          "id": 101,
          "type": "row",
          "title": "Activity",
          "collapsed": false,
          "gridPos": {"x": 0, "y": 6, "w": 24, "h": 1},
          "panels": []
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Active Bans Over Time",
          "description": "Total number of active banning decisions over the selected time window.",
          "gridPos": {"x": 0, "y": 7, "w": 12, "h": 9},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "min": 0,
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "spanNulls": 300000
              }
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "active bans"},
                "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "#F2495C"}}]
              }
            ]
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "desc"},
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"]}
          },
          "targets": [
            {"expr": "sum(cs_active_decisions)", "legendFormat": "active bans", "datasource": {"type": "prometheus", "uid": "${datasource}"}}
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "New Decisions Rate",
          "description": "Rate at which new banning decisions are being issued.",
          "gridPos": {"x": 12, "y": 7, "w": 12, "h": 9},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "decimals": 3,
              "min": 0,
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "spanNulls": 300000
              }
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "decisions/s"},
                "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "#FF9830"}}]
              }
            ]
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "desc"},
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"]}
          },
          "targets": [
            {"expr": "rate(cs_buckets_overflow_total[5m])", "legendFormat": "decisions/s", "datasource": {"type": "prometheus", "uid": "${datasource}"}}
          ]
        },
        {
          "id": 102,
          "type": "row",
          "title": "Threat Analysis",
          "collapsed": false,
          "gridPos": {"x": 0, "y": 16, "w": 24, "h": 1},
          "panels": []
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Parser Success Rate",
          "description": "Rate of successfully parsed log lines per parser stage.",
          "gridPos": {"x": 0, "y": 17, "w": 12, "h": 9},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "decimals": 2,
              "min": 0,
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "spanNulls": 300000
              }
            }
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "desc"},
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"]}
          },
          "targets": [
            {"expr": "rate(cs_parsers_hits_ok_total[5m])", "legendFormat": "{{parser}}", "datasource": {"type": "prometheus", "uid": "${datasource}"}}
          ]
        },
        {
          "id": 10,
          "type": "bargauge",
          "title": "Top Attack Scenarios",
          "description": "Cumulative overflow count per attack scenario — shows which scenario types are most active.",
          "gridPos": {"x": 12, "y": 17, "w": 12, "h": 9},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 100}, {"color": "red", "value": 1000}]},
              "color": {"mode": "thresholds"}
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "horizontal",
            "displayMode": "gradient"
          },
          "targets": [
            {"expr": "topk(10, sum by (name) (cs_buckets_overflow_total))", "legendFormat": "{{name}}", "instant": true, "datasource": {"type": "prometheus", "uid": "${datasource}"}}
          ]
        },
        {
          "id": 103,
          "type": "row",
          "title": "Geographic Distribution",
          "collapsed": false,
          "gridPos": {"x": 0, "y": 26, "w": 24, "h": 1},
          "panels": []
        },
        {
          "id": 11,
          "type": "geomap",
          "title": "Threat Origins",
          "description": "Active bans by country of origin. Requires GeoIP enrichment to be enabled in CrowdSec.",
          "gridPos": {"x": 0, "y": 27, "w": 24, "h": 12},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "view": {"id": "zero", "lat": 20, "lon": 0, "zoom": 1.5},
            "controls": {"showZoom": true, "mouseWheelZoom": true, "showAttribution": true, "showScale": false},
            "basemap": {"type": "default", "name": "Basemap"},
            "layers": [
              {
                "type": "choropleth",
                "name": "Countries",
                "config": {
                  "style": {
                    "colorScale": "interpolateOrRd",
                    "colorField": {"fixed": "Value"},
                    "opacity": 0.6,
                    "fillOpacity": 0.7
                  }
                },
                "location": {
                  "mode": "lookup",
                  "lookupField": "country",
                  "gazetteer": "public/gazetteer/countries.json"
                }
              }
            ],
            "tooltip": {"mode": "details"}
          },
          "fieldConfig": {
            "defaults": {
              "custom": {"hideFrom": {"legend": false, "tooltip": false, "viz": false}},
              "thresholds": {"mode": "absolute", "steps": [{"color": "yellow", "value": null}, {"color": "orange", "value": 5}, {"color": "red", "value": 25}]},
              "color": {"mode": "thresholds"}
            }
          },
          "targets": [
            {"expr": "sum by (country) (cs_active_decisions{country!=\"\"})", "legendFormat": "{{country}}", "datasource": {"type": "prometheus", "uid": "${datasource}"}}
          ]
        },
        {
          "id": 12,
          "type": "text",
          "title": "",
          "gridPos": {"x": 0, "y": 39, "w": 24, "h": 3},
          "options": {
            "mode": "markdown",
            "content": "**Note:** The geo map requires CrowdSec to be performing GeoIP enrichment. If the map is empty, the `country` label may not be present in `cs_active_decisions` — this is normal on first deploy. The map will populate as the community blocklist downloads and active decisions are made."
          }
        }
      ]
    }
