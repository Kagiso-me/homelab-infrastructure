            "defaults": {
              "color": {"mode": "thresholds"},
              "noValue": "DOWN",
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 60}, {"color": "green", "value": 3600}]},
              "unit": "dtdhms",
              "mappings": []
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 3, "x": 0, "y": 1},
          "id": 2,
          "options": {"colorMode": "background", "graphMode": "area", "justifyMode": "center", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "text": {"valueSize": 16}, "textMode": "value_and_name"},
          "title": "bran",
          "description": "Raspberry Pi 3B+ — 10.0.10.10",
          "type": "stat",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "time() - node_boot_time_seconds{instance=\"rpi\"}", "legendFormat": "", "refId": "A"}]
        },

