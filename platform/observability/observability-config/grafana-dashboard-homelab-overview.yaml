      "annotations": {"list": [{"builtIn": 1, "datasource": {"type": "grafana", "uid": "-- Grafana --"}, "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard"}]},
      "description": "Homelab command centre — nodes, storage, compute, temperatures, kubernetes, disk I/O, and network",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["homelab", "overview"],
      "templating": {
        "list": [
          {"current": {}, "hide": 0, "label": "Datasource", "name": "datasource", "query": "prometheus", "refresh": 1, "type": "datasource"}
        ]
      },
      "time": {"from": "now-6h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Homelab Overview",
      "uid": "homelab-overview-v2",
      "version": 2,
      "panels": [

        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
