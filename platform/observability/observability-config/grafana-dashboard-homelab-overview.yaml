apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-homelab-overview
  namespace: monitoring
  labels:
    # Picked up by the Grafana sidecar bundled with kube-prometheus-stack.
    # Hot-loaded into Grafana without a pod restart.
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Homelab"
data:
  homelab-overview.json: |
