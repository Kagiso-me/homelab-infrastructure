apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-backup-overview
  namespace: monitoring
  labels:
    # Picked up by the Grafana sidecar (grafana/grafana-sidecar) bundled with
    # kube-prometheus-stack. The sidecar watches all namespaces for ConfigMaps
    # with this label and hot-loads them into Grafana without a pod restart.
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Backups"
data:
  backup-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "grafana", "uid": "-- Grafana --"},
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Homelab backup health — job status, staleness, sizes, durations, and failure counts across all backup targets",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {
                  "options": {"0": {"color": "green", "index": 0, "text": "All OK"}},
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "text": {},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "count(backup_job_status == 0) or vector(0)",
              "instant": true,
              "legendFormat": "Failing",
              "refId": "A"
            }
          ],
          "title": "Failing Jobs",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {
                  "options": {"0": {"color": "red", "index": 0, "text": "None"}},
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "text": {},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "count(backup_job_status) or vector(0)",
              "instant": true,
              "legendFormat": "Jobs Reporting",
              "refId": "A"
            }
          ],
          "title": "Jobs Reporting",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 72000},
                  {"color": "red", "value": 90000}
                ]
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "text": {},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "max(time() - backup_last_success_timestamp)",
              "instant": true,
              "legendFormat": "Oldest Backup",
              "refId": "A"
            }
          ],
          "title": "Oldest Backup Age",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {
                  "options": {"0": {"color": "green", "index": 0, "text": "None"}},
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "text": {},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(increase(backup_failures_total[24h])) or vector(0)",
              "instant": true,
              "legendFormat": "Failures",
              "refId": "A"
            }
          ],
          "title": "Failures (24h)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "custom": {
                "align": "left",
                "cellOptions": {"type": "auto"},
                "filterable": true,
                "inspect": false
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              }
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Status"},
                "properties": [
                  {"id": "custom.width", "value": 100},
                  {"id": "custom.cellOptions", "value": {"type": "color-background", "mode": "basic"}},
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "options": {
                          "0": {"color": "red", "index": 0, "text": "FAILED"},
                          "1": {"color": "green", "index": 1, "text": "OK"}
                        },
                        "type": "value"
                      }
                    ]
                  },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {"color": "red", "value": null},
                        {"color": "green", "value": 1}
                      ]
                    }
                  }
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Last Success Age"},
                "properties": [
                  {"id": "unit", "value": "s"},
                  {"id": "custom.width", "value": 160},
                  {"id": "custom.cellOptions", "value": {"type": "color-text"}},
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {"color": "green", "value": null},
                        {"color": "yellow", "value": 72000},
                        {"color": "red", "value": 90000}
                      ]
                    }
                  }
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Size"},
                "properties": [
                  {"id": "unit", "value": "bytes"},
                  {"id": "custom.width", "value": 120}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Duration"},
                "properties": [
                  {"id": "unit", "value": "s"},
                  {"id": "custom.width", "value": 110}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Total Failures"},
                "properties": [
                  {"id": "custom.width", "value": 110},
                  {"id": "custom.cellOptions", "value": {"type": "color-text"}},
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {"color": "green", "value": null},
                        {"color": "red", "value": 1}
                      ]
                    }
                  }
                ]
              }
            ]
          },
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 4},
          "id": 5,
          "options": {
            "cellHeight": "md",
            "footer": {"countRows": false, "fields": "", "reducer": ["sum"], "show": false},
            "showHeader": true,
            "sortBy": [{"desc": false, "displayName": "Job"}]
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "backup_job_status",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "time() - backup_last_success_timestamp",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "backup_size_bytes",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "C"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "backup_duration_seconds",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "D"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "backup_failures_total",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "E"
            }
          ],
          "title": "Backup Job Summary",
          "transformations": [
            {"id": "merge", "options": {}},
            {
              "id": "organize",
              "options": {
                "excludeByName": {"Time": true, "__name__": true, "instance": true},
                "renameByName": {
                  "job": "Job",
                  "Value #A": "Status",
                  "Value #B": "Last Success Age",
                  "Value #C": "Size",
                  "Value #D": "Duration",
                  "Value #E": "Total Failures"
                },
                "indexByName": {
                  "job": 0, "Value #A": 1, "Value #B": 2,
                  "Value #C": 3, "Value #D": 4, "Value #E": 5
                }
              }
            }
          ],
          "type": "table"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "max": 172800,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 72000},
                  {"color": "red", "value": 90000}
                ]
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 14},
          "id": 6,
          "options": {
            "displayMode": "lcd",
            "minVizHeight": 10,
            "minVizWidth": 0,
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showUnfilled": true,
            "valueMode": "color"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "time() - backup_last_success_timestamp",
              "instant": true,
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ],
          "title": "Time Since Last Backup",
          "type": "bargauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 1000000},
                  {"color": "green", "value": 10000000}
                ]
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 14},
          "id": 7,
          "options": {
            "displayMode": "lcd",
            "minVizHeight": 10,
            "minVizWidth": 0,
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showUnfilled": true,
            "valueMode": "color"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "backup_size_bytes",
              "instant": true,
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ],
          "title": "Backup Sizes",
          "type": "bargauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 16, "x": 0, "y": 22},
          "id": 8,
          "options": {
            "legend": {"calcs": ["last", "max"], "displayMode": "table", "placement": "right", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "backup_duration_seconds",
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ],
          "title": "Backup Duration Trend",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {
                  "options": {"0": {"color": "green", "index": 0, "text": "0"}},
                  "type": "value"
                }
              ],
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 22},
          "id": 9,
          "options": {
            "displayMode": "lcd",
            "minVizHeight": 10,
            "minVizWidth": 0,
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showUnfilled": true,
            "valueMode": "color"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "backup_failures_total",
              "instant": true,
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ],
          "title": "Total Failures by Job",
          "type": "bargauge"
        }
      ],
      "refresh": "5m",
      "schemaVersion": 39,
      "tags": ["backups", "homelab"],
      "templating": {
        "list": [
          {
            "current": {"selected": false, "text": "Prometheus", "value": "prometheus"},
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "type": "datasource"
          }
        ]
      },
      "time": {"from": "now-24h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Backup Overview",
      "uid": "homelab-backups",
      "version": 1
    }
