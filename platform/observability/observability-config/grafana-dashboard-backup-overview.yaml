apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-backup-overview
  namespace: monitoring
  labels:
    # Picked up by the Grafana sidecar (grafana/grafana-sidecar) bundled with
    # kube-prometheus-stack. The sidecar watches all namespaces for ConfigMaps
    # with this label and hot-loads them into Grafana without a pod restart.
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Backups"
data:
  backup-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "grafana", "uid": "-- Grafana --"},
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Homelab backup health — job status, staleness, sizes, durations, and failure counts across all backup targets",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "refresh": "5m",
      "schemaVersion": 39,
      "tags": ["backups", "homelab"],
      "templating": {
        "list": [
          {
            "current": {"selected": false, "text": "Prometheus", "value": "prometheus"},
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "type": "datasource"
          }
        ]
      },
      "time": {"from": "now-24h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Backup Overview",
      "uid": "homelab-backups",
      "version": 2,
      "panels": [
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 100,
          "title": "Backup Jobs",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Number of backup jobs currently reporting a failure status.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {
                  "options": {"0": {"color": "green", "index": 0, "text": "All OK"}},
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "unit": "short",
              "decimals": 0,
              "noValue": "N/A"
            },
            "overrides": []
          },
          "gridPos": {"h": 5, "w": 6, "x": 0, "y": 1},
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "text": {},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "count(backup_job_status == 0) or vector(0)",
              "instant": true,
              "legendFormat": "Failing",
              "refId": "A"
            }
          ],
          "title": "Failing Jobs",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Number of backup jobs currently sending metrics to Prometheus.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {
                  "options": {"0": {"color": "red", "index": 0, "text": "None"}},
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              },
              "unit": "short",
              "decimals": 0,
              "noValue": "N/A"
            },
            "overrides": []
          },
          "gridPos": {"h": 5, "w": 6, "x": 6, "y": 1},
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "text": {},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "count(backup_job_status) or vector(0)",
              "instant": true,
              "legendFormat": "Jobs Reporting",
              "refId": "A"
            }
          ],
          "title": "Jobs Reporting",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Age of the most stale backup across all jobs. Yellow >20h, red >25h.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 72000},
                  {"color": "red", "value": 90000}
                ]
              },
              "unit": "s",
              "noValue": "N/A"
            },
            "overrides": []
          },
          "gridPos": {"h": 5, "w": 6, "x": 12, "y": 1},
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "text": {},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "max(time() - backup_last_success_timestamp)",
              "instant": true,
              "legendFormat": "Oldest Backup",
              "refId": "A"
            }
          ],
          "title": "Oldest Backup Age",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Total backup failures recorded across all jobs in the last 24 hours.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {
                  "options": {"0": {"color": "green", "index": 0, "text": "None"}},
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "unit": "short",
              "decimals": 0,
              "noValue": "N/A"
            },
            "overrides": []
          },
          "gridPos": {"h": 5, "w": 6, "x": 18, "y": 1},
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "text": {},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(increase(backup_failures_total[24h])) or vector(0)",
              "instant": true,
              "legendFormat": "Failures",
              "refId": "A"
            }
          ],
          "title": "Failures (24h)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "custom": {
                "align": "left",
                "cellOptions": {"type": "auto"},
                "filterable": true,
                "inspect": false
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              }
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Status"},
                "properties": [
                  {"id": "custom.width", "value": 100},
                  {"id": "custom.cellOptions", "value": {"type": "color-background", "mode": "basic"}},
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "options": {
                          "0": {"color": "red", "index": 0, "text": "FAILED"},
                          "1": {"color": "green", "index": 1, "text": "OK"}
                        },
                        "type": "value"
                      }
                    ]
                  },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {"color": "red", "value": null},
                        {"color": "green", "value": 1}
                      ]
                    }
                  }
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Last Success Age"},
                "properties": [
                  {"id": "unit", "value": "s"},
                  {"id": "custom.width", "value": 160},
                  {"id": "custom.cellOptions", "value": {"type": "color-text"}},
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {"color": "green", "value": null},
                        {"color": "yellow", "value": 72000},
                        {"color": "red", "value": 90000}
                      ]
                    }
                  }
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Size"},
                "properties": [
                  {"id": "unit", "value": "bytes"},
                  {"id": "custom.width", "value": 120}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Duration"},
                "properties": [
                  {"id": "unit", "value": "s"},
                  {"id": "custom.width", "value": 110}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Total Failures"},
                "properties": [
                  {"id": "custom.width", "value": 110},
                  {"id": "custom.cellOptions", "value": {"type": "color-text"}},
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {"color": "green", "value": null},
                        {"color": "red", "value": 1}
                      ]
                    }
                  }
                ]
              }
            ]
          },
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 6},
          "id": 5,
          "options": {
            "cellHeight": "md",
            "footer": {"countRows": false, "fields": "", "reducer": ["sum"], "show": false},
            "showHeader": true,
            "sortBy": [{"desc": false, "displayName": "Job"}]
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "backup_job_status",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "time() - backup_last_success_timestamp",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "backup_size_bytes",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "C"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "backup_duration_seconds",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "D"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "backup_failures_total",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "E"
            }
          ],
          "title": "Backup Job Summary",
          "transformations": [
            {"id": "merge", "options": {}},
            {
              "id": "organize",
              "options": {
                "excludeByName": {"Time": true, "__name__": true, "instance": true},
                "renameByName": {
                  "job": "Job",
                  "Value #A": "Status",
                  "Value #B": "Last Success Age",
                  "Value #C": "Size",
                  "Value #D": "Duration",
                  "Value #E": "Total Failures"
                },
                "indexByName": {
                  "job": 0, "Value #A": 1, "Value #B": 2,
                  "Value #C": 3, "Value #D": 4, "Value #E": 5
                }
              }
            }
          ],
          "type": "table"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Time since each job's last successful run. Green <20h, yellow <25h, red >25h.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "max": 172800,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 72000},
                  {"color": "red", "value": 90000}
                ]
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "id": 6,
          "options": {
            "displayMode": "lcd",
            "minVizHeight": 10,
            "minVizWidth": 0,
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showUnfilled": true,
            "valueMode": "color"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "time() - backup_last_success_timestamp",
              "instant": true,
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ],
          "title": "Time Since Last Backup",
          "type": "bargauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Size of the most recent backup archive per job.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 1000000},
                  {"color": "green", "value": 10000000}
                ]
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "id": 7,
          "options": {
            "displayMode": "lcd",
            "minVizHeight": 10,
            "minVizWidth": 0,
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showUnfilled": true,
            "valueMode": "color"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "backup_size_bytes",
              "instant": true,
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ],
          "title": "Backup Sizes",
          "type": "bargauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "How long each backup job takes to complete over time.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "spanNulls": 300000
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 16, "x": 0, "y": 24},
          "id": 8,
          "options": {
            "legend": {"calcs": ["last", "max"], "displayMode": "table", "placement": "right", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "backup_duration_seconds",
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ],
          "title": "Backup Duration Trend",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Cumulative failure count per backup job.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {
                  "options": {"0": {"color": "green", "index": 0, "text": "0"}},
                  "type": "value"
                }
              ],
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 24},
          "id": 9,
          "options": {
            "displayMode": "lcd",
            "minVizHeight": 10,
            "minVizWidth": 0,
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showUnfilled": true,
            "valueMode": "color"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "backup_failures_total",
              "instant": true,
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ],
          "title": "Total Failures by Job",
          "type": "bargauge"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 32},
          "id": 10,
          "title": "Velero Cluster Backups",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Time since the last successful Velero cluster backup. Yellow >25h, red >30h.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 90000},
                  {"color": "red", "value": 108000}
                ]
              },
              "unit": "s",
              "noValue": "N/A"
            }
          },
          "gridPos": {"h": 5, "w": 6, "x": 0, "y": 33},
          "id": 11,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "time() - velero_backup_last_successful_timestamp{schedule=\"daily-cluster-backup\"}",
              "instant": true,
              "legendFormat": "age",
              "refId": "A"
            }
          ],
          "title": "Last Backup Age",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Number of successful Velero cluster backups in the last 7 days.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              },
              "unit": "short",
              "decimals": 0,
              "noValue": "N/A"
            }
          },
          "gridPos": {"h": 5, "w": 4, "x": 6, "y": 33},
          "id": 12,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "increase(velero_backup_success_total{schedule=\"daily-cluster-backup\"}[7d])",
              "instant": true,
              "legendFormat": "successes",
              "refId": "A"
            }
          ],
          "title": "Successes (7d)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Number of failed Velero cluster backups in the last 7 days.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [{"type": "value", "options": {"0": {"text": "None", "color": "green"}}}],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "unit": "short",
              "decimals": 0,
              "noValue": "N/A"
            }
          },
          "gridPos": {"h": 5, "w": 4, "x": 10, "y": 33},
          "id": 13,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "increase(velero_backup_failure_total{schedule=\"daily-cluster-backup\"}[7d]) or vector(0)",
              "instant": true,
              "legendFormat": "failures",
              "refId": "A"
            }
          ],
          "title": "Failures (7d)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Number of Velero node-agent DaemonSet pods in Ready state.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 2},
                  {"color": "green", "value": 3}
                ]
              },
              "unit": "short",
              "decimals": 0,
              "noValue": "N/A"
            }
          },
          "gridPos": {"h": 5, "w": 4, "x": 14, "y": 33},
          "id": 14,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "kube_daemonset_status_number_ready{namespace=\"velero\", daemonset=\"node-agent\"}",
              "instant": true,
              "legendFormat": "ready",
              "refId": "A"
            }
          ],
          "title": "Node-Agent Pods Ready",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Time since the postgresql-backup CronJob last ran.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 90000},
                  {"color": "red", "value": 108000}
                ]
              },
              "unit": "s",
              "noValue": "N/A"
            }
          },
          "gridPos": {"h": 5, "w": 6, "x": 18, "y": 33},
          "id": 15,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "time() - kube_cronjob_status_last_schedule_time{namespace=\"databases\", cronjob=\"postgresql-backup\"}",
              "instant": true,
              "legendFormat": "age",
              "refId": "A"
            }
          ],
          "title": "pg_dump Last Run",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "description": "Average Velero cluster backup duration over time.",
