apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-authentik
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Apps"
data:
  authentik.json: |
    {
      "uid": "rpfmFFz7z",
      "title": "Authentik SSO",
      "description": "Authentik SSO authentication metrics, login rates, and resource usage",
      "tags": ["authentik", "sso", "auth"],
      "schemaVersion": 39,
      "refresh": "30s",
      "time": { "from": "now-6h", "to": "now" },
      "graphTooltip": 1,
      "editable": false,
      "fiscalYearStartMonth": 0,
      "liveNow": false,
      "timezone": "browser",
      "weekStart": "",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "options": [],
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false
          }
        ]
      },
      "panels": [
        {
          "type": "row",
          "title": "Status",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "panels": []
        },
        {
          "type": "stat",
          "title": "Server Up",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 3, "x": 0, "y": 1 },
          "id": 2,
          "targets": [
            {
              "expr": "up{job=~\".*authentik.*\"}",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "1": { "text": "Up", "color": "green", "index": 0 },
                    "0": { "text": "Down", "color": "red", "index": 1 }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": ["lastNotNull"],
              "fields": ""
            },
            "graphMode": "none",
            "colorMode": "background",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Total Users",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 3, "y": 1 },
          "id": 3,
          "targets": [
            {
              "expr": "authentik_admin_users_total",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": ["lastNotNull"],
              "fields": ""
            },
            "graphMode": "none",
            "colorMode": "background",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "type": "gauge",
          "title": "Login Success Rate",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 5, "x": 7, "y": 1 },
          "id": 4,
          "targets": [
            {
              "expr": "sum(rate(authentik_login_requests_total{successful=\"true\"}[1h])) / sum(rate(authentik_login_requests_total[1h])) * 100",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 80 },
                  { "color": "green", "value": 95 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": ["lastNotNull"],
              "fields": ""
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          }
        },
        {
          "type": "stat",
          "title": "Failed Logins (1h)",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 },
          "id": 5,
          "targets": [
            {
              "expr": "sum(increase(authentik_login_requests_total{successful=\"false\"}[1h]))",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 20 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": ["lastNotNull"],
              "fields": ""
            },
            "graphMode": "none",
            "colorMode": "background",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Active Sessions",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 },
          "id": 6,
          "targets": [
            {
              "expr": "authentik_sessions_total",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": ["lastNotNull"],
              "fields": ""
            },
            "graphMode": "none",
            "colorMode": "background",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Providers",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 },
          "id": 7,
          "targets": [
            {
              "expr": "authentik_providers_total",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "purple", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": ["lastNotNull"],
              "fields": ""
            },
            "graphMode": "none",
            "colorMode": "background",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "type": "row",
          "title": "Authentication",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 8,
          "panels": []
        },
        {
          "type": "timeseries",
          "title": "Login Rate",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "id": 9,
          "targets": [
            {
              "expr": "sum(rate(authentik_login_requests_total{successful=\"true\"}[5m]))",
              "legendFormat": "Success",
              "refId": "A"
            },
            {
              "expr": "sum(rate(authentik_login_requests_total{successful=\"false\"}[5m]))",
              "legendFormat": "Failed",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "lineWidth": 2
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Success" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Failed" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              }
            ]
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "type": "timeseries",
          "title": "HTTP Request Latency",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "id": 10,
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by(le)(rate(authentik_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum by(le)(rate(authentik_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum by(le)(rate(authentik_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "type": "row",
          "title": "Resources",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 11,
          "panels": []
        },
        {
          "type": "timeseries",
          "title": "CPU by Container",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
          "id": 12,
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"auth\",pod=~\"authentik.*\",container!=\"\"}[5m])",
              "legendFormat": "{{container}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "type": "timeseries",
          "title": "Memory by Container",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 15 },
          "id": 13,
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"auth\",pod=~\"authentik.*\",container!=\"\"}",
              "legendFormat": "{{container}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        }
      ]
    }
