apiVersion: v1
data:
  authentik.json: "{\n  \"uid\": \"authentik-real\",\n  \"title\": \"Authentik SSO\",\n  \"description\": \"Authentik authentication server metrics \\u2014 flows, policies, outposts, and HTTP latency\",\n  \"tags\": [\n    \"authentik\",\n    \"sso\",\n    \"auth\"\n  ],\n  \"schemaVersion\": 39,\n  \"refresh\": \"30s\",\n  \"time\": {\n    \"from\": \"now-6h\",\n    \"to\": \"now\"\n  },\n  \"graphTooltip\": 1,\n  \"editable\": true,\n  \"timezone\": \"browser\",\n  \"templating\": {\n    \"list\": [\n      {\n        \"name\": \"datasource\",\n        \"type\": \"datasource\",\n        \"query\": \"prometheus\",\n        \"current\": {},\n        \"hide\": 0,\n        \"includeAll\": false,\n        \"multi\": false,\n        \"options\": [],\n        \"refresh\": 1\n      }\n    ]\n  },\n  \"panels\": [\n    {\n      \"type\": \"row\",\n      \"title\": \"Status\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 0,\n        \"w\": 24,\n        \"h\": 1\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"stat\",\n      \"title\": \"Server Up\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 1,\n        \"w\": 4,\n        \"h\": 3\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"mappings\": [\n            {\n              \"type\": \"value\",\n              \"options\": {\n                \"1\": {\n                  \"text\": \"UP\",\n                  \"color\": \"green\"\n                },\n                \"0\": {\n                  \"text\": \"DOWN\",\n                  \"color\": \"red\"\n                }\n              }\n            }\n          ],\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"value\": null,\n                \"color\": \"red\"\n              },\n              {\n                \"value\": 1,\n                \"color\": \"green\"\n              }\n            ]\n          }\n        }\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"colorMode\": \"background\"\n      },\n      \"targets\": [\n        {\n          \"expr\": \"up{job=~\\\".*authentik.*\\\"}\",\n          \"legendFormat\": \"\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"title\": \"Workers\",\n      \"gridPos\": {\n        \"x\": 4,\n        \"y\": 1,\n        \"w\": 4,\n        \"h\": 3\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"value\": null,\n                \"color\": \"red\"\n              },\n              {\n                \"value\": 1,\n                \"color\": \"green\"\n              }\n            ]\n          }\n        }\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"colorMode\": \"background\"\n      },\n      \"targets\": [\n        {\n          \"expr\": \"authentik_admin_workers\",\n          \"legendFormat\": \"workers\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"title\": \"Tasks Queued\",\n      \"gridPos\": {\n        \"x\": 8,\n        \"y\": 1,\n        \"w\": 4,\n        \"h\": 3\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"value\": null,\n                \"color\": \"green\"\n              },\n              {\n                \"value\": 10,\n                \"color\": \"yellow\"\n              },\n              {\n                \"value\": 50,\n                \"color\": \"red\"\n              }\n            ]\n          }\n        }\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"colorMode\": \"background\"\n      },\n      \"targets\": [\n        {\n          \"expr\": \"authentik_tasks_queued\",\n          \"legendFormat\": \"queued\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"title\": \"Outposts Connected\",\n      \"gridPos\": {\n        \"x\": 12,\n        \"y\": 1,\n        \"w\": 4,\n        \"h\": 3\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"value\": null,\n                \"color\": \"red\"\n              },\n              {\n                \"value\": 1,\n                \"color\": \"green\"\n              }\n            ]\n          }\n        }\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"colorMode\": \"background\"\n      },\n      \"targets\": [\n        {\n          \"expr\": \"authentik_outposts_connected\",\n          \"legendFormat\": \"connected\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"title\": \"Flows Cached\",\n      \"gridPos\": {\n        \"x\": 16,\n        \"y\": 1,\n        \"w\": 4,\n        \"h\": 3\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {}\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        }\n      },\n      \"targets\": [\n        {\n          \"expr\": \"authentik_flows_cached\",\n          \"legendFormat\": \"\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"title\": \"Policies Cached\",\n      \"gridPos\": {\n        \"x\": 20,\n        \"y\": 1,\n        \"w\": 4,\n        \"h\": 3\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {}\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        }\n      },\n      \"targets\": [\n        {\n          \"expr\": \"authentik_policies_cached\",\n          \"legendFormat\": \"\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"title\": \"HTTP\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 4,\n        \"w\": 24,\n        \"h\": 1\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"timeseries\",\n      \"title\": \"HTTP Request Rate\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 5,\n        \"w\": 12,\n        \"h\": 8\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"reqps\"\n        }\n      },\n      \"targets\": [\n        {\n          \"expr\": \"rate(authentik_main_request_duration_seconds_count[5m])\",\n          \"legendFormat\": \"req/s\"\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"title\": \"HTTP Latency (p50 / p95 / p99)\",\n      \"gridPos\": {\n        \"x\": 12,\n        \"y\": 5,\n        \"w\": 12,\n        \"h\": 8\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"s\"\n        }\n      },\n      \"targets\": [\n        {\n          \"expr\": \"histogram_quantile(0.50, sum by(le)(rate(authentik_main_request_duration_seconds_bucket[5m])))\",\n          \"legendFormat\": \"p50\"\n        },\n        {\n          \"expr\": \"histogram_quantile(0.95, sum by(le)(rate(authentik_main_request_duration_seconds_bucket[5m])))\",\n          \"legendFormat\": \"p95\"\n        },\n        {\n          \"expr\": \"histogram_quantile(0.99, sum by(le)(rate(authentik_main_request_duration_seconds_bucket[5m])))\",\n          \"legendFormat\": \"p99\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"title\": \"Flows & Policies\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 13,\n        \"w\": 24,\n        \"h\": 1\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"timeseries\",\n      \"title\": \"Flow Execution Time (p95)\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 14,\n        \"w\": 12,\n        \"h\": 8\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"s\"\n        }\n      },\n      \"targets\": [\n        {\n          \"expr\": \"histogram_quantile(0.95, sum by(le)(rate(authentik_flows_execution_stage_time_bucket[5m])))\",\n          \"legendFormat\": \"stage time p95\"\n        },\n        {\n          \"expr\": \"histogram_quantile(0.95, sum by(le)(rate(authentik_flows_plan_time_bucket[5m])))\",\n          \"legendFormat\": \"plan time p95\"\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"title\": \"Policy Evaluation Time (p95)\",\n      \"gridPos\": {\n        \"x\": 12,\n        \"y\": 14,\n        \"w\": 12,\n        \"h\": 8\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\"\
    : {\n          \"unit\": \"s\"\n        }\n      },\n      \"targets\": [\n        {\n          \"expr\": \"histogram_quantile(0.95, sum by(le)(rate(authentik_policies_execution_time_bucket[5m])))\",\n          \"legendFormat\": \"eval p95\"\n        },\n        {\n          \"expr\": \"histogram_quantile(0.95, sum by(le)(rate(authentik_policies_engine_time_total_seconds_bucket[5m])))\",\n          \"legendFormat\": \"engine p95\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"title\": \"Outpost Proxy\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 22,\n        \"w\": 24,\n        \"h\": 1\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"timeseries\",\n      \"title\": \"Proxy Request Latency (p95)\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 23,\n        \"w\": 12,\n        \"h\": 8\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"s\"\n        }\n      },\n      \"targets\": [\n        {\n          \"expr\": \"histogram_quantile(0.95, sum by(le)(rate(authentik_outpost_proxy_request_duration_seconds_bucket[5m])))\",\n          \"legendFormat\": \"proxy p95\"\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"title\": \"Proxy Request Rate\",\n      \"gridPos\": {\n        \"x\": 12,\n        \"y\": 23,\n        \"w\": 12,\n        \"h\": 8\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"${datasource}\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"reqps\"\n        }\n      },\n      \"targets\": [\n        {\n          \"expr\": \"rate(authentik_outpost_proxy_request_duration_seconds_count[5m])\",\n          \"legendFormat\": \"proxy req/s\"\n        }\n      ]\n    }\n  ]\n}"
kind: ConfigMap
metadata:
  annotations:
    grafana_folder: Apps
  labels:
    grafana_dashboard: '1'
  name: grafana-dashboard-authentik
  namespace: monitoring
