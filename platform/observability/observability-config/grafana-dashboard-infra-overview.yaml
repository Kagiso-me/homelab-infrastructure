          }
        },
        {
          "type": "stat",
          "title": "truenas",
          "description": "10.0.10.80 — TrueNAS storage server",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "id": 8,
          "targets": [
            {
              "expr": "up{job=\"node-truenas\"}",
              "refId": "A",
