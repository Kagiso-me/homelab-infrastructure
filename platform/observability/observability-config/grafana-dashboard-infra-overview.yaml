        {
          "type": "stat",
          "title": "docker-vm",
          "description": "10.0.10.32 — Docker media stack",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 3, "x": 15, "y": 1 },
          "id": 7,
          "targets": [
            {
              "expr": "up{job=\"node-docker-vm\"}",
