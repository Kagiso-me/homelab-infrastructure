        {
          "type": "row",
          "title": "Active Alerts",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 },
          "id": 18,
          "panels": []
        },
        {
          "type": "stat",
          "title": "Firing Alerts",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 9, "w": 4, "x": 0, "y": 19 },
          "id": 19,
          "targets": [
            {
              "expr": "count(ALERTS{alertstate=\"firing\"}) or vector(0)",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 3 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "graphMode": "none",
            "colorMode": "background",
            "justifyMode": "auto",
            "textMode": "auto",
            "wideLayout": true
          }
        },
        {
          "type": "table",
          "title": "Firing Alerts",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 9, "w": 20, "x": 4, "y": 19 },
          "id": 20,
          "targets": [
            {
              "expr": "ALERTS{alertstate=\"firing\"}",
              "refId": "A",
              "instant": true,
              "format": "table"
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "options": {
            "showHeader": true,
            "cellHeight": "sm",
            "footer": { "show": false, "reducer": ["sum"], "countRows": false }
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "Value": true,
                  "__name__": true
                },
                "indexByName": {
                  "alertname": 0,
                  "severity": 1,
                  "instance": 2,
                  "namespace": 3
                },
                "renameByName": {
                  "alertname": "Alert",
                  "severity": "Severity",
                  "instance": "Instance",
                  "namespace": "Namespace"
                }
              }
            }
          ]
        },
        {
          "type": "row",
          "title": "Quick Links",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 28 },
