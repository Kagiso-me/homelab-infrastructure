apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-infra-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Homelab"
data:
  infra-overview.json: |
    {
      "uid": "infra-overview",
      "title": "Infrastructure Overview",
      "description": "Homelab command centre — node status, cluster health, storage, and active alerts",
      "tags": ["homelab", "overview"],
      "schemaVersion": 39,
      "refresh": "30s",
      "time": { "from": "now-6h", "to": "now" },
      "graphTooltip": 1,
      "editable": true,
      "fiscalYearStartMonth": 0,
      "liveNow": false,
      "timezone": "",
      "weekStart": "",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "options": [],
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false
          }
        ]
      },
      "panels": [
        {
          "type": "row",
          "title": "Node Status",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "panels": []
        },
        {
          "type": "stat",
          "title": "bran",
          "description": "10.0.10.10 — Raspberry Pi control hub",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 3, "x": 0, "y": 1 },
          "id": 2,
          "targets": [
            {
              "expr": "up{job=\"node-rpi\"}",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "index": 0 }, "1": { "text": "UP", "index": 1 } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "color": { "mode": "background" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "graphMode": "none",
            "colorMode": "background",
            "justifyMode": "auto",
            "textMode": "auto",
            "wideLayout": true
          }
        },
        {
          "type": "stat",
          "title": "tywin",
