          "id": 22,
          "options": {
            "mode": "markdown",
            "content": "**Dashboards:** [Node Deep Dive](/d/node-deep-dive) | [Storage & Disks](/d/storage-disks) | [Backup Health](/d/backup-health) | [Applications](/d/app-performance) | [Databases](/d/database-performance) | [Authentik SSO](/d/authentik-sso) | [Cluster Overview](/d/cluster-overview)",
