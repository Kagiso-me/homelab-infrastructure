# SOPS-encrypted Secret — Alertmanager Discord webhook credentials.
# This file is encrypted with age. Never commit the plaintext version.
#
# Keys:
#   discord-alerts-url    — Discord webhook URL for the #homelab-alerts channel
#                           Append /slack to the Discord webhook URL:
#                           https://discord.com/api/webhooks/<id>/<token>/slack
#   discord-critical-url  — Discord webhook URL for the #homelab-critical channel
#                           Separate webhook bound to a different Discord channel.
#   watchdog-webhook-url  — Heartbeat endpoint (healthchecks.io ping URL)
#                           https://hc-ping.com/<uuid>
#
# To create (before encrypting):
#   kubectl create secret generic alertmanager-secret \
#     --namespace monitoring \
#     --from-literal=discord-alerts-url=https://discord.com/api/webhooks/REPLACE/REPLACE/slack \
#     --from-literal=discord-critical-url=https://discord.com/api/webhooks/REPLACE/REPLACE/slack \
#     --from-literal=watchdog-webhook-url=https://hc-ping.com/REPLACE \
#     --dry-run=client -o yaml | sops --encrypt --input-type yaml --output-type yaml /dev/stdin > alertmanager-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-secret
  namespace: monitoring
type: Opaque
stringData:
  discord-alerts-url: https://discord.com/api/webhooks/REPLACE/REPLACE/slack
  discord-critical-url: https://discord.com/api/webhooks/REPLACE/REPLACE/slack
  watchdog-webhook-url: https://hc-ping.com/REPLACE
