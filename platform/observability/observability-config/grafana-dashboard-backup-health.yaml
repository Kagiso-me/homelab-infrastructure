apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-backup-health
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Operations"
data:
  backup-health.json: |
    {
      "uid": "backup-health",
      "title": "Backup Health",
      "description": "Backup job status, trends, Velero cluster backups, and Backblaze B2 off-site sync",
      "tags": ["operations", "backups"],
      "schemaVersion": 39,
      "refresh": "5m",
      "time": { "from": "now-24h", "to": "now" },
      "graphTooltip": 1,
      "editable": true,
      "fiscalYearStartMonth": 0,
      "liveNow": false,
      "timezone": "",
      "weekStart": "",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "options": [],
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false
          }
        ]
      },
      "panels": [
        {
          "type": "row",
          "title": "Status Overview",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "panels": []
        },
        {
          "type": "stat",
          "title": "Failing Jobs",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 1 },
          "id": 2,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "count(backup_job_status == 0) or vector(0)",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto",
            "justifyMode": "auto",
            "orientation": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Jobs Reporting",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "id": 3,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "count(backup_job_status) or vector(0)",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              },
              "color": { "mode": "fixed", "fixedColor": "blue" }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto",
            "justifyMode": "auto",
            "orientation": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Most Stale Backup",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "id": 4,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "max(time() - backup_last_success_timestamp)",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 86400 },
                  { "color": "red", "value": 90000 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto",
            "justifyMode": "auto",
            "orientation": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Failures (24h)",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "id": 5,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sum(increase(backup_job_failure_count[24h])) or vector(0)",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 3 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto",
            "justifyMode": "auto",
            "orientation": "auto"
          }
        },
        {
          "type": "row",
          "title": "Job Summary Table",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 6,
          "panels": []
        },
        {
          "type": "table",
          "title": "Job Summary",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 6 },
          "id": 7,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "backup_job_status",
              "refId": "A",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "time() - backup_last_success_timestamp",
              "refId": "B",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "backup_last_size_bytes",
              "refId": "C",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "backup_last_duration_seconds",
              "refId": "D",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "backup_job_failure_count",
              "refId": "E",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "instance": true
                },
                "renameByName": {
                  "job_name": "Job Name",
                  "Value #A": "Status",
                  "Value #B": "Age",
                  "Value #C": "Size",
                  "Value #D": "Duration",
                  "Value #E": "Failures"
                },
                "indexByName": {
                  "job_name": 0,
                  "Value #A": 1,
                  "Value #B": 2,
                  "Value #C": 3,
                  "Value #D": 4,
                  "Value #E": 5
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Status" },
                "properties": [
                  {
                    "id": "mappings",
                    "value": [
                      { "type": "value", "options": { "0": { "text": "FAILED", "color": "red" } } },
                      { "type": "value", "options": { "1": { "text": "OK", "color": "green" } } }
                    ]
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": { "type": "color-background" }
                  }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Age" },
                "properties": [
                  { "id": "unit", "value": "s" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Size" },
                "properties": [
                  { "id": "unit", "value": "bytes" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Duration" },
                "properties": [
                  { "id": "unit", "value": "s" }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              { "displayName": "Status", "desc": false }
            ],
            "footer": { "show": false }
          }
        },
        {
          "type": "row",
          "title": "Trends",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 16 },
          "id": 8,
          "panels": []
        },
        {
          "type": "timeseries",
          "title": "Backup Duration",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 17 },
          "id": 9,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "backup_last_duration_seconds",
              "refId": "A",
              "legendFormat": "{{job_name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom", "calcs": [] }
          }
        },
        {
          "type": "timeseries",
          "title": "Backup Size",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 17 },
          "id": 10,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "backup_last_size_bytes",
              "refId": "A",
              "legendFormat": "{{job_name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom", "calcs": [] }
          }
        },
        {
          "type": "row",
          "title": "Velero Cluster Backups",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 25 },
          "id": 11,
          "panels": []
        },
        {
          "type": "stat",
          "title": "Last Backup Age",
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 26 },
          "id": 12,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "time() - max(velero_backup_last_successful_timestamp)",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 86400 },
                  { "color": "red", "value": 172800 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto",
            "justifyMode": "auto",
            "orientation": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Successes (24h)",
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 26 },
          "id": 13,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sum(increase(velero_backup_success_total[24h])) or vector(0)",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "color": { "mode": "fixed", "fixedColor": "green" }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto",
            "justifyMode": "auto",
            "orientation": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Failures (24h)",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 26 },
          "id": 14,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sum(increase(velero_backup_failure_total[24h])) or vector(0)",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto",
            "justifyMode": "auto",
            "orientation": "auto"
          }
        },
        {
          "type": "row",
          "title": "Backblaze B2 Off-site",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 30 },
          "id": 15,
          "panels": []
        },
        {
          "type": "stat",
          "title": "Sync Status",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 31 },
          "id": 16,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "b2_sync_last_status",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "FAILED", "color": "red" } } },
                { "type": "value", "options": { "1": { "text": "OK", "color": "green" } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto",
            "justifyMode": "auto",
            "orientation": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Bucket Size",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 31 },
          "id": 17,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "b2_sync_bucket_size_bytes",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              },
              "color": { "mode": "fixed", "fixedColor": "blue" }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto",
            "justifyMode": "auto",
            "orientation": "auto"
          }
        },
        {
          "type": "stat",
          "title": "File Count",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 31 },
          "id": 18,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "b2_sync_file_count",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              },
              "color": { "mode": "fixed", "fixedColor": "blue" }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto",
            "justifyMode": "auto",
            "orientation": "auto"
          }
        },
        {
          "type": "timeseries",
          "title": "Bucket Growth",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 31 },
          "id": 19,
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "b2_sync_bucket_size_bytes",
              "refId": "A",
              "legendFormat": "Bucket Size"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "single", "sort": "none" },
            "legend": { "displayMode": "hidden", "placement": "bottom", "calcs": [] }
          }
        }
      ]
    }
