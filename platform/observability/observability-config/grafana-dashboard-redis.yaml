apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-redis
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Databases"
data:
  redis.json: |
    {
      "title": "Redis Overview",
      "uid": "redis-overview",
      "description": "Redis performance — clients, memory, operations, hit ratio, and latency",
      "tags": ["databases", "redis"],
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-3h", "to": "now"},
      "timepicker": {},
      "graphTooltip": 1,
      "templating": {
        "list": [
          {
            "name": "datasource",
            "label": "Datasource",
            "type": "datasource",
            "pluginId": "prometheus",
            "current": {},
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Redis Status",
          "gridPos": {"x": 0, "y": 0, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {"type": "value", "options": {"0": {"text": "DOWN", "color": "red"}, "1": {"text": "UP", "color": "green"}}}
              ],
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]},
              "color": {"mode": "thresholds"}
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "textMode": "auto", "graphMode": "none"},
          "targets": [{"expr": "redis_up{job=~\".*redis.*\"}", "legendFormat": "status", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Connected Clients",
          "gridPos": {"x": 4, "y": 0, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 50}, {"color": "red", "value": 100}]},
              "color": {"mode": "thresholds"}
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "textMode": "auto", "graphMode": "area"},
          "targets": [{"expr": "redis_connected_clients{job=~\".*redis.*\"}", "legendFormat": "clients", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]
        },
        {
          "id": 3,
          "type": "gauge",
          "title": "Memory Usage",
          "gridPos": {"x": 8, "y": 0, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "min": 0, "max": 1,
              "unit": "percentunit",
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.75}, {"color": "red", "value": 0.9}]},
              "color": {"mode": "thresholds"}
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "orientation": "auto", "showThresholdLabels": false, "showThresholdMarkers": true},
          "targets": [{"expr": "redis_memory_used_bytes{job=~\".*redis.*\"} / (redis_memory_max_bytes{job=~\".*redis.*\"} > 0 or redis_memory_used_bytes{job=~\".*redis.*\"} * 2)", "legendFormat": "used", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Commands / sec",
          "gridPos": {"x": 12, "y": 0, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "color": {"mode": "thresholds"}
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "textMode": "auto", "graphMode": "area"},
          "targets": [{"expr": "rate(redis_commands_processed_total{job=~\".*redis.*\"}[5m])", "legendFormat": "ops/s", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]
        },
        {
          "id": 5,
          "type": "gauge",
          "title": "Hit Ratio",
          "gridPos": {"x": 16, "y": 0, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "min": 0, "max": 1,
              "unit": "percentunit",
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 0.7}, {"color": "green", "value": 0.9}]},
              "color": {"mode": "thresholds"}
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "orientation": "auto", "showThresholdLabels": false, "showThresholdMarkers": true},
          "targets": [{"expr": "redis_keyspace_hits_total{job=~\".*redis.*\"} / (redis_keyspace_hits_total{job=~\".*redis.*\"} + redis_keyspace_misses_total{job=~\".*redis.*\"} + 1)", "legendFormat": "hit ratio", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Commands / sec",
          "gridPos": {"x": 0, "y": 4, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"unit": "ops", "custom": {"lineWidth": 2, "fillOpacity": 10}}
          },
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [{"expr": "rate(redis_commands_processed_total{job=~\".*redis.*\"}[5m])", "legendFormat": "ops/s", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Memory Used",
          "gridPos": {"x": 12, "y": 4, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"unit": "bytes", "custom": {"lineWidth": 2, "fillOpacity": 10}}
          },
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {"expr": "redis_memory_used_bytes{job=~\".*redis.*\"}", "legendFormat": "used", "datasource": {"type": "prometheus", "uid": "${datasource}"}},
            {"expr": "redis_memory_max_bytes{job=~\".*redis.*\"} > 0", "legendFormat": "max", "datasource": {"type": "prometheus", "uid": "${datasource}"}}
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Connected Clients",
          "gridPos": {"x": 0, "y": 12, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 10}}
          },
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [
            {"expr": "redis_connected_clients{job=~\".*redis.*\"}", "legendFormat": "clients", "datasource": {"type": "prometheus", "uid": "${datasource}"}},
            {"expr": "redis_blocked_clients{job=~\".*redis.*\"}", "legendFormat": "blocked", "datasource": {"type": "prometheus", "uid": "${datasource}"}}
          ]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Command Latency (avg)",
          "gridPos": {"x": 12, "y": 12, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"unit": "µs", "custom": {"lineWidth": 2, "fillOpacity": 10}}
          },
          "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}},
          "targets": [{"expr": "rate(redis_commands_duration_seconds_total{job=~\".*redis.*\"}[5m]) / rate(redis_commands_processed_total{job=~\".*redis.*\"}[5m]) * 1e6", "legendFormat": "avg latency", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]
        }
      ]
    }
