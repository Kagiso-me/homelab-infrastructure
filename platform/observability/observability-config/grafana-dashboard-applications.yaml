apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-applications
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Apps"
data:
  applications.json: |
    {
      "uid": "app-performance",
      "title": "Applications",
      "tags": ["apps", "nextcloud", "ingress"],
      "schemaVersion": 39,
      "refresh": "30s",
      "time": { "from": "now-6h", "to": "now" },
      "graphTooltip": 1,
      "editable": false,
      "fiscalYearStartMonth": 0,
      "liveNow": false,
      "timezone": "browser",
      "weekStart": "",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "options": [],
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false
          },
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "query": "label_values(kube_pod_info, namespace)",
            "current": {},
            "hide": 0,
            "includeAll": true,
            "multi": true,
            "options": [],
            "refresh": 2,
            "regex": "/(apps|auth)/",
            "sort": 1,
            "skipUrlSync": false
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Nextcloud",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "panels": []
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Nextcloud Status",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 3, "x": 0, "y": 1 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "up{job=~\".*nextcloud.*\"}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "1": { "text": "Up", "color": "green", "index": 0 },
                    "0": { "text": "Down", "color": "red", "index": 1 }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Active Users",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 3, "x": 3, "y": 1 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "nextcloud_active_users_total",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Nextcloud HTTP Latency",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 9, "x": 6, "y": 1 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "rate(nextcloud_request_duration_seconds_sum[5m]) / rate(nextcloud_request_duration_seconds_count[5m])",
              "legendFormat": "avg latency"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "axisBorderShow": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "single", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Nextcloud CPU & Memory",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 9, "x": 15, "y": 1 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"apps\",pod=~\"nextcloud.*\",container!=\"\"}[5m])",
              "legendFormat": "CPU {{pod}}/{{container}}"
            },
            {
              "refId": "B",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "container_memory_working_set_bytes{namespace=\"apps\",pod=~\"nextcloud.*\",container!=\"\"}",
              "legendFormat": "Mem {{pod}}/{{container}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "axisBorderShow": false,
                "axisPlacement": "auto"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byFrameRefID", "options": "A" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "custom.axisPlacement", "value": "left" },
                  { "id": "custom.axisLabel", "value": "CPU (cores)" }
                ]
              },
              {
                "matcher": { "id": "byFrameRefID", "options": "B" },
                "properties": [
                  { "id": "unit", "value": "bytes" },
                  { "id": "custom.axisPlacement", "value": "right" },
                  { "id": "custom.axisLabel", "value": "Memory" }
                ]
              }
            ]
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 6,
          "type": "row",
          "title": "App Resources",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "panels": []
        },
        {
          "id": 7,
          "type": "table",
          "title": "Pod Resources",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 10 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by(pod,namespace,container)(rate(container_cpu_usage_seconds_total{namespace=~\"$namespace\",container!=\"\",container!=\"POD\"}[5m]))",
              "format": "table",
              "instant": true
            },
            {
              "refId": "B",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by(pod,namespace,container)(container_memory_working_set_bytes{namespace=~\"$namespace\",container!=\"\",container!=\"POD\"})",
              "format": "table",
              "instant": true
            },
            {
              "refId": "C",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by(pod,namespace)(kube_pod_container_status_restarts_total{namespace=~\"$namespace\"})",
              "format": "table",
              "instant": true
            }
          ],
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true },
                "renameByName": {
                  "namespace": "Namespace",
                  "pod": "Pod",
                  "container": "Container",
                  "Value #A": "CPU",
                  "Value #B": "Memory",
                  "Value #C": "Restarts"
                },
                "indexByName": {
                  "namespace": 0,
                  "pod": 1,
                  "container": 2,
                  "Value #A": 3,
                  "Value #B": 4,
                  "Value #C": 5
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "filterable": true
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "CPU" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "decimals", "value": 2 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Memory" },
                "properties": [
                  { "id": "unit", "value": "bytes" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Restarts" },
                "properties": [
                  { "id": "custom.displayMode", "value": "color-background" },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "yellow", "value": 3 },
                        { "color": "red", "value": 10 }
                      ]
                    }
                  }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "footer": { "show": false },
            "sortBy": [
              { "displayName": "CPU", "desc": true }
            ]
          }
        },
        {
          "id": 8,
          "type": "row",
          "title": "Ingress",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 },
          "panels": []
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Request Rate by Service",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 19 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by(service)(rate(traefik_service_requests_total[5m]))",
              "legendFormat": "{{service}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "axisBorderShow": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Error Rate (4xx/5xx)",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 19 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by(service)(rate(traefik_service_requests_total{code=~\"4..\"}[5m]))",
              "legendFormat": "4xx {{service}}"
            },
            {
              "refId": "B",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by(service)(rate(traefik_service_requests_total{code=~\"5..\"}[5m]))",
              "legendFormat": "5xx {{service}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "axisBorderShow": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byFrameRefID", "options": "A" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "yellow" } }
                ]
              },
              {
                "matcher": { "id": "byFrameRefID", "options": "B" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              }
            ]
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Response Time",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 19 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.95, sum by(le,service)(rate(traefik_service_request_duration_seconds_bucket[5m])))",
              "legendFormat": "{{service}} p95"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "axisBorderShow": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        }
      ]
    }
