apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cluster-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Kubernetes"
data:
  cluster-overview.json: |
    {
      "uid": "cluster-overview",
      "title": "Cluster Overview",
      "description": "Kubernetes cluster health, resource utilisation, workloads, pod status, and network traffic",
      "tags": ["kubernetes", "cluster"],
      "schemaVersion": 39,
      "refresh": "30s",
      "time": { "from": "now-6h", "to": "now" },
      "graphTooltip": 1,
      "editable": false,
      "fiscalYearStartMonth": 0,
      "liveNow": false,
      "timezone": "browser",
      "weekStart": "",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "options": [],
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false
          }
        ]
      },
      "panels": [
        {
          "id": 100,
          "type": "row",
          "title": "Cluster Status",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "panels": []
        },
        {
          "id": 1,
          "type": "stat",
          "title": "Nodes Ready",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "targets": [
            {
              "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "green", "value": 3 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Total Pods",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "targets": [
            {
              "expr": "sum(kube_pod_status_phase{phase=\"Running\"})",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Namespaces",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "targets": [
            {
              "expr": "count(kube_namespace_labels)",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Deployments",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 },
          "targets": [
            {
              "expr": "sum(kube_deployment_status_replicas_available)",
              "refId": "A",
              "legendFormat": "Available",
              "instant": true
            },
            {
              "expr": "sum(kube_deployment_spec_replicas)",
              "refId": "B",
              "legendFormat": "Total",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "value_and_name"
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "StatefulSets Ready",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 },
          "targets": [
            {
              "expr": "sum(kube_statefulset_status_replicas_ready)",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "DaemonSets Ready",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 },
          "targets": [
            {
              "expr": "sum(kube_daemonset_status_number_ready)",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 105,
          "type": "row",
          "title": "Node Conditions",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "panels": []
        },
        {
          "id": 20,
          "type": "table",
          "title": "Node Conditions",
          "description": "Current Kubernetes node conditions. Any non-green row needs attention.",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 6 },
          "targets": [
            {
              "expr": "kube_node_status_condition{condition=\"Ready\",status=\"true\"}",
              "refId": "A",
              "legendFormat": "",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "kube_node_status_condition{condition=\"DiskPressure\",status=\"true\"}",
              "refId": "B",
              "legendFormat": "",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "kube_node_status_condition{condition=\"MemoryPressure\",status=\"true\"}",
              "refId": "C",
              "legendFormat": "",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "kube_node_status_condition{condition=\"PIDPressure\",status=\"true\"}",
              "refId": "D",
              "legendFormat": "",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "kube_node_spec_unschedulable",
              "refId": "E",
              "legendFormat": "",
              "instant": true,
              "format": "table"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "displayMode": "color-background",
                "filterable": false
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Ready" },
                "properties": [
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "red", "value": null },
                        { "color": "green", "value": 1 }
                      ]
                    }
                  },
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "DiskPressure" },
                "properties": [
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "red", "value": 1 }
                      ]
                    }
                  },
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "MemoryPressure" },
                "properties": [
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "red", "value": 1 }
                      ]
                    }
                  },
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "PIDPressure" },
                "properties": [
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "red", "value": 1 }
                      ]
                    }
                  },
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Cordoned" },
                "properties": [
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "yellow", "value": 1 }
                      ]
                    }
                  },
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "Node", "desc": false }]
          },
          "transformations": [
            { "id": "merge", "options": {} },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "instance": true,
                  "job": true,
                  "container": true,
                  "endpoint": true,
                  "pod": true,
                  "service": true,
                  "uid": true,
                  "condition": true,
                  "status": true,
                  "namespace": true
                },
                "renameByName": {
                  "node": "Node",
                  "Value #A": "Ready",
                  "Value #B": "DiskPressure",
                  "Value #C": "MemoryPressure",
                  "Value #D": "PIDPressure",
                  "Value #E": "Cordoned"
                }
              }
            }
          ]
        },
        {
          "id": 101,
          "type": "row",
          "title": "Resource Utilization",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "panels": []
        },
        {
          "id": 7,
          "type": "gauge",
          "title": "Cluster CPU %",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 15 },
          "targets": [
            {
              "expr": "(1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))) * 100",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          }
        },
        {
          "id": 8,
          "type": "gauge",
          "title": "Cluster Memory %",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 15 },
          "targets": [
            {
              "expr": "(1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes)) * 100",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "CPU Usage Over Time",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 15 },
          "targets": [
            {
              "expr": "(1 - avg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))) * 100",
              "refId": "A",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "none",
                "showPoints": "auto",
                "pointSize": 5,
                "spanNulls": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "scaleDistribution": { "type": "linear" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom", "calcs": [] }
          }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Memory Usage Over Time",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 15 },
          "targets": [
            {
              "expr": "(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100",
              "refId": "A",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "none",
                "showPoints": "auto",
                "pointSize": 5,
                "spanNulls": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "scaleDistribution": { "type": "linear" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom", "calcs": [] }
          }
        },
        {
          "id": 102,
          "type": "row",
          "title": "Workloads",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 },
          "panels": []
        },
        {
          "id": 11,
          "type": "table",
          "title": "Deployments",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available",
              "refId": "A",
              "legendFormat": "",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "kube_deployment_spec_replicas",
              "refId": "B",
              "legendFormat": "",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "kube_deployment_status_replicas_ready",
              "refId": "C",
              "legendFormat": "",
              "instant": true,
              "format": "table"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "displayMode": "auto",
                "filterable": true
              }
            },
            "overrides": []
          },
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "deployment", "desc": false }]
          },
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "instance": true,
                  "job": true,
                  "container": true,
                  "endpoint": true,
                  "pod": true,
                  "service": true,
                  "uid": true
                },
                "renameByName": {
                  "namespace": "Namespace",
                  "deployment": "Deployment",
                  "Value #A": "Available",
                  "Value #B": "Desired",
                  "Value #C": "Ready"
                }
              }
            }
          ]
        },
        {
          "id": 12,
          "type": "table",
          "title": "StatefulSets",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "targets": [
            {
              "expr": "kube_statefulset_status_replicas_ready",
              "refId": "A",
              "legendFormat": "",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "kube_statefulset_replicas",
              "refId": "B",
              "legendFormat": "",
              "instant": true,
              "format": "table"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "displayMode": "auto",
                "filterable": true
              }
            },
            "overrides": []
          },
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "statefulset", "desc": false }]
          },
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "instance": true,
                  "job": true,
                  "container": true,
                  "endpoint": true,
                  "pod": true,
                  "service": true,
                  "uid": true
                },
                "renameByName": {
                  "namespace": "Namespace",
                  "statefulset": "StatefulSet",
                  "Value #A": "Ready",
                  "Value #B": "Desired"
                }
              }
            }
          ]
        },
        {
          "id": 103,
          "type": "row",
          "title": "Pod Health",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 32 },
          "panels": []
        },
        {
          "id": 13,
          "type": "stat",
          "title": "Pending Pods",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 33 },
          "targets": [
            {
              "expr": "sum(kube_pod_status_phase{phase=\"Pending\"}) OR vector(0)",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 14,
          "type": "stat",
          "title": "Failed Pods",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 33 },
          "targets": [
            {
              "expr": "sum(kube_pod_status_phase{phase=\"Failed\"}) OR vector(0)",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 15,
          "type": "stat",
          "title": "Restarts (1h)",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 33 },
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total[1h]))",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 20 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 16,
          "type": "timeseries",
          "title": "Pod Restarts by Namespace",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 33 },
          "targets": [
            {
              "expr": "sum by(namespace)(increase(kube_pod_container_status_restarts_total[1h]))",
              "refId": "A",
              "legendFormat": "{{namespace}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "none",
