apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-databases
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Databases"
data:
  databases.json: |
    {
      "uid": "database-performance",
      "title": "Databases",
      "timezone": "browser",
      "editable": false,
      "refresh": "30s",
      "schemaVersion": 39,
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "options": [],
            "refresh": 1,
            "regex": ""
          }
        ]
      },
      "panels": [
        {
          "type": "row",
          "id": 100,
          "title": "PostgreSQL Status",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "panels": []
        },
        {
          "type": "stat",
          "id": 1,
          "title": "PostgreSQL Up",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 3, "x": 0, "y": 1 },
          "targets": [
            {
              "expr": "pg_up",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "1": { "text": "Up", "color": "green" },
                    "0": { "text": "Down", "color": "red" }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "red" },
                  { "value": 1, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "type": "stat",
          "id": 2,
          "title": "Active Connections",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 3, "x": 3, "y": 1 },
          "targets": [
            {
              "expr": "sum(pg_stat_database_numbackends)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "type": "gauge",
          "id": 3,
          "title": "Cache Hit Ratio",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 6, "y": 1 },
          "targets": [
            {
              "expr": "sum(pg_stat_database_blks_hit) / (sum(pg_stat_database_blks_hit) + sum(pg_stat_database_blks_read)) * 100",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": 0, "color": "red" },
                  { "value": 80, "color": "yellow" },
                  { "value": 95, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "type": "stat",
          "id": 4,
          "title": "Transactions/sec",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 10, "y": 1 },
          "targets": [
            {
              "expr": "sum(rate(pg_stat_database_xact_commit[5m]) + rate(pg_stat_database_xact_rollback[5m]))",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "type": "stat",
          "id": 5,
          "title": "DB Size Total",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 14, "y": 1 },
          "targets": [
            {
              "expr": "sum(pg_database_size_bytes)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "type": "stat",
          "id": 6,
          "title": "Deadlocks",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 3, "x": 18, "y": 1 },
          "targets": [
            {
              "expr": "sum(pg_stat_database_deadlocks)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": 0, "color": "green" },
                  { "value": 1, "color": "red" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "type": "stat",
          "id": 7,
          "title": "Temp Files",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 3, "x": 21, "y": 1 },
          "targets": [
            {
              "expr": "sum(pg_stat_database_temp_bytes)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "type": "row",
          "id": 101,
          "title": "PostgreSQL Trends",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "panels": []
        },
        {
          "type": "timeseries",
          "id": 8,
          "title": "Connections Over Time",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 6 },
          "targets": [
            {
              "expr": "sum(pg_stat_database_numbackends)",
              "legendFormat": "Active Connections",
              "refId": "A"
            },
            {
              "expr": "pg_settings_max_connections",
              "legendFormat": "Max Connections",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "never"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Max Connections" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [10, 10] } },
                  { "id": "custom.fillOpacity", "value": 0 },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              }
            ]
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "type": "timeseries",
          "id": 9,
          "title": "Transaction Rate",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 6 },
          "targets": [
            {
              "expr": "sum(rate(pg_stat_database_xact_commit[5m]))",
              "legendFormat": "Commits",
              "refId": "A"
            },
            {
              "expr": "sum(rate(pg_stat_database_xact_rollback[5m]))",
              "legendFormat": "Rollbacks",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "never"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "type": "timeseries",
          "id": 10,
          "title": "Database Sizes",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 6 },
          "targets": [
            {
              "expr": "pg_database_size_bytes",
              "legendFormat": "{{datname}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "never"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "type": "row",
          "id": 102,
          "title": "Redis Status",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "panels": []
        },
        {
          "type": "stat",
          "id": 11,
          "title": "Redis Up",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 3, "x": 0, "y": 15 },
          "targets": [
            {
              "expr": "redis_up",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "1": { "text": "Up", "color": "green" },
                    "0": { "text": "Down", "color": "red" }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "red" },
                  { "value": 1, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "type": "stat",
          "id": 12,
          "title": "Connected Clients",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 3, "x": 3, "y": 15 },
          "targets": [
            {
              "expr": "redis_connected_clients",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "type": "gauge",
          "id": 13,
          "title": "Memory Used",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 6, "y": 15 },
          "targets": [
            {
              "expr": "redis_memory_used_bytes / redis_memory_max_bytes * 100",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": 0, "color": "green" },
                  { "value": 70, "color": "yellow" },
                  { "value": 90, "color": "red" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "type": "stat",
          "id": 14,
          "title": "Commands/sec",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 10, "y": 15 },
          "targets": [
            {
              "expr": "rate(redis_commands_processed_total[5m])",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "type": "gauge",
          "id": 15,
          "title": "Hit Ratio",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 4, "x": 14, "y": 15 },
          "targets": [
            {
              "expr": "redis_keyspace_hits_total / (redis_keyspace_hits_total + redis_keyspace_misses_total) * 100",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": 0, "color": "red" },
                  { "value": 80, "color": "yellow" },
                  { "value": 95, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "type": "stat",
          "id": 16,
          "title": "Keys Total",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 3, "x": 18, "y": 15 },
          "targets": [
            {
              "expr": "sum(redis_db_keys)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "type": "stat",
          "id": 17,
          "title": "Blocked Clients",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 3, "x": 21, "y": 15 },
          "targets": [
            {
              "expr": "redis_blocked_clients",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": 0, "color": "green" },
                  { "value": 1, "color": "yellow" },
                  { "value": 5, "color": "red" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "type": "row",
          "id": 103,
          "title": "Redis Trends",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 19 },
          "panels": []
        },
        {
          "type": "timeseries",
          "id": 18,
          "title": "Commands/sec",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 20 },
          "targets": [
            {
              "expr": "rate(redis_commands_processed_total[5m])",
              "legendFormat": "Commands/sec",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "never"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "type": "timeseries",
          "id": 19,
          "title": "Memory Usage",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 20 },
          "targets": [
            {
              "expr": "redis_memory_used_bytes",
              "legendFormat": "Used",
              "refId": "A"
            },
            {
              "expr": "redis_memory_max_bytes",
              "legendFormat": "Max",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "never"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Max" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [10, 10] } },
                  { "id": "custom.fillOpacity", "value": 0 },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Used" },
                "properties": [
                  { "id": "custom.fillBelowTo", "value": "Max" }
                ]
              }
            ]
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "type": "timeseries",
          "id": 20,
          "title": "Connected Clients",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 20 },
          "targets": [
            {
              "expr": "redis_connected_clients",
              "legendFormat": "Connected Clients",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "never"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "type": "row",
          "id": 104,
          "title": "Resources",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 28 },
          "panels": []
        },
        {
          "type": "timeseries",
          "id": 21,
          "title": "PostgreSQL Pod CPU/Memory",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 29 },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"databases\",pod=~\"postgresql.*\",container!=\"\"}[5m])",
              "legendFormat": "CPU {{pod}}",
              "refId": "A"
            },
            {
              "expr": "container_memory_working_set_bytes{namespace=\"databases\",pod=~\"postgresql.*\",container!=\"\"}",
              "legendFormat": "Memory {{pod}}",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "never"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": "/Memory.*/" },
                "properties": [
                  { "id": "unit", "value": "bytes" },
                  { "id": "custom.axisPlacement", "value": "right" }
                ]
              },
              {
                "matcher": { "id": "byRegexp", "options": "/CPU.*/" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "custom.axisPlacement", "value": "left" }
                ]
              }
            ]
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "type": "timeseries",
          "id": 22,
          "title": "Redis Pod CPU/Memory",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 29 },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"databases\",pod=~\"redis.*\",container!=\"\"}[5m])",
              "legendFormat": "CPU {{pod}}",
              "refId": "A"
            },
            {
              "expr": "container_memory_working_set_bytes{namespace=\"databases\",pod=~\"redis.*\",container!=\"\"}",
              "legendFormat": "Memory {{pod}}",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "never"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
