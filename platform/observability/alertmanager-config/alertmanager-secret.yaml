# SOPS-encrypted Secret — Alertmanager webhook/Slack credentials.
# This file is encrypted with age. Never commit the plaintext version.
#
# Keys:
#   slack-api-url         — Slack Incoming Webhook URL for #homelab-alerts / #homelab-critical
#   webhook-url           — Generic webhook URL (e.g. ntfy.sh, Grafana OnCall, PagerDuty)
#   watchdog-webhook-url  — Heartbeat endpoint (e.g. healthchecks.io ping URL)
#
# To create (before encrypting):
#   kubectl create secret generic alertmanager-secret \
#     --namespace monitoring \
#     --from-literal=slack-api-url=https://hooks.slack.com/services/REPLACE \
#     --from-literal=webhook-url=https://REPLACE \
#     --from-literal=watchdog-webhook-url=https://REPLACE \
#     --dry-run=client -o yaml | sops --encrypt --input-type yaml --output-type yaml /dev/stdin > alertmanager-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-secret
  namespace: monitoring
type: Opaque
stringData:
  slack-api-url: https://hooks.slack.com/services/REPLACE_WITH_SLACK_WEBHOOK_URL
  webhook-url: https://REPLACE_WITH_WEBHOOK_URL
  watchdog-webhook-url: https://REPLACE_WITH_WATCHDOG_URL
