# Daily digest Discord webhook URL.
# This file must be SOPS-encrypted before committing:
#   sops --encrypt --in-place platform/observability/daily-digest/digest-secret.yaml
#
# To get the webhook URL:
#   1. Create a #homelab-digest channel in your Discord server
#   2. Right-click the channel > Edit Channel > Integrations > Webhooks
#   3. Click "New Webhook", name it "Daily Digest"
#   4. Copy the webhook URL (do NOT append /slack — this uses native Discord embeds)
apiVersion: v1
kind: Secret
metadata:
  name: digest-secret
  namespace: monitoring
type: Opaque
stringData:
  discord-digest-url: https://discord.com/api/webhooks/REPLACE_ME
