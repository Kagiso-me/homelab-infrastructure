apiVersion: v1
kind: ConfigMap
metadata:
  name: daily-digest-script
  namespace: monitoring
data:
  digest.py: |
    #!/usr/bin/env python3
    import json
    import os
    import sys
    import urllib.request
    import urllib.parse
    from datetime import datetime, timezone

    PROM    = "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090"
    WEBHOOK = os.environ["DISCORD_WEBHOOK_URL"]

    # 芒鈥濃偓芒鈥濃偓 Helper 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
    def prom_query(query):
        url  = f"{PROM}/api/v1/query"
        data = urllib.parse.urlencode({"query": query}).encode()
        try:
            with urllib.request.urlopen(url, data=data, timeout=10) as resp:
                return json.loads(resp.read())["data"]["result"]
        except Exception as e:
            print(f"Prometheus query failed ({query[:60]}): {e}", file=sys.stderr)
            return []

    def val(result, default=0):
        """Extract scalar value from a single-result Prometheus response."""
        if result:
            return float(result[0]["value"][1])
        return default

    def fmt(v, decimals=1):
        return f"{v:.{decimals}f}"

    # 芒鈥濃偓芒鈥濃偓 1. Node health 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
    node_up = prom_query('up{job=~"node-exporter|node-varys|node-proxmox|node-docker-vm|node-truenas"}')
    node_lines = []
    all_up = True
    for r in sorted(node_up, key=lambda x: x["metric"].get("instance", "")):
        inst  = r["metric"].get("instance") or r["metric"].get("job", "unknown")
        up    = float(r["value"][1]) == 1.0
        if not up:
            all_up = False
        icon  = "\u2705" if up else "\u274c"
        state = "UP" if up else "DOWN"
        node_lines.append(f"{icon} {inst}: **{state}**")
    node_status = "\n".join(node_lines) or "No data"

    # 芒鈥濃偓芒鈥濃偓 2. CPU usage 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
    cpu_results = prom_query('100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)')
    cpu_lines = []
    for r in sorted(cpu_results, key=lambda x: x["metric"].get("instance", "")):
        inst = r["metric"].get("instance", "unknown")
        v    = float(r["value"][1])
        cpu_lines.append(f"{inst}: **{fmt(v)}%**")
    cpu_text = "\n".join(cpu_lines) or "No data"

    # 芒鈥濃偓芒鈥濃偓 3. Memory usage 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
    mem_results = prom_query('(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100')
    mem_lines = []
    for r in sorted(mem_results, key=lambda x: x["metric"].get("instance", "")):
        inst = r["metric"].get("instance", "unknown")
        v    = float(r["value"][1])
        mem_lines.append(f"{inst}: **{fmt(v)}%**")
    mem_text = "\n".join(mem_lines) or "No data"

    # 芒鈥濃偓芒鈥濃偓 4. Root disk usage 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
    disk_results = prom_query(
        '(1 - (node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"}'
        ' / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"})) * 100'
    )
    disk_lines = []
    for r in sorted(disk_results, key=lambda x: x["metric"].get("instance", "")):
        inst  = r["metric"].get("instance", "unknown")
        v     = float(r["value"][1])
        warn  = "\u26a0\ufe0f " if v > 85 else ""
        disk_lines.append(f"{warn}{inst}: **{fmt(v)}%**")
    disk_text = "\n".join(disk_lines) or "No data"

    # 芒鈥濃偓芒鈥濃偓 5. Pod summary 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
    pod_results = prom_query('count by (phase) (kube_pod_status_phase == 1)')
    pod_counts  = {r["metric"]["phase"]: int(float(r["value"][1])) for r in pod_results}
    running   = pod_counts.get("Running",   0)
    pending   = pod_counts.get("Pending",   0)
    failed    = pod_counts.get("Failed",    0)
    succeeded = pod_counts.get("Succeeded", 0)
    pod_text  = f"Running: **{running}** | Pending: **{pending}** | Failed: **{failed}** | Succeeded: **{succeeded}**"

    # 芒鈥濃偓芒鈥濃偓 6. Backup status 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
    backup_status = prom_query('backup_job_status')
    backup_ts     = prom_query('backup_last_success_timestamp')
    ts_by_job     = {r["metric"].get("job", ""): float(r["value"][1]) for r in backup_ts}
    backup_lines  = []
    for r in sorted(backup_status, key=lambda x: x["metric"].get("job", "")):
        job  = r["metric"].get("job", "unknown")
        ok   = float(r["value"][1]) == 1.0
        icon = "\u2705" if ok else "\u274c"
        ts   = ts_by_job.get(job, 0)
        if ts > 0:
            date = datetime.fromtimestamp(ts, tz=timezone.utc).strftime("%Y-%m-%d")
            backup_lines.append(f"{icon} {job} (last: {date})")
        else:
            backup_lines.append(f"{icon} {job}")
    backup_text = "\n".join(backup_lines) or "No backup metrics found"

    # 芒鈥濃偓芒鈥濃偓 7. Embed colour 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
    colour = 3066993   # green
    if failed > 0 or not all_up:
        colour = 15158332  # red
    elif pending > 0:
        colour = 15844367  # yellow

    # 芒鈥濃偓芒鈥濃偓 8. Build and POST embed 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
    ts      = datetime.now(tz=timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
    payload = json.dumps({
        "embeds": [{
            "title":  "Homelab Daily Digest",
            "color":  colour,
            "fields": [
                {"name": "Node Status",    "value": node_status, "inline": False},
                {"name": "CPU Usage",      "value": cpu_text,    "inline": True},
                {"name": "Memory Usage",   "value": mem_text,    "inline": True},
                {"name": "Disk Usage (/)", "value": disk_text,   "inline": False},
                {"name": "Pod Summary",    "value": pod_text,    "inline": False},
                {"name": "Backup Status",  "value": backup_text, "inline": False},
            ],
            "footer":    {"text": "Daily digest from k3s cluster"},
            "timestamp": ts,
        }]
    }).encode()

    req = urllib.request.Request(
        WEBHOOK,
        data=payload,
        headers={"Content-Type": "application/json"},
        method="POST",
    )
    try:
        with urllib.request.urlopen(req, timeout=10) as resp:
            print(f"Digest posted to Discord (HTTP {resp.status})")
    except urllib.error.HTTPError as e:
        print(f"Failed to post digest (HTTP {e.code}): {e.read().decode()}", file=sys.stderr)
        sys.exit(1)
