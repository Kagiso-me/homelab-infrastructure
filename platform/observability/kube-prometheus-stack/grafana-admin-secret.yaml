# SOPS-encrypted Secret — Grafana admin credentials.
# This file is encrypted with age. Never commit the plaintext version.
#
# To create (before encrypting):
#   kubectl create secret generic grafana-admin \
#     --namespace monitoring \
#     --from-literal=admin-user=admin \
#     --from-literal=admin-password=REPLACE_WITH_STRONG_PASSWORD \
#     --dry-run=client -o yaml | sops --encrypt --input-type yaml --output-type yaml /dev/stdin > grafana-admin-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: monitoring
type: Opaque
stringData:
  admin-user: admin
  admin-password: REPLACE_WITH_STRONG_PASSWORD
