apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "67.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 24h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # ----- Grafana -----
    defaultRules:
      create: true
    grafana:
      enabled: true
      admin:
        existingSecret: grafana-admin-secret
        userKey: admin-user
        passwordKey: admin-password
      persistence:
        enabled: true
        storageClassName: nfs-truenas
        size: 5Gi
      ingress:
        enabled: false   # Using Traefik IngressRoute instead
      grafana.ini:
        server:
          domain: grafana.kagiso.me
          root_url: https://grafana.kagiso.me
        analytics:
          check_for_updates: false
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
        datasources:
          enabled: true
          searchNamespace: ALL

    # ----- Prometheus -----
    prometheus:
      prometheusSpec:
        retention: 15d
        retentionSize: "15GB"
        storageSpec:
          volumeClaimTemplate:
            spec:
              # local-path (k3s built-in) — Prometheus writes to WAL every few seconds.
              # NFS causes stale file handle errors on any server blip, silently
              # dropping all metrics. Local disk is the only reliable choice for TSDB.
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 20Gi
        # Scrape all namespaces
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        # External scrape targets — hosts outside the k3s cluster.
        additionalScrapeConfigs:
          - job_name: node-varys
            static_configs:
              - targets: ["10.0.10.10:9100"]
                labels:
                  instance: varys
                  role: control-hub

          - job_name: node-docker
            static_configs:
              - targets: ["10.0.10.20:9100"]
                labels:
                  instance: docker
                  role: docker-host

          - job_name: cadvisor-docker
            static_configs:
              - targets: ["10.0.10.20:8080"]
                labels:
                  instance: docker

          - job_name: node-truenas
            static_configs:
              - targets: ["10.0.10.80:9100"]
                labels:
                  instance: truenas
                  role: storage

          - job_name: smartctl-truenas
            static_configs:
              - targets: ["10.0.10.80:9633"]
                labels:
                  instance: truenas

    # ----- Alertmanager -----
    alertmanager:
      enabled: true
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: nfs-truenas
              accessModes: ["ReadWriteMany"]
              resources:
                requests:
                  storage: 1Gi
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: ["alertname", "namespace"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          receiver: discord-alerts
          routes:
            - receiver: discord-critical
              matchers:
                - name: severity
                  value: critical
              repeat_interval: 1h
            - receiver: watchdog-webhook
              matchers:
                - name: alertname
                  value: Watchdog
        receivers:
          - name: discord-alerts
          - name: discord-critical
          - name: watchdog-webhook

    # ----- Node Exporter -----
    prometheus-node-exporter:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

    # ----- kube-state-metrics -----
    kube-state-metrics:
      metricLabelsAllowlist:
        - pods=[*]
        - deployments=[*]

