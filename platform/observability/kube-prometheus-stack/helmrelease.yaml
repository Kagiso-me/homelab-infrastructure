apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "83.4.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 24h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # ----- Grafana -----
    defaultRules:
      create: true
      # Disable entire rule groups for k3s components that are embedded and
      # don't expose the endpoints kube-prometheus-stack expects.
      # Using rules.* to disable the groups entirely avoids null rule arrays
      # that cause PrometheusRule validation failures on chart install.
      rules:
        kubeProxy: false
        kubeControllerManager: false
        kubeScheduler: false

    kubeProxy:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    grafana:
      enabled: true
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      persistence:
        enabled: true
        storageClassName: nfs-truenas
        size: 5Gi
      initChownData:
        enabled: false
      ingress:
        enabled: false   # Using Traefik IngressRoute instead
      grafana.ini:
        server:
          domain: grafana.local.kagiso.me
          root_url: https://grafana.local.kagiso.me
        analytics:
          check_for_updates: false
        auth.proxy:
          enabled: true
          header_name: X-authentik-username
          header_property: username
          auto_sign_up: true
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
        datasources:
          enabled: true
          searchNamespace: ALL

    # ----- Prometheus -----
    prometheus:
      prometheusSpec:
        retention: 15d
        retentionSize: "15GB"
        storageSpec:
          volumeClaimTemplate:
            spec:
              # nfs-databases — no uid squash, Prometheus runs as uid 65534 (nobody).
              # Survives any single node failure unlike local-path.
              storageClassName: nfs-databases
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 20Gi
        # Scrape all namespaces
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        # External scrape targets — hosts outside the k3s cluster.
        additionalScrapeConfigs:
          - job_name: node-varys
            static_configs:
              - targets: ["10.0.10.10:9100"]
                labels:
                  instance: varys
                  role: control-hub

          - job_name: node-bronn
            static_configs:
              - targets: ["10.0.10.20:9100"]
                labels:
                  instance: bronn
                  role: docker-host

          - job_name: cadvisor-bronn
            static_configs:
              - targets: ["10.0.10.20:9338"]
                labels:
                  instance: bronn

          - job_name: node-ned
            static_configs:
              - targets: ["10.0.10.80:9100"]
                labels:
                  instance: ned
                  role: storage

          - job_name: smartctl-ned
            static_configs:
              - targets: ["10.0.10.80:9633"]
                labels:
                  instance: ned

          - job_name: node-bran
            static_configs:
              - targets: ["10.0.10.9:9100"]
                labels:
                  instance: bran
                  role: observer

    # ----- Alertmanager -----
    alertmanager:
      enabled: true
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: nfs-truenas
              accessModes: ["ReadWriteMany"]
              resources:
                requests:
                  storage: 1Gi
        # Select AlertmanagerConfig resources from all namespaces.
        alertmanagerConfigSelector: {}
        alertmanagerConfigNamespaceSelector: {}
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: ["alertname", "namespace"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          receiver: "null"
        receivers:
          - name: "null"

    # ----- Node Exporter -----
    prometheus-node-exporter:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

    # ----- kube-state-metrics -----
    kube-state-metrics:
      metricLabelsAllowlist:
        - pods=[*]
        - deployments=[*]

