apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "67.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 24h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # ----- Grafana -----
    # Grafana runs as a native systemd service on varys (10.0.10.10).
    # Managed by Ansible — see ansible/playbooks/services/install-monitoring.yml.
    defaultRules:
      create: true
    grafana:
      enabled: false

    # ----- Prometheus -----
    prometheus:
      prometheusSpec:
        retention: 15d
        retentionSize: "15GB"
        storageSpec:
          volumeClaimTemplate:
            spec:
              # local-path (k3s built-in) — Prometheus writes to WAL every few seconds.
              # NFS causes stale file handle errors on any server blip, silently
              # dropping all metrics. Local disk is the only reliable choice for TSDB.
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 20Gi
        # Send alerts to Alertmanager on varys (10.0.10.10)
        additionalAlertManagerConfigs:
          - scheme: http
            timeout: 10s
            api_version: v2
            static_configs:
              - targets:
                  - "10.0.10.10:9093"

        # Scrape all namespaces
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        # External scrape targets — hosts outside the k3s cluster.
        additionalScrapeConfigs:
          - job_name: node-varys
            static_configs:
              - targets: ["10.0.10.10:9100"]
                labels:
                  instance: varys
                  role: control-hub

          - job_name: node-docker
            static_configs:
              - targets: ["10.0.10.20:9100"]
                labels:
                  instance: docker
                  role: docker-host

          - job_name: cadvisor-docker
            static_configs:
              - targets: ["10.0.10.20:8080"]
                labels:
                  instance: docker

          - job_name: node-truenas
            static_configs:
              - targets: ["10.0.10.80:9100"]
                labels:
                  instance: truenas
                  role: storage

          - job_name: smartctl-truenas
            static_configs:
              - targets: ["10.0.10.80:9633"]
                labels:
                  instance: truenas

    # ----- Alertmanager -----
    # Alertmanager runs as a native systemd service on varys (10.0.10.10).
    # Managed by Ansible — see ansible/playbooks/services/install-monitoring.yml.
    # Prometheus is configured below to send alerts to 10.0.10.10:9093.
    alertmanager:
      enabled: false

    # ----- Node Exporter -----
    prometheus-node-exporter:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

    # ----- kube-state-metrics -----
    kube-state-metrics:
      metricLabelsAllowlist:
        - pods=[*]
        - deployments=[*]

