apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-internal
  namespace: ingress-internal
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: "39.0.7"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    deployment:
      replicas: 3

    podDisruptionBudget:
      enabled: true
      minAvailable: 1

    service:
      type: LoadBalancer
      annotations:
        metallb.universe.tf/loadBalancerIPs: "10.0.10.111"

    # Rename default entrypoints to avoid collision with traefik-external.
    # IngressRoutes for internal services reference websecure-int.
    ports:
      web:
        port: 80
        expose:
          default: true
        http:
          redirections:
            entryPoint:
              to: ":443"
              scheme: https
              permanent: true
      websecure:
        expose:
          default: false     # disable the default websecure entrypoint
      websecure-int:
        port: 443
        expose:
          default: true
        http:
          tls:
            enabled: true
      traefik:
        expose:
          default: false

    providers:
      kubernetesCRD:
        # Watch only the namespaces this instance serves — avoids TLSStore
        # conflicts with the external Traefik instance in the ingress namespace.
        namespaces:
          - ingress-internal
          - apps
          - auth
          - monitoring

    # No CrowdSec on internal entrypoint — LAN traffic only.

    # Expose Prometheus metrics
    metrics:
      prometheus:
        entryPoint: metrics
        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true

    logs:
      access:
        enabled: true

    ingressRoute:
      dashboard:
        enabled: false    # managed via IngressRoute in traefik-config (traefik.local.kagiso.me)

    api:
      dashboard: true
