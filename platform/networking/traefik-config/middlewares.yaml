# Traefik Middlewares — global reusable middlewares for all IngressRoutes.
#
# How to reference from an IngressRoute in another namespace:
#   middlewares:
#     - name: ingress-redirect-https@kubernetescrd
#
# Note: The global HTTP→HTTPS redirect is ALSO configured at the entrypoint level
# in the Traefik HelmRelease (ports.web.redirectTo.port: websecure), which means
# ALL HTTP traffic is redirected to HTTPS automatically — even without referencing
# this middleware. This named Middleware exists for explicit use in IngressRoutes
# that want to declare the redirect intentionally.
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: ingress
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# Strip trailing slash — useful for apps that break on double-slash URLs
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-slash
  namespace: ingress
spec:
  redirectRegex:
    regex: ^(https?://[^/]+/[^?]*)/$
    replacement: ${1}
    permanent: true
---
# CrowdSec ForwardAuth — checks each request against the CrowdSec decision list
# before routing to the backend. Applied globally to the websecure entrypoint via
# platform/networking/traefik/helmrelease.yaml (ports.websecure.middlewares).
#
# The bouncer runs in stream mode and caches decisions locally, so brief LAPI
# downtime does not block traffic. Reference from IngressRoute (cross-namespace):
#   middlewares:
#     - name: ingress-crowdsec-bouncer@kubernetescrd
---
# Block admin paths from the external entrypoint — return 403 Forbidden.
# Applied on external IngressRoutes for Vaultwarden (/admin) and Authentik (/if/admin/, /api/v3/admin/).
# The same apps expose these paths unrestricted on the internal entrypoint (websecure-int).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: block-admin
  namespace: ingress
spec:
  ipAllowList:
    sourceRange:
      - "127.0.0.1/32"   # effectively blocks all — no real traffic comes from localhost
---
# Secure HTTP headers — adds HSTS and other security headers.
# Reference from IngressRoute (cross-namespace):
#   middlewares:
#     - name: ingress-secure-headers@kubernetescrd
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: secure-headers
  namespace: ingress
spec:
  headers:
    stsSeconds: 15552000
    stsIncludeSubdomains: true
    stsPreload: false
    contentTypeNosniff: true
    customFrameOptionsValue: SAMEORIGIN
    browserXssFilter: true
    referrerPolicy: strict-origin-when-cross-origin
    customResponseHeaders:
      Permissions-Policy: "camera=(), microphone=(), geolocation=()"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: crowdsec-bouncer
  namespace: ingress
spec:
  forwardAuth:
    address: http://traefik-bouncer-service.crowdsec.svc.cluster.local/api/v1/forwardAuth
    trustForwardHeader: true
---
# Auth rate limit — per-IP request cap on login-facing services (Authentik, Vaultwarden).
# Adds a second layer over CrowdSec reputation blocking to slow brute-force attempts.
# Reference from IngressRoute (cross-namespace):
#   middlewares:
#     - name: ingress-auth-rate-limit@kubernetescrd
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: auth-rate-limit
  namespace: ingress
spec:
  rateLimit:
    average: 20
    period: 1m
    burst: 40
---
# Authentik forward auth — gates access to an app behind Authentik SSO.
# PREREQUISITE: create a Proxy Provider (forward auth, single application mode)
# in Authentik for each protected app and assign it to the embedded outpost.
# Also add a /outpost.goauthentik.io route on each app's IngressRoute pointing
# to authentik-server.auth so the session cookie is set on the app's domain.
# Reference from IngressRoute (cross-namespace):
#   middlewares:
#     - name: ingress-authentik-forwardauth@kubernetescrd
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-forwardauth
  namespace: ingress
spec:
  forwardAuth:
    address: http://authentik-server.auth.svc.cluster.local/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authRequestHeaders:
      - "Cookie"
      - "Authorization"
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version
---
# Compression — enables gzip/zstd/brotli for text-based responses.
# Traefik automatically skips compression for already-compressed formats (images, video).
# Reference from IngressRoute (cross-namespace):
#   middlewares:
#     - name: ingress-compress@kubernetescrd
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: compress
  namespace: ingress
spec:
  compress: {}
