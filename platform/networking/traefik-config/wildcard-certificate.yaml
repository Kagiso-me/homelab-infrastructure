# Wildcard TLS certificate for *.kagiso.me
# Issued by Let's Encrypt (production) via DNS-01 challenge using the Cloudflare API.
# The resulting Secret (wildcard-kagiso-me-tls) is referenced by the Traefik default
# TLSStore so all IngressRoutes in the cluster automatically serve the wildcard cert
# without needing per-service Certificate resources.
#
# Covers both *.kagiso.me (subdomains) and kagiso.me (apex).
# cert-manager auto-renews 15 days before expiry.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-kagiso-me
  namespace: ingress
spec:
  secretName: wildcard-kagiso-me-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "*.kagiso.me"
    - "kagiso.me"
  duration: 2160h    # 90 days (Let's Encrypt max)
  renewBefore: 360h  # Renew 15 days before expiry
