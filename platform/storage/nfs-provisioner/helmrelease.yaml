apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfs-subdir-external-provisioner
  namespace: storage
spec:
  interval: 30m
  chart:
    spec:
      chart: nfs-subdir-external-provisioner
      version: "4.0.x"
      sourceRef:
        kind: HelmRepository
        name: nfs-subdir-external-provisioner
        namespace: flux-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    nfs:
      server: 10.0.10.80
      path: /mnt/core/k8s-volumes

    storageClass:
      name: nfs-truenas
      defaultClass: true
      reclaimPolicy: Retain
      volumeBindingMode: Immediate
      # Moves data to archived/ prefix instead of deleting when PVC is removed
      archiveOnDelete: true
      # Subdirectory pattern: namespace-pvcname-pvname
      pathPattern: "${.PVC.namespace}-${.PVC.name}-${.PV.name}"
