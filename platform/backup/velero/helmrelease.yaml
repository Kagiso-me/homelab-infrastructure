apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 30m
  chart:
    spec:
      chart: velero
      version: "8.x"
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: flux-system
      interval: 24h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # Install the AWS plugin to speak S3 (MinIO is S3-compatible)
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.10.1
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins

    configuration:
      # Use the aws provider — MinIO exposes an S3-compatible API
      backupStorageLocation:
        - name: truenas-minio
          provider: aws
          bucket: velero
          default: true
          config:
            region: minio
            s3Url: http://10.0.10.80:9000
            s3ForcePathStyle: "true"
            insecureSkipTLSVerify: "true"

      # No volume snapshots — file-based backup via node-agent (restic) only.
      # Without this, the chart creates a VolumeSnapshotLocation with null
      # provider/credential which fails CRD validation.
      volumeSnapshotLocation: []

      # Use file-system backup for all PVCs by default
      defaultVolumesToFsBackup: true

    credentials:
      # Credentials are stored in a SOPS-encrypted Secret (minio-credentials.yaml)
      existingSecret: velero-minio-credentials

    # Node-agent (formerly restic) for file-system backup of PVC data.
    deployNodeAgent: true

    nodeAgent:
      podVolumePath: /var/lib/kubelet/pods
      privileged: true
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

    # Deploy a ServiceMonitor so Prometheus scrapes Velero metrics
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

    # Default backup storage location name used by the Schedule CRD
    defaultBackupStorageLocation: truenas-minio

    # Disable pre-install CRD upgrade job — Helm manages CRDs via install.crds: CreateReplace
    # The bitnami/kubectl image used by the job is no longer publicly available on Docker Hub
    upgradeCRDs: false
