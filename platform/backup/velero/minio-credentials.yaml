# SOPS-encrypted Secret — MinIO credentials for Velero.
# This file is encrypted with age. Never commit the plaintext version.
#
# To create (before encrypting):
#   kubectl create secret generic velero-minio-credentials \
#     --namespace velero \
#     --from-literal=cloud="[default]
#   aws_access_key_id=<MINIO-ACCESS-KEY>
#   aws_secret_access_key=<MINIO-SECRET-KEY>" \
#     --dry-run=client -o yaml | sops --encrypt --input-type yaml --output-type yaml /dev/stdin > minio-credentials.yaml
#
# The "cloud" key must contain an AWS credentials-file formatted string
# because velero-plugin-for-aws reads credentials using the AWS SDK.
apiVersion: v1
kind: Secret
metadata:
  name: velero-minio-credentials
  namespace: velero
type: Opaque
stringData:
  cloud: |
    [default]
    aws_access_key_id=ECC4AM0G2ZFHHLVI7FIR
    aws_secret_access_key=qD1mhwzwCVEsNZxNTI0oXUtklwLESpZjDAaLZGly
