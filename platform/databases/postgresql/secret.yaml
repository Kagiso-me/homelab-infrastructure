# SOPS-encrypted Secret — PostgreSQL admin credentials.
# This file must be encrypted with age before committing real values.
# Never commit the plaintext version.
#
# To create:
#   kubectl create secret generic postgresql-secret \
#     --namespace databases \
#     --from-literal=postgres-password=REPLACE_WITH_STRONG_PASSWORD \
#     --dry-run=client -o yaml \
#     | sops --encrypt --input-type yaml --output-type yaml /dev/stdin \
#     > platform/databases/postgresql/secret.yaml
#
# Per-app database users are provisioned separately when each app is deployed.
# The postgres superuser password here is used only for initial setup and
# creating per-app users (nextcloud, authentik, etc.) via psql.
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secret
  namespace: databases
type: Opaque
stringData:
  postgres-password: REPLACE_WITH_STRONG_PASSWORD
