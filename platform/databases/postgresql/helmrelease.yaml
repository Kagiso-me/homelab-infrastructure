apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgresql
  namespace: databases
spec:
  interval: 30m
  chart:
    spec:
      chart: postgresql
      version: "0.3.3"
      sourceRef:
        kind: HelmRepository
        name: kagiso-me
        namespace: flux-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # pgvector image — includes the vector extension required by Immich.
    # Functionally identical to the vanilla postgres image for all other uses.
    image:
      repository: pgvector/pgvector
      tag: pg17

    auth:
      existingSecret: postgresql-secret
      secretKeys:
        adminPasswordKey: postgres-password

    primary:
      # No node affinity — PV is on NFS (TrueNAS), accessible from any node.
      # Toleration still required so the pod can schedule on control-plane
      # nodes if that is where the scheduler places it.
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

      persistence:
        enabled: true
        storageClass: nfs-databases
        size: 8Gi

      # nfs-databases export has no uid squash — postgres uid 999 is preserved.
      # fsGroup ensures the data directory group matches the postgres gid.
      podSecurityContext:
        fsGroup: 999

      # Extended startup probe — NFS WAL replay on an unclean shutdown can take
      # several minutes. Default liveness probe kills PostgreSQL mid-recovery,
      # causing an infinite restart loop. 30s period * 40 failures = 20 minutes
      # before the pod is considered failed, giving recovery time to complete.
      livenessProbe:
        initialDelaySeconds: 60
        periodSeconds: 30
        failureThreshold: 40
        timeoutSeconds: 10

      startupProbe:
        initialDelaySeconds: 30
        periodSeconds: 30
        failureThreshold: 40
        timeoutSeconds: 10

      # No memory limit — OOM-killing a database is worse than letting it
      # use available RAM. Request ensures the scheduler accounts for it.
      resources:
        requests:
          memory: 512Mi
          cpu: 250m
        limits:
          cpu: 500m

    # NFS does not allow chown from within a container — disable the
    # volumePermissions init container. Instead set podSecurityContext.fsGroup
    # so the kernel applies group ownership at mount time (no chown needed).
    volumePermissions:
      enabled: false

    metrics:
      # Disabled: postgres_exporter query for pg_stat_bgwriter.checkpoints_timed
      # is incompatible with PostgreSQL 17 (column moved to pg_stat_checkpointer).
      # TODO: fix the chart query then re-enable.
      enabled: false
