apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgresql
  namespace: databases
spec:
  interval: 30m
  chart:
    spec:
      chart: postgresql
      version: "0.3.3"
      sourceRef:
        kind: HelmRepository
        name: kagiso-me
        namespace: flux-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # pgvector image — includes the vector extension required by Immich.
    # Functionally identical to the vanilla postgres image for all other uses.
    image:
      repository: pgvector/pgvector
      tag: pg17

    auth:
      existingSecret: postgresql-secret
      secretKeys:
        adminPasswordKey: postgres-password

    primary:
      # Pin to control plane — central data services live on tywin.
      # See ADR-011. Toleration required for the NoSchedule taint k3s applies
      # to control-plane nodes. local-path PV is node-local, so the pod must
      # always land on the same node to access its data.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

      persistence:
        enabled: true
        storageClass: local-path
        size: 8Gi

      # No memory limit — OOM-killing a database is worse than letting it
      # use available RAM. Request ensures the scheduler accounts for it.
      resources:
        requests:
          memory: 512Mi
          cpu: 250m
        limits:
          cpu: 500m

    # local-path provisions volumes owned by root. Fix ownership so the
    # postgres container (uid 999) can write to its data directory.
    volumePermissions:
      enabled: true

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        interval: 30s
