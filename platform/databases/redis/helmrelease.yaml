apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: databases
spec:
  interval: 30m
  chart:
    spec:
      chart: redis
      version: "0.1.5"
      sourceRef:
        kind: HelmRepository
        name: kagiso-me
        namespace: flux-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    auth:
      enabled: true
      existingSecret: redis-secret
      existingSecretPasswordKey: redis-password

    master:
      # Pin hard to tywin by hostname — local-path PV is node-local.
      # Redis is a cache; losing it on node failure is acceptable. Pinning to
      # tywin (primary control plane) gives it the most stable node in the
      # cluster. Toleration required for the control-plane NoSchedule taint.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - tywin
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

      persistence:
        enabled: true
        storageClass: local-path
        size: 1Gi

      resources:
        requests:
          memory: 128Mi
          cpu: 100m

    # local-path provisions volumes owned by root. Fix ownership so the
    # redis container (uid 1000) can write to its data directory.
    volumePermissions:
      enabled: true

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        interval: 30s
