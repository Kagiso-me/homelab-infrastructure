# SOPS-encrypted Secret — Redis auth credentials.
# This file must be encrypted with age before committing real values.
# Never commit the plaintext version.
#
# To create:
#   kubectl create secret generic redis-secret \
#     --namespace databases \
#     --from-literal=redis-password=REPLACE_WITH_STRONG_PASSWORD \
#     --dry-run=client -o yaml \
#     | sops --encrypt --input-type yaml --output-type yaml /dev/stdin \
#     > platform/databases/redis/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: databases
type: Opaque
stringData:
  redis-password: REPLACE_WITH_STRONG_PASSWORD
