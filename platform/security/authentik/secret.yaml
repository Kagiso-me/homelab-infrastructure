---
# SOPS-encrypted secret for Authentik.
# Encrypt before committing:
#   sops --encrypt --in-place platform/security/authentik/secret.yaml
#
# secret_key:         50+ char random string — signs sessions and tokens.
#                     Generate with: python3 -c "import secrets; print(secrets.token_hex(32))"
# postgresql-password: password for the 'authentik' PostgreSQL user
# redis-password:     password for the bundled Redis instance
# bootstrap-password: initial akadmin password (change after first login)
# bootstrap-email:    email for the akadmin account
# bootstrap-token:    optional API token for automation (can be left blank)
apiVersion: v1
kind: Secret
metadata:
  name: authentik-secret
  namespace: auth
stringData:
  secret_key: CHANGE_ME_50_CHAR_RANDOM_HEX_STRING
  postgresql-password: CHANGE_ME
  redis-password: CHANGE_ME
  bootstrap-password: CHANGE_ME
  bootstrap-email: admin@kagiso.me
  bootstrap-token: CHANGE_ME
