apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authentik
  namespace: auth
spec:
  entryPoints:
    - websecure
  routes:
    # Block admin UI and admin API from the public internet — internal ingress only.
    - match: Host(`auth.kagiso.me`) && (PathPrefix(`/if/admin/`) || PathPrefix(`/api/v3/admin/`))
      kind: Rule
      middlewares:
        - name: block-admin
          namespace: ingress
      services:
        - name: authentik-server
          port: 80
    # Allow all other paths (login, OAuth flows, user portal, etc.).
    - match: Host(`auth.kagiso.me`)
      kind: Rule
      services:
        - name: authentik-server
          port: 80
  tls: {}
