apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authentik
  namespace: auth
spec:
  entryPoints:
    - websecure
  routes:
    # Public auth endpoints only — admin UI (/if/admin/) is internal-only.
    - match: Host(`auth.kagiso.me`) && (PathPrefix(`/api/v3/`) || PathPrefix(`/application/`) || PathPrefix(`/if/flow/`) || PathPrefix(`/if/user/`) || PathPrefix(`/.well-known/`) || PathPrefix(`/outpost.goauthentik.io/`))
      kind: Rule
      middlewares:
        - name: ingress-secure-headers@kubernetescrd
        - name: ingress-compress@kubernetescrd
        - name: ingress-crowdsec-bouncer@kubernetescrd
        - name: ingress-auth-rate-limit@kubernetescrd
      services:
        - name: authentik-server
          port: 80
  tls: {}
