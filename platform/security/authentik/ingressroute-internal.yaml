apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authentik-internal
  namespace: auth
spec:
  entryPoints:
    - websecure-int
  routes:
    - match: Host(`auth.local.kagiso.me`)
      kind: Rule
      services:
        - name: authentik-server
          port: 80
    - match: Host(`auth.kagiso.me`) && (PathPrefix(`/if/admin/`) || PathPrefix(`/api/v3/admin/`))
      kind: Rule
      services:
        - name: authentik-server
          port: 80
  tls: {}
