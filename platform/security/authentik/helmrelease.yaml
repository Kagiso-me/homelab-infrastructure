apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: auth
spec:
  interval: 30m
  chart:
    spec:
      chart: authentik
      version: "2026.2.1"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  # Inject secrets as Helm values — keeps credentials out of this file.
  valuesFrom:
    - kind: Secret
      name: authentik-secret
      valuesKey: secret_key
      targetPath: authentik.secret_key
    - kind: Secret
      name: authentik-secret
      valuesKey: postgresql-password
      targetPath: authentik.postgresql.password
    - kind: Secret
      name: authentik-secret
      valuesKey: smtp-password
      targetPath: authentik.email.password
  values:
    authentik:
      log_level: info
      error_reporting:
        enabled: false
      postgresql:
        host: postgresql-primary.databases.svc.cluster.local
        port: 5432
        name: authentik
        user: authentik
        # password injected via valuesFrom
      email:
        host: smtp.resend.com
        port: 587
        use_tls: true
        use_ssl: false
        from: noreply@kagiso.me
        username: resend
        timeout: 30
        # password (Resend API key) injected via valuesFrom

    # Disable bundled PostgreSQL — we use our shared cluster PostgreSQL.
    postgresql:
      enabled: false

    global:
      env:
        # Bootstrap admin account — only applied on first startup.
        - name: AUTHENTIK_BOOTSTRAP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-secret
              key: bootstrap-password
        - name: AUTHENTIK_BOOTSTRAP_EMAIL
          valueFrom:
            secretKeyRef:
              name: authentik-secret
              key: bootstrap-email
        - name: AUTHENTIK_BOOTSTRAP_TOKEN
          valueFrom:
            secretKeyRef:
              name: authentik-secret
              key: bootstrap-token
        # Redis connection — external Redis in databases namespace.
        - name: AUTHENTIK_REDIS__HOST
          value: redis-master.databases.svc.cluster.local
        - name: AUTHENTIK_REDIS__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-secret
              key: redis-password

    server:
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 0
          maxSurge: 1
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          interval: 30s
