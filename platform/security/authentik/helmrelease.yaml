apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: auth
spec:
  interval: 30m
  chart:
    spec:
      chart: authentik
      version: ">=2024.8.0"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  # Inject secrets as Helm values — keeps credentials out of this file.
  valuesFrom:
    - kind: Secret
      name: authentik-secret
      valuesKey: secret_key
      targetPath: authentik.secret_key
    - kind: Secret
      name: authentik-secret
      valuesKey: postgresql-password
      targetPath: authentik.postgresql.password
    - kind: Secret
      name: authentik-secret
      valuesKey: redis-password
      targetPath: authentik.redis.password
    - kind: Secret
      name: authentik-secret
      valuesKey: smtp-password
      targetPath: authentik.email.password
  values:
    authentik:
      error_reporting:
        enabled: false
      log_level: info
      postgresql:
        # Uses the shared central PostgreSQL in the databases namespace.
        # The 'authentik' database and user must be created before first deploy —
        # see platform/security/authentik/README instructions.
        host: postgresql.databases.svc.cluster.local
        port: 5432
        name: authentik
        user: authentik
        # password injected via valuesFrom
      redis:
        host: redis-master.databases.svc.cluster.local
        # password injected via valuesFrom
      email:
        host: smtp.resend.com
        port: 587
        use_tls: true
        use_ssl: false
        from: noreply@kagiso.me
        username: resend
        timeout: 30
        # password (Resend API key) injected via valuesFrom

    global:
      # Bootstrap admin account — only applied on first startup.
      # Change password via UI after first login.
      env:
        - name: AUTHENTIK_BOOTSTRAP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-secret
              key: bootstrap-password
        - name: AUTHENTIK_BOOTSTRAP_EMAIL
          valueFrom:
            secretKeyRef:
              name: authentik-secret
              key: bootstrap-email
        - name: AUTHENTIK_BOOTSTRAP_TOKEN
          valueFrom:
            secretKeyRef:
              name: authentik-secret
              key: bootstrap-token

    server:
      # Disable built-in ingress — Traefik IngressRoute is used instead.
      ingress:
        enabled: false
      metrics:
        serviceMonitor:
          enabled: true
          interval: 30s

    # Bundled PostgreSQL disabled — using the shared central PostgreSQL instance.
    postgresql:
      enabled: false

    # Bundled Redis disabled — using the shared central Redis instance.
    redis:
      enabled: false
