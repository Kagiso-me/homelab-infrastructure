apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 30m
  chart:
    spec:
      chart: cert-manager
      version: "v1.20.2"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
      interval: 24h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # cert-manager v1.15+ moved CRDs to a subchart — crds.enabled is required to install them.
    # keep: true prevents CRDs from being deleted on chart uninstall.
    crds:
      enabled: true
      keep: true
    # ServiceMonitor disabled on bootstrap — kube-prometheus-stack CRDs don't exist yet.
    # Re-enable once platform-observability is healthy.
    prometheus:
      enabled: true
      servicemonitor:
        enabled: false
