# Staging issuer — use for testing certificate issuance without consuming rate limits.
# Certificates from staging are NOT trusted by browsers.
# Switch to letsencrypt-prod once staging issuance is confirmed working.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    email: admin@kagiso.me    # receives Let's Encrypt expiry notifications
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
