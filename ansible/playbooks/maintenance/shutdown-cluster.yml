- name: Set maintenance banner on kagiso.me
  hosts: control_hub
  become: false
  tasks:
    - name: Write maintenance.json
      ansible.builtin.copy:
        content: |
          { "active": true, "message": "Homelab is under scheduled maintenance — nodes are offline. Back shortly." }
        dest: /home/kagiso/kagiso-me.github.io/public/data/maintenance.json

    - name: Commit and push maintenance flag
      ansible.builtin.shell: |
        cd /home/kagiso/kagiso-me.github.io
        git add public/data/maintenance.json
        git commit -m "ops: set maintenance mode [skip ci audit]"
        git pull --rebase
        git push
      args:
        executable: /bin/bash

- name: Cordon and drain k3s worker/server nodes
  hosts: k3s_servers
  become: true
  serial: 1
  ignore_unreachable: true
  tasks:
    - name: Cordon node
      command: kubectl cordon {{ inventory_hostname }}
      delegate_to: tywin
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Drain node
      command: >
        kubectl drain {{ inventory_hostname }}
        --ignore-daemonsets
        --delete-emptydir-data
        --disable-eviction
        --grace-period=60
        --timeout=180s
      delegate_to: tywin
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Shut down node
      ansible.builtin.command: shutdown -h now
      async: 1
      poll: 0
      ignore_errors: true

    - name: Wait for node to go offline
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 22
        state: absent
        delay: 10
        timeout: 120
      delegate_to: localhost

- name: Shut down primary node
  hosts: k3s_primary
  become: true
  tasks:
    - name: Shut down primary node
      ansible.builtin.command: shutdown -h now
      async: 1
      poll: 0
      ignore_errors: true

    - name: Wait for primary to go offline
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 22
        state: absent
        delay: 10
        timeout: 120
      delegate_to: localhost

- name: Shut down control hub last
  hosts: control_hub
  become: true
  tasks:
    - name: Shut down control hub
      ansible.builtin.command: shutdown -h now
      async: 1
      poll: 0
      ignore_errors: true
