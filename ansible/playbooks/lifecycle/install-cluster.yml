- name: Install node prerequisites
  hosts: k3s_primary,k3s_servers
  become: true
  tasks:
    - name: Install NFS client utilities
      apt:
        name: nfs-common
        state: present
        update_cache: yes

- name: Install K3s primary server (cluster-init + etcd)
  hosts: k3s_primary
  become: true
  roles:
    - k3s_install

- name: Install K3s additional servers (join cluster)
  hosts: k3s_servers
  become: true
  serial: 1
  roles:
    - k3s_install

- name: Deploy kube-vip control-plane VIP
  hosts: k3s_primary
  become: true
  vars_files:
    - ../../roles/k3s_install/defaults/main.yml
  tasks:
    - name: Create k3s manifests directory
      file:
        path: /var/lib/rancher/k3s/server/manifests
        state: directory
        mode: "0755"

    - name: Install kube-vip RBAC manifest
      template:
        src: ../../roles/k3s_install/templates/kube-vip-rbac.yaml.j2
        dest: /var/lib/rancher/k3s/server/manifests/kube-vip-rbac.yaml
        mode: "0644"

    - name: Install kube-vip DaemonSet manifest
      template:
        src: ../../roles/k3s_install/templates/kube-vip-daemonset.yaml.j2
        dest: /var/lib/rancher/k3s/server/manifests/kube-vip-daemonset.yaml
        mode: "0644"

    - name: Apply kube-vip manifests directly
      command: kubectl apply -f /var/lib/rancher/k3s/server/manifests/kube-vip-rbac.yaml -f /var/lib/rancher/k3s/server/manifests/kube-vip-daemonset.yaml
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Wait for kube-vip DaemonSet rollout
      command: kubectl -n kube-system rollout status daemonset/kube-vip-ds --timeout=180s
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Wait for Kubernetes API VIP to respond
      wait_for:
        host: "{{ k3s_api_endpoint }}"
        port: 6443
        timeout: 180

- name: Fetch kubeconfig
  hosts: k3s_primary
  become: true
  tasks:
    - name: Fetch kubeconfig from primary server
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ lookup('env','HOME') }}/.kube/config"
        flat: yes

- name: Fix kubeconfig endpoint
  hosts: localhost
  tasks:
    - name: Replace 127.0.0.1 with control-plane VIP in kubeconfig
      replace:
        path: "{{ lookup('env','HOME') }}/.kube/config"
        regexp: '^(\s*server: https://).*(:6443.*)$'
        replace: '\g<1>{{ hostvars[groups["k3s_primary"][0]].k3s_api_endpoint }}\g<2>'

- name: Verify cluster health
  hosts: k3s_primary
  become: true
  tasks:
    - name: Wait for all nodes to be Ready
      shell: |
        kubectl get nodes \
          -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{range .status.conditions[?(@.type=="Ready")]}{.status}{"\n"}{end}{end}' \
          | grep -v "^$" | awk '$2 != "True" {print $1, "is NOT Ready"; found=1} END {if (found) exit 1}'
      register: nodes_ready
      changed_when: false
      retries: 12
      delay: 10
      until: nodes_ready.rc == 0
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Print cluster node status
      command: kubectl get nodes
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
