---
# install-platform.yml
#
# Bootstraps Flux GitOps onto a k3s cluster and waits for the full platform
# layer to converge. Run this playbook AFTER install-cluster.yml.
#
# What this does (in order):
#   1. Installs the flux2 CLI on the control plane node
#   2. Installs the Flux controllers via 'flux install --export | kubectl apply'
#      (generates current controller manifests on-the-fly; no pre-committed file needed)
#   3. Creates the flux-system SSH deploy key secret (from vault)
#   4. Applies the GitRepository + Kustomization sync from gotk-sync.yaml
#   5. Waits for all platform kustomizations to reach Ready state
#
# Flux then reconciles everything else from Git:
#   - MetalLB        — bare-metal LoadBalancer IP address pool
#   - Traefik        — HTTP/S ingress controller + TLS termination
#   - cert-manager   — TLS certificate automation (Let's Encrypt DNS-01 wildcard)
#   - All other platform and app components defined in the repo
#
# DO NOT install MetalLB, Traefik, or cert-manager directly from this playbook.
# Those components are fully managed by Flux via GitOps. Installing them here
# creates duplicate resources that conflict with Flux-managed deployments.
#
# TARGET: prod cluster bootstrap server (k3s_primary group — tywin, 10.0.10.11)
# This playbook is for the PRODUCTION cluster only. Flux watches the `main` branch.
#
# Prerequisites:
#   - k3s cluster running (install-cluster.yml completed successfully)
#   - GitHub SSH deploy key added to the homelab-infrastructure repo as a Deploy Key
#     with write access (GitHub → Settings → Deploy keys → Add deploy key)
#   - ansible/vars/vault.yml contains:
#       cloudflare_api_token        — Cloudflare API token (used by cert-manager)
#       flux_github_ssh_private_key — SSH private key for the Flux deploy key
#       flux_github_known_hosts     — github.com SSH known_hosts entry
#   - clusters/prod/flux-system/gotk-sync.yaml committed in the repo
#     (defines the GitRepository pointing at the prod branch)
#
# Usage (run from inside ansible/ directory):
#   cd ~/homelab-infrastructure/ansible
#   ansible-playbook -i inventory/homelab.yml \
#     playbooks/lifecycle/install-platform.yml
#
# To re-run after a cluster rebuild, the same command applies — fully idempotent.

- name: Bootstrap Flux GitOps and wait for platform convergence
  hosts: k3s_primary
  become: true
  gather_facts: true

  vars_files:
    - ../../vars/vault.yml

  vars:
    flux_version: "2.4.0"
    kubeconfig: "/etc/rancher/k3s/k3s.yaml"

  environment:
    KUBECONFIG: "{{ kubeconfig }}"

  # ============================================================================
  # PRE-FLIGHT — verify cluster is healthy before touching it
  # ============================================================================
  pre_tasks:

    - name: "pre-flight | Verify kubectl is available"
      command: kubectl version --client --output=json
      register: kubectl_check
      changed_when: false
      tags: [always]

    - name: "pre-flight | Verify cluster nodes are all Ready"
      shell: |
        kubectl get nodes \
          -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{range .status.conditions[?(@.type=="Ready")]}{.status}{"\n"}{end}{end}' \
          | awk '$2 != "True" {print $1, "is NOT Ready"; found=1} END {if (found) exit 1}'
      register: nodes_ready
      changed_when: false
      failed_when: nodes_ready.rc != 0
      tags: [always]

  tasks:

    # ============================================================================
    # STEP 1 — flux2 CLI
    # Needed for waiting on kustomization status in later steps.
    # ============================================================================

    - name: "flux | Check if flux CLI is installed"
      command: flux version --client
      register: flux_installed
      changed_when: false
      failed_when: false
      tags: [flux]

    - name: "flux | Install flux2 CLI"
      shell: |
        curl -s https://fluxcd.io/install.sh | FLUX_VERSION={{ flux_version }} bash
      when: flux_installed.rc != 0
      tags: [flux]

    # ============================================================================
    # STEP 2 — Install Flux controllers
    # 'flux install --export' generates the current controller manifests
    # (CRDs + deployments) for the pinned flux_version and pipes them directly
    # into kubectl apply. This is idempotent and requires no pre-committed file.
    # ============================================================================

    - name: "flux | Install Flux controllers (CRDs + deployments)"
      shell: |
        flux install \
          --version={{ flux_version }} \
          --export | kubectl apply -f -
      register: gotk_apply
      changed_when: "'configured' in gotk_apply.stdout or 'created' in gotk_apply.stdout"
      tags: [flux]

    - name: "flux | Wait for Flux controllers to be ready"
      command: >
        kubectl rollout status deployment/{{ item }}
        -n flux-system
        --timeout=120s
      loop:
        - helm-controller
        - kustomize-controller
        - notification-controller
        - source-controller
      changed_when: false
      tags: [flux]

    # ============================================================================
    # STEP 3 — Create Flux SSH deploy key secret
    # The flux-system secret holds the GitHub SSH key used to pull the repo.
    # Key is stored in Ansible Vault. On a fresh cluster, this secret does not
    # exist yet and must be created before the GitRepository can sync.
    # ============================================================================

    - name: "flux | Write SSH private key to temp file"
      copy:
        content: "{{ flux_github_ssh_private_key }}"
        dest: /tmp/flux-identity
        mode: '0600'
      no_log: true
      tags: [flux]

    - name: "flux | Write SSH known_hosts to temp file"
      copy:
        content: "{{ flux_github_known_hosts }}"
        dest: /tmp/flux-known-hosts
        mode: '0644'
      tags: [flux]

    - name: "flux | Create flux-system namespace"
      command: kubectl create namespace flux-system --dry-run=client -o yaml
      register: ns_yaml
      changed_when: false
      tags: [flux]

    - name: "flux | Apply flux-system namespace"
      shell: echo "{{ ns_yaml.stdout }}" | kubectl apply -f -
      changed_when: false
      tags: [flux]

    - name: "flux | Create flux-system SSH secret"
      shell: >
        kubectl create secret generic flux-system
        --namespace flux-system
        --from-file=identity=/tmp/flux-identity
        --from-file=known_hosts=/tmp/flux-known-hosts
        --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false
      no_log: true
      tags: [flux]

    - name: "flux | Remove temp key files"
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/flux-identity
        - /tmp/flux-known-hosts
      tags: [flux]

    # ============================================================================
    # STEP 4 — Apply GitRepository + Kustomization sync
    # gotk-sync.yaml tells Flux where to pull from (the GitHub repo) and which
    # path to reconcile (clusters/prod). Flux takes it from here.
    # ============================================================================

    - name: "flux | Copy gotk-sync.yaml to control plane"
      copy:
        src: "../../../clusters/prod/flux-system/gotk-sync.yaml"
        dest: /tmp/gotk-sync.yaml
        mode: '0644'
      tags: [flux]

    - name: "flux | Apply GitRepository and Kustomization sync"
      command: kubectl apply -f /tmp/gotk-sync.yaml
      register: sync_apply
      changed_when: "'configured' in sync_apply.stdout or 'created' in sync_apply.stdout"
      tags: [flux]

    - name: "flux | Wait for GitRepository to sync"
      shell: |
        kubectl get gitrepository flux-system -n flux-system \
          -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: git_ready
      changed_when: false
      failed_when: false
      retries: 18
      delay: 10
      until: git_ready.stdout == "True"
      tags: [flux]

    # ============================================================================
    # STEP 5 — Pre-create cert-manager Cloudflare API token Secret
    # The cloudflare-api-token Secret must exist in the cert-manager namespace
    # before Flux reconciles the letsencrypt-prod ClusterIssuer. Without it,
    # the ClusterIssuer fails and the wildcard *.kagiso.me cert is never issued.
    # We create the namespace + secret proactively so cert-manager finds the
    # token the moment its controllers come up and attempt DNS-01 validation.
    # ============================================================================

    - name: "cert-manager | Pre-create cert-manager namespace"
      shell: |
        kubectl create namespace cert-manager --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false
      tags: [cert-manager]

    - name: "cert-manager | Pre-create cloudflare-api-token secret"
      shell: >
        kubectl create secret generic cloudflare-api-token
        --namespace cert-manager
        --from-literal=api-token={{ cloudflare_api_token }}
        --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false
      no_log: true
      tags: [cert-manager]

    # ============================================================================
    # STEP 6 — Wait for platform to converge
    # Flux reconciles kustomizations in dependency order. We wait for the key
    # platform layers to become Ready before declaring success.
    # ============================================================================

    - name: "flux | Wait for platform-networking to be Ready"
      shell: |
        kubectl get kustomization platform-networking -n flux-system \
          -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: networking_ready
      changed_when: false
      failed_when: false
      # MetalLB + Traefik installs take time; 5 min total
      retries: 30
      delay: 10
      until: networking_ready.stdout == "True"
      tags: [flux]

    - name: "flux | Wait for platform-security to be Ready"
      shell: |
        kubectl get kustomization platform-security -n flux-system \
          -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: security_ready
      changed_when: false
      failed_when: false
      retries: 30
      delay: 10
      until: security_ready.stdout == "True"
      tags: [flux]

    - name: "flux | Wait for platform-storage to be Ready"
      shell: |
        kubectl get kustomization platform-storage -n flux-system \
          -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: storage_ready
      changed_when: false
      failed_when: false
      retries: 30
      delay: 10
      until: storage_ready.stdout == "True"
      tags: [flux]

  # ============================================================================
  # POST-INSTALL — summary verification
  # ============================================================================
  post_tasks:

    - name: "verify | Show all Flux kustomization statuses"
      command: flux get kustomizations -A
      register: flux_status
      changed_when: false
      tags: [always]

    - name: "verify | Print Flux status"
      debug:
        msg: "{{ flux_status.stdout_lines }}"
      tags: [always]

    - name: "verify | Show HelmRelease statuses"
      command: flux get helmreleases -A
      register: helm_status
      changed_when: false
      tags: [always]

    - name: "verify | Print HelmRelease status"
      debug:
        msg: "{{ helm_status.stdout_lines }}"
      tags: [always]

    - name: "verify | Clean up temp manifests"
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/gotk-sync.yaml
      tags: [always]

