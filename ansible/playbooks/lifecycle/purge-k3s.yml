- name: Purge K3s from all nodes (DESTRUCTIVE)
  hosts: all
  become: true
  gather_facts: false

  vars:
    confirm_purge: false

  pre_tasks:
    - name: Abort unless purge is explicitly confirmed
      fail:
        msg: |
          ❌ PURGE ABORTED

          This playbook is destructive and will REMOVE ALL K3S DATA.

          To proceed, re-run with:
            ansible-playbook playbooks/lifecycle/purge-k3s.yml -e confirm_purge=true
      when: not confirm_purge

  tasks:
    - name: Kill all k3s processes
      shell: /usr/local/bin/k3s-killall.sh || true

    - name: Uninstall k3s server
      shell: /usr/local/bin/k3s-uninstall.sh || true

    - name: Uninstall k3s agent
      shell: /usr/local/bin/k3s-agent-uninstall.sh || true

    - name: Remove k3s binary if still present
      file:
        path: /usr/local/bin/k3s
        state: absent

    - name: Remove K3s data and config directories
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/rancher
        - /var/lib/rancher
        - /var/lib/kubelet
        - /etc/cni
        - /opt/cni
        - /root/.kube
        - /home/{{ ansible_user }}/.kube
        - /var/log/pods
        - /var/log/containers
        - /run/k3s
        - /run/flannel
        - /var/lib/cni
