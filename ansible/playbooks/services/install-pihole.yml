---
# install-pihole.yml
#
# Installs Pi-hole v6 on the Raspberry Pi control hub (10.0.10.10).
# Pi-hole serves as the network-wide DNS resolver and ad blocker.
#
# Pi-hole v6 changes (vs v5):
#   - Web UI served by FTL built-in web server — lighttpd no longer used.
#   - Password set via 'pihole setpassword' after install (not setupVars.conf).
#   - setupVars.conf still used for network/DNS config during unattended install.
#   - dnsmasq.d wildcard config still works (FTL reads /etc/dnsmasq.d/*.conf).
#
# Responsibilities after install:
#   - Network-wide ad blocking (all devices via DHCP DNS assignment)
#   - Split DNS: *.kagiso.me → 10.0.10.110 (Traefik) for internal resolution
#   - Upstream DNS: Cloudflare (1.1.1.1 / 1.0.0.1) with DNSSEC
#
# After running this playbook:
#   1. Point your USG DHCP DNS to 10.0.10.10 (RPi) in UniFi Controller
#   2. Verify Pi-hole admin at http://10.0.10.10/admin
#   3. Verify *.kagiso.me resolves to 10.0.10.110 from any LAN device
#
# Usage:
#   ansible-playbook -i ansible/inventory/homelab.yml \
#     ansible/playbooks/services/install-pihole.yml

- name: Install Pi-hole on Raspberry Pi
  hosts: rpi
  become: true
  gather_facts: true

  vars:
    pihole_upstream_dns_1: "1.1.1.1"
    pihole_upstream_dns_2: "1.0.0.1"
    pihole_domain: "lan"
    pihole_interface: "eth0"
    pihole_ipv4_address: "10.0.10.10/24"
    pihole_rev_server_target: "10.0.10.1"
    traefik_ip: "10.0.10.110"
    kagiso_domain: "kagiso.me"

  vars_prompt:
    - name: pihole_admin_password
      prompt: "Pi-hole admin password"
      private: true
      confirm: true

  tasks:

  # ============================================================================
  # PRE-FLIGHT
  # ============================================================================

    - name: "preflight | Confirm running on RPi"
      assert:
        that:
          - ansible_architecture in ['armv7l', 'aarch64']
        fail_msg: "This playbook is intended for the Raspberry Pi (ARM). Got: {{ ansible_architecture }}"

    - name: "preflight | Update apt cache"
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "preflight | Install required packages"
      apt:
        name:
          - curl
          - git
          - dnsutils
        state: present

    # Pi-hole v6 serves its web UI via FTL's built-in web server on port 80.
    # Lighttpd conflicts with FTL on port 80 — stop and remove it if present.
    - name: "preflight | Stop lighttpd if present"
      systemd:
        name: lighttpd
        state: stopped
        enabled: false
      ignore_errors: true

    - name: "preflight | Remove lighttpd if installed"
      apt:
        name: lighttpd
        state: absent
        purge: true
      ignore_errors: true

  # ============================================================================
  # PI-HOLE INSTALL
  # ============================================================================

    - name: "pihole | Create /etc/pihole directory"
      file:
        path: /etc/pihole
        state: directory
        mode: '0755'
        owner: root
        group: root

    # Pi-hole v6 reads setupVars.conf for network/DNS settings during unattended
    # install. WEBPASSWORD, LIGHTTPD_ENABLED, INSTALL_WEB_SERVER and
    # INSTALL_WEB_INTERFACE are v5-only keys and are intentionally omitted here.
    # Password is set post-install via 'pihole setpassword'.
    - name: "pihole | Create setupVars.conf for unattended install"
      copy:
        dest: /etc/pihole/setupVars.conf
        content: |
          PIHOLE_INTERFACE={{ pihole_interface }}
          IPV4_ADDRESS={{ pihole_ipv4_address }}
          IPV6_ADDRESS=
          QUERY_LOGGING=true
          CACHE_SIZE=10000
          DNS_FQDN_REQUIRED=false
          DNS_BOGUS_PRIV=true
          DNSMASQ_LISTENING=local
          PIHOLE_DNS_1={{ pihole_upstream_dns_1 }}
          PIHOLE_DNS_2={{ pihole_upstream_dns_2 }}
          DNS_SEC=true
          REV_SERVER=true
          REV_SERVER_DOMAIN={{ pihole_domain }}
          REV_SERVER_TARGET={{ pihole_rev_server_target }}
          REV_SERVER_CIDR=10.0.10.0/24
          BLOCKING_ENABLED=true
        mode: '0644'
        owner: root
        group: root

    - name: "pihole | Download installer"
      get_url:
        url: https://install.pi-hole.net
        dest: /tmp/install-pihole.sh
        mode: '0755'

    - name: "pihole | Run unattended installer"
      command: bash /tmp/install-pihole.sh --unattended
      register: pihole_install
      changed_when: true

    - name: "pihole | Remove installer script"
      file:
        path: /tmp/install-pihole.sh
        state: absent

    # In Pi-hole v6, passwords are managed by FTL directly.
    # 'pihole setpassword' replaces the v5 WEBPASSWORD hash in setupVars.conf.
    - name: "pihole | Set admin password"
      command: "pihole setpassword {{ pihole_admin_password | quote }}"
      changed_when: true
      no_log: true

  # ============================================================================
  # SPLIT DNS — wildcard *.kagiso.me → Traefik
  # ============================================================================

    - name: "dns | Write wildcard dnsmasq config for {{ kagiso_domain }}"
      copy:
        dest: /etc/dnsmasq.d/02-kagiso-local.conf
        content: |
          # Wildcard DNS — all *.kagiso.me queries resolve to Traefik on LAN.
          # This enables valid TLS certs (DNS-01 wildcard) to work locally
          # without making services publicly reachable.
          # Services are only publicly accessible if explicitly configured
          # in the Cloudflare Tunnel (cloudflared) ingress rules.
          address=/.{{ kagiso_domain }}/{{ traefik_ip }}
        mode: '0644'

    # Full service restart (not 'pihole restartdns') to guarantee new dnsmasq.d
    # files are picked up by FTL.
    - name: "dns | Restart pihole-FTL to apply wildcard config"
      systemd:
        name: pihole-FTL
        state: restarted

    - name: "dns | Wait for Pi-hole DNS to be ready on port 53"
      wait_for:
        host: 127.0.0.1
        port: 53
        timeout: 30

  # ============================================================================
  # VERIFY
  # ============================================================================

    - name: "verify | Check Pi-hole service is running"
      systemd:
        name: pihole-FTL
      register: ftl_status
      failed_when: ftl_status.status.ActiveState != 'active'

    - name: "verify | Check Pi-hole web UI is reachable on port 80"
      wait_for:
        host: 127.0.0.1
        port: 80
        timeout: 15

    - name: "verify | Test wildcard DNS resolution"
      command: "dig +short grafana.{{ kagiso_domain }} @127.0.0.1"
      register: dns_test
      changed_when: false
      failed_when: traefik_ip not in dns_test.stdout
      retries: 6
      delay: 5
      until: traefik_ip in dns_test.stdout

    - name: "verify | Test upstream DNS resolution"
      command: "dig +short cloudflare.com @127.0.0.1"
      register: upstream_test
      changed_when: false
      failed_when: upstream_test.stdout == ''
      retries: 6
      delay: 5
      until: upstream_test.stdout != ''

    - name: "verify | Summary"
      debug:
        msg: |
          Pi-hole v6 installed successfully.

          Admin UI:    http://{{ ansible_host }}/admin
          DNS server:  {{ ansible_host }} ({{ pihole_ipv4_address | split('/') | first }})

          Wildcard DNS: *.{{ kagiso_domain }} → {{ traefik_ip }} ✓
          Upstream DNS: {{ pihole_upstream_dns_1 }} / {{ pihole_upstream_dns_2 }} ✓

          Next step: In UniFi Controller, set DHCP DNS server to {{ pihole_ipv4_address | split('/') | first }}
          Network → [your network] → DHCP → DNS Server 1: {{ pihole_ipv4_address | split('/') | first }}
