- name: Ensure time sync
  hosts: all
  become: true

  tasks:
    - name: Remove ntp/ntpd if installed
      # Prevents two time sync daemons running simultaneously causing drift.
      apt:
        name:
          - ntp
          - ntpdate
        state: absent

    - name: Install chrony
      apt:
        name: chrony
        state: present
        update_cache: yes

    - name: Write chrony configuration
      copy:
        dest: /etc/chrony/chrony.conf
        content: |
          # Primary: Cloudflare time service (low latency, high accuracy)
          server time.cloudflare.com iburst

          # Fallback: Ubuntu NTP pool
          pool ntp.ubuntu.com iburst maxsources 4

          driftfile /var/lib/chrony/chrony.drift
          makestep 1 3
          rtcsync
          keyfile /etc/chrony/chrony.keys
          leapsectz right/UTC
          logdir /var/log/chrony
        mode: '0644'
        owner: root
        group: root

    - name: Enable and restart chrony
      systemd:
        name: chrony
        enabled: true
        state: restarted

    - name: Verify chrony is tracking
      command: chronyc tracking
      register: chrony_tracking
      changed_when: false
      failed_when: chrony_tracking.rc != 0
