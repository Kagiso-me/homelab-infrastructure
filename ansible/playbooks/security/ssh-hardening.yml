- name: Harden SSH
  hosts: all
  become: true

  tasks:
    - name: Disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        backup: yes
        validate: /usr/sbin/sshd -t -f %s

    - name: Disable root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        backup: yes
        validate: /usr/sbin/sshd -t -f %s

    - name: Disable X11 forwarding
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?X11Forwarding'
        line: 'X11Forwarding no'
        backup: yes
        validate: /usr/sbin/sshd -t -f %s

    - name: Set MaxAuthTries
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MaxAuthTries'
        line: 'MaxAuthTries 3'
        backup: yes
        validate: /usr/sbin/sshd -t -f %s

    - name: Set MaxSessions
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MaxSessions'
        line: 'MaxSessions 5'
        backup: yes
        validate: /usr/sbin/sshd -t -f %s

    - name: Set client alive interval
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ClientAliveInterval'
        line: 'ClientAliveInterval 300'
        backup: yes
        validate: /usr/sbin/sshd -t -f %s

    - name: Set client alive count max
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ClientAliveCountMax'
        line: 'ClientAliveCountMax 2'
        backup: yes
        validate: /usr/sbin/sshd -t -f %s

    - name: Set log level to VERBOSE
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?LogLevel'
        line: 'LogLevel VERBOSE'
        backup: yes
        validate: /usr/sbin/sshd -t -f %s

    - name: Restart SSH
      systemd:
        name: ssh
        state: restarted

    - name: Verify SSH is running after restart
      systemd:
        name: ssh
      register: ssh_status
      failed_when: ssh_status.status.ActiveState != 'active'
