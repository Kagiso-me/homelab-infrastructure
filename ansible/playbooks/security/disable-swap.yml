- name: Disable swap
  hosts: all
  become: true

  tasks:
    - name: Disable swap immediately
      command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: Comment out swap entries in fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#\s]\S+\s+\S+\s+swap\s+.*)$'
        replace: '# \1'

    - name: Verify swap is off
      command: swapon --show
      register: swap_check
      changed_when: false
      failed_when: swap_check.stdout != ''
