# k3s installation defaults

k3s_version: "v1.34.6+k3s1"
k3s_cluster_cidr: "10.42.0.0/16"
k3s_service_cidr: "10.43.0.0/16"

k3s_disable:
  - traefik
  - servicelb

kube_vip_version: "v0.8.9"
kube_vip_interface: "{{ ansible_default_ipv4.interface }}"
kube_vip_address: "10.0.10.100"

# API endpoint used for TLS SAN and kubeconfig
k3s_api_endpoint: "{{ kube_vip_address }}"
