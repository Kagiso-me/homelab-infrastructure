- name: Install K3s agent
  shell: |
    curl -sfL https://get.k3s.io |       K3S_URL="https://{{ hostvars[groups['k3s_controller'][0]].ansible_host }}:6443"       K3S_TOKEN="{{ hostvars[groups['k3s_controller'][0]].k3s_node_token_value }}"       sh -
  args:
    creates: /usr/local/bin/k3s-agent

- name: Enable and start k3s-agent
  systemd:
    name: k3s-agent
    enabled: true
    state: started