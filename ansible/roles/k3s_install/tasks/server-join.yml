- name: Install K3s additional server (join existing cluster)
  shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      K3S_TOKEN="{{ hostvars[groups['k3s_primary'][0]].k3s_node_token_value }}" \
      INSTALL_K3S_EXEC="server \
        --server https://{{ k3s_api_endpoint }}:6443 \
        --node-ip {{ ansible_host }} \
        --cluster-cidr {{ k3s_cluster_cidr }} \
        --service-cidr {{ k3s_service_cidr }} \
        {% for item in k3s_disable %} --disable {{ item }} {% endfor %} \
        --write-kubeconfig-mode=644 \
        --tls-san {{ ansible_host }} \
        --tls-san {{ k3s_api_endpoint }}" \
      sh -
  args:
    creates: /usr/local/bin/k3s

- name: Enable and start k3s
  systemd:
    name: k3s
    enabled: true
    state: started
