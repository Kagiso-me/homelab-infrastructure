- name: Read node token from primary
  command: cat /var/lib/rancher/k3s/server/node-token
  register: k3s_token_raw
  changed_when: false
  delegate_to: "{{ groups['k3s_primary'][0] }}"
  become: true

- name: Set primary server IP fact
  set_fact:
    k3s_primary_ip: "{{ hostvars[groups['k3s_primary'][0]].ansible_host }}"

- name: Verify etcd peer port reachable on primary
  wait_for:
    host: "{{ k3s_primary_ip }}"
    port: 2380
    timeout: 10
    msg: "Cannot reach etcd peer port 2380 on primary ({{ k3s_primary_ip }}). Check firewall."

- name: Verify K3s API reachable on primary
  wait_for:
    host: "{{ k3s_primary_ip }}"
    port: 6443
    timeout: 10
    msg: "Cannot reach K3s API port 6443 on primary ({{ k3s_primary_ip }}). Check firewall."

- name: Install K3s binary only (skip start)
  shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      INSTALL_K3S_SKIP_START=true \
      K3S_TOKEN="{{ k3s_token_raw.stdout }}" \
      INSTALL_K3S_EXEC="server \
        --server https://{{ k3s_primary_ip }}:6443 \
        --node-ip {{ ansible_host }} \
        --cluster-cidr {{ k3s_cluster_cidr }} \
        --service-cidr {{ k3s_service_cidr }} \
        {% for item in k3s_disable %} --disable {{ item }} {% endfor %} \
        --write-kubeconfig-mode=644 \
        --tls-san {{ ansible_host }} \
        --tls-san {{ k3s_api_endpoint }}" \
      sh -
  args:
    creates: /usr/local/bin/k3s

- name: Remove stale etcd members for this node
  shell: |
    etcdctl \
      --endpoints=https://127.0.0.1:2379 \
      --cacert=/var/lib/rancher/k3s/server/tls/etcd/server-ca.crt \
      --cert=/var/lib/rancher/k3s/server/tls/etcd/client.crt \
      --key=/var/lib/rancher/k3s/server/tls/etcd/client.key \
      member list -w simple 2>/dev/null | \
      grep "{{ ansible_host }}:2380" | cut -d',' -f1 | \
      while read -r MID; do
        [ -n "$MID" ] && etcdctl \
          --endpoints=https://127.0.0.1:2379 \
          --cacert=/var/lib/rancher/k3s/server/tls/etcd/server-ca.crt \
          --cert=/var/lib/rancher/k3s/server/tls/etcd/client.crt \
          --key=/var/lib/rancher/k3s/server/tls/etcd/client.key \
          member remove "$MID" 2>/dev/null || true
      done
    true
  delegate_to: "{{ groups['k3s_primary'][0] }}"
  become: true
  changed_when: false

- name: Clean local etcd data from previous attempts
  file:
    path: /var/lib/rancher/k3s/server/db/etcd
    state: absent

- name: Enable k3s service
  systemd:
    name: k3s
    enabled: true
    daemon_reload: true

- name: Start k3s (allow initial failure — systemd will retry)
  command: systemctl start k3s
  register: k3s_start
  failed_when: false
  changed_when: k3s_start.rc == 0

- name: Wait for node to join cluster
  command: >-
    kubectl get node {{ ansible_hostname }}
    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  register: node_ready
  retries: 60
  delay: 10
  until: node_ready.stdout == "True"
  changed_when: false
  delegate_to: "{{ groups['k3s_primary'][0] }}"
  become: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Capture diagnostics on failure
  when: node_ready is failed
  block:
    - name: Get k3s journal
      command: journalctl -u k3s --no-pager -n 50
      register: k3s_journal
      changed_when: false
      failed_when: false

    - name: Get etcd members from primary
      shell: |
        etcdctl \
          --endpoints=https://127.0.0.1:2379 \
          --cacert=/var/lib/rancher/k3s/server/tls/etcd/server-ca.crt \
          --cert=/var/lib/rancher/k3s/server/tls/etcd/client.crt \
          --key=/var/lib/rancher/k3s/server/tls/etcd/client.key \
          member list -w table 2>&1 || true
      register: etcd_members
      delegate_to: "{{ groups['k3s_primary'][0] }}"
      become: true
      changed_when: false
      failed_when: false

    - name: Get listening ports
      command: ss -tlnp
      register: listening_ports
      changed_when: false
      failed_when: false

    - name: Display diagnostics
      fail:
        msg: |
          ETCD JOIN FAILED FOR {{ inventory_hostname }}

          === K3S JOURNAL (last 50 lines) ===
          {{ k3s_journal.stdout }}

          === ETCD MEMBERS ON PRIMARY ===
          {{ etcd_members.stdout }}

          === LISTENING PORTS ===
          {{ listening_ports.stdout }}
