- name: Read node token from primary
  command: cat /var/lib/rancher/k3s/server/node-token
  register: k3s_token_raw
  changed_when: false
  delegate_to: "{{ groups['k3s_primary'][0] }}"
  become: true

- name: Install K3s additional server (binary only)
  shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      INSTALL_K3S_SKIP_START=true \
      K3S_TOKEN="{{ k3s_token_raw.stdout }}" \
      INSTALL_K3S_EXEC="server \
        --server https://{{ k3s_api_endpoint }}:6443 \
        --node-ip {{ ansible_host }} \
        --cluster-cidr {{ k3s_cluster_cidr }} \
        --service-cidr {{ k3s_service_cidr }} \
        {% for item in k3s_disable %} --disable {{ item }} {% endfor %} \
        --write-kubeconfig-mode=644 \
        --tls-san {{ ansible_host }} \
        --tls-san {{ k3s_api_endpoint }}" \
      sh -
  args:
    creates: /usr/local/bin/k3s

- name: Create systemd override directory
  file:
    path: /etc/systemd/system/k3s.service.d
    state: directory
    mode: "0755"

- name: Extend systemd startup timeout for etcd join
  copy:
    dest: /etc/systemd/system/k3s.service.d/timeout.conf
    content: |
      [Service]
      TimeoutStartSec=300
    mode: "0644"
  register: k3s_override

- name: Reload systemd daemon
  systemd:
    daemon_reload: true
  when: k3s_override.changed

- name: Enable and start k3s
  systemd:
    name: k3s
    enabled: true
    state: started

- name: Wait for node to join cluster
  command: >-
    kubectl get node {{ ansible_hostname }}
    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  register: node_ready
  retries: 36
  delay: 10
  until: node_ready.stdout == "True"
  changed_when: false
  delegate_to: "{{ groups['k3s_primary'][0] }}"
  become: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
