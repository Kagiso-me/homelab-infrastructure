name: flux-local diff

on:
  pull_request:
    branches:
      - main
    paths:
      - "platform/**"
      - "apps/**"
      - "clusters/**"

jobs:
  flux-local-diff:
    name: flux-local diff
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flux-local
        run: |
          pip install flux-local

      - name: Run flux-local diff
        id: diff
        run: |
          DIFF_OUTPUT=$(flux-local diff kustomization --path clusters/homelab 2>&1 || true)
          echo "diff_output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post diff as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const diff = `${{ steps.diff.outputs.diff_output }}`;
            const body = diff.trim().length > 0
              ? `### flux-local diff\n\n\`\`\`diff\n${diff}\n\`\`\``
              : `### flux-local diff\n\nNo Kustomization changes detected.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              (c) =>
                c.user.login === "github-actions[bot]" &&
                c.body.startsWith("### flux-local diff")
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
