name: Validate & Health Check

# PR validation — gates merge on static analysis and live cluster diff.
# Post-merge health check — confirms Flux reconciled successfully.
#
# Jobs (on pull_request to main — infra paths only):
#   validate     — kubeconform + kustomize build + pluto (GitHub-hosted, no cluster access)
#   cluster-diff — flux diff posted as collapsible PR comment (self-hosted, varys)
#
# Jobs (on push to main — infra paths, after merge):
#   health-check — Flux reconcile + kustomization Ready + Traefik smoke test (self-hosted, varys)
#
# Required GitHub repository secrets:
#   KUBECONFIG — raw kubeconfig for prod cluster (server = 10.0.10.100:6443, NOT base64-encoded)
#
# Branch protection on main:
#   Required status checks: validate, cluster-diff
#   No reviewer required (solo operator) — auto-merge enabled for convenience
#
# Self-hosted runner: installed on varys (10.0.10.10) as a systemd service.
# Labels: [self-hosted, linux, homelab]
# Pre-installed tools: kubectl, flux, kubeconform, kustomize, pluto, gh
# See docs/guides/04-Flux-GitOps.md for full runner setup instructions.

on:
  pull_request:
    branches: [main]
    # No paths filter — workflow must always run so the required status check
    # is always reported. Non-infra PRs exit early via the 'changed-files' step.
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "platform/**"
      - "clusters/**"
      - "ansible/**"

jobs:
  # ─── PR Job 1: Static validation ──────────────────────────────────────────
  # Runs on GitHub-hosted runner — no cluster access required.
  # Catches: schema errors, broken kustomize overlays, deprecated API versions.
  validate:
    name: Validate manifests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Check for infra file changes
        id: changed
        run: |
          git fetch origin main --depth=1
          CHANGED=$(git diff --name-only origin/main...HEAD | grep -E '^(apps|platform|clusters|ansible)/' || true)
          if [ -z "$CHANGED" ]; then
            echo "No infra files changed — skipping validation."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install kubeconform
        if: steps.changed.outputs.skip != 'true'
        run: |
          curl -sSL \
            "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform
          chmod +x /usr/local/bin/kubeconform

      - name: Install kustomize
        if: steps.changed.outputs.skip != 'true'
        run: |
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kustomize
          chmod +x /usr/local/bin/kustomize

      - name: Install pluto
        if: steps.changed.outputs.skip != 'true'
        run: |
          PLUTO_VERSION=$(curl -s https://api.github.com/repos/FairwindsOps/pluto/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4)
          curl -sSL \
            "https://github.com/FairwindsOps/pluto/releases/download/${PLUTO_VERSION}/pluto_${PLUTO_VERSION#v}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin pluto
          chmod +x /usr/local/bin/pluto

      - name: Validate with kubeconform
        if: steps.changed.outputs.skip != 'true'
        run: |
          find platform/ apps/ clusters/ \
            -type f \( -name "*.yaml" -o -name "*.yml" \) \
            ! -name "gotk-components.yaml" \
          | xargs kubeconform \
              -strict \
              -ignore-missing-schemas \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              -summary

      - name: Kustomize build — all Flux entrypoints
        if: steps.changed.outputs.skip != 'true'
        run: |
          KUSTOMIZE_PATHS=(
            "clusters/prod/flux-system"
            "platform/networking"
            "platform/networking/metallb-config"
            "platform/networking/traefik-config"
            "platform/security"
            "platform/security/cluster-issuers"
            "platform/namespaces"
            "platform/observability"
            "platform/observability/observability-config"
            "platform/observability/daily-digest"
            "platform/storage"
            "platform/backup"
            "platform/backup/velero-config"
            "platform/databases"
            "platform/upgrade"
            "platform/upgrade/upgrade-plans"
            "platform/security/crowdsec"
            "platform/security/authentik"
            "apps/prod"
          )

          for path in "${KUSTOMIZE_PATHS[@]}"; do
            echo "--- ${path} ---"
            kustomize build "${path}" > /dev/null
          done

      - name: Verify HelmRelease chart versions exist in repositories
        if: steps.changed.outputs.skip != 'true'
        run: |
          python3 << 'EOF'
          import sys, glob, yaml, urllib.request

          repo_urls = {}
          for f in glob.glob("**/*.yaml", recursive=True):
              if "gotk-components" in f:
                  continue
              try:
                  doc = yaml.safe_load(open(f))
                  if doc and doc.get("kind") == "HelmRepository":
                      repo_urls[doc["metadata"]["name"]] = doc["spec"]["url"].rstrip("/")
              except Exception:
                  pass

          index_cache = {}
          errors = []

          for f in sorted(glob.glob("**/*.yaml", recursive=True)):
              if "gotk-components" in f:
                  continue
              try:
                  doc = yaml.safe_load(open(f))
                  if not doc or doc.get("kind") != "HelmRelease":
                      continue
                  cs = doc["spec"]["chart"]["spec"]
                  chart, version, repo_name = cs["chart"], str(cs["version"]), cs["sourceRef"]["name"]
              except Exception:
                  continue

              # Skip semver ranges — Flux resolves these dynamically and they
              # don't correspond to a single publishable version (e.g. "4.0.x",
              # ">=0.9.0", "28.x"). Only pinned versions like "0.3.3" can be
              # checked against the index.
              import re
              if not re.fullmatch(r'\d+\.\d+\.\d+', version):
                  print(f"  ~ {chart}@{version} ({repo_name}) — semver range, skipping")
                  continue

              if repo_name not in repo_urls:
                  errors.append(f"{f}: HelmRepository '{repo_name}' not found in repo")
                  continue

              repo_url = repo_urls[repo_name]
              if repo_url not in index_cache:
                  try:
                      with urllib.request.urlopen(f"{repo_url}/index.yaml") as r:
                          index_cache[repo_url] = yaml.safe_load(r.read())
                  except Exception as e:
                      # Some chart repos (e.g. charts.goauthentik.io via Netlify/Cloudflare)
                      # block GitHub Actions IP ranges with 403. Treat fetch failures as a
                      # skip rather than a hard error — the chart version will be validated
                      # by Flux at reconcile time instead.
                      index_cache[repo_url] = None
                      print(f"  ~ {chart}@{version} ({repo_name}) — skipping (repo unreachable from CI: {e})")
                      continue

              if index_cache[repo_url] is None:
                  print(f"  ~ {chart}@{version} ({repo_name}) — skipping (repo unreachable from CI)")
                  continue

              available = [str(e.get("version", "")) for e in index_cache[repo_url].get("entries", {}).get(chart, [])]
              if version in available:
                  print(f"  ✓ {chart}@{version} ({repo_name})")
              else:
                  errors.append(
                      f"{f}: {chart}@{version} not found in '{repo_name}'.\n"
                      f"    Available: {', '.join(available[:5]) or 'none'}\n"
                      f"    Publish the chart before bumping the version reference."
                  )

          if errors:
              print("\nChart version validation FAILED:")
              for e in errors:
                  print(f"  ✗ {e}")
              sys.exit(1)

          print("All HelmRelease chart versions verified.")
          EOF

      - name: Check kustomize paths match Flux kustomizations
        if: steps.changed.outputs.skip != 'true'
        run: |
          # Paths registered in Flux kustomization objects
          GIT_PATHS=$(grep -h '^\s*path:\s\+\.' clusters/prod/infrastructure.yaml clusters/prod/apps.yaml \
            | awk '{print $2}' \
            | sed 's|^\./||' \
            | sort)

          # Paths validated in this workflow
          WORKFLOW_PATHS=$(printf '%s\n' \
            "clusters/prod/flux-system" \
            "platform/networking" \
            "platform/networking/metallb-config" \
            "platform/networking/traefik-config" \
            "platform/security" \
            "platform/security/cluster-issuers" \
            "platform/namespaces" \
            "platform/observability" \
            "platform/observability/observability-config" \
            "platform/observability/daily-digest" \
            "platform/storage" \
            "platform/backup" \
            "platform/backup/velero-config" \
            "platform/databases" \
            "platform/upgrade" \
            "platform/upgrade/upgrade-plans" \
            "platform/security/crowdsec" \
            "platform/security/authentik" \
            "apps/prod" \
            | sort)

          MISSING=$(comm -23 <(echo "$GIT_PATHS") <(echo "$WORKFLOW_PATHS"))
          if [ -n "$MISSING" ]; then
            echo "ERROR: Flux kustomization paths not covered by this workflow:"
            echo "$MISSING"
            echo "Add them to the KUSTOMIZE_PATHS list in this workflow."
            exit 1
          fi
          echo "All Flux kustomization paths are covered."

      - name: Check for deprecated Kubernetes APIs
        if: steps.changed.outputs.skip != 'true'
        run: |
          KUSTOMIZE_PATHS=(
            "clusters/prod/flux-system"
            "platform/networking"
            "platform/networking/metallb-config"
            "platform/networking/traefik-config"
            "platform/security"
            "platform/security/cluster-issuers"
            "platform/namespaces"
            "platform/observability"
            "platform/observability/observability-config"
            "platform/observability/daily-digest"
            "platform/storage"
            "platform/backup"
            "platform/backup/velero-config"
            "platform/databases"
            "platform/upgrade"
            "platform/upgrade/upgrade-plans"
            "platform/security/crowdsec"
            "platform/security/authentik"
            "apps/prod"
          )

          for path in "${KUSTOMIZE_PATHS[@]}"; do
            echo "--- ${path} ---"
            kustomize build "${path}" | pluto detect - || true
          done

  # ─── PR Job 2: Live cluster diff ──────────────────────────────────────────
  # Runs on self-hosted runner (bran, 10.0.10.10) — direct LAN access to prod.
  # Diffs the PR's manifests against the live cluster state.
  # Posts a collapsible summary as a PR comment so you see exactly what will change.
  cluster-diff:
    name: Cluster diff
    runs-on: [self-hosted, linux, homelab, bran-k3s]
    needs: validate
    if: github.event_name == 'pull_request'

    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Run flux diff and post PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT_FILE=$(mktemp)
          echo "## Cluster diff" >> "$COMMENT_FILE"
          echo "" >> "$COMMENT_FILE"
          echo "_Comparing PR manifests against live cluster state. Expand a section to see what will change._" >> "$COMMENT_FILE"
          echo "" >> "$COMMENT_FILE"

          HAS_DIFF=false

          KUSTOMIZATIONS=(
            apps
            platform-networking
            platform-networking-config
            platform-networking-tls
            platform-security
            platform-security-issuers
            platform-namespaces
            platform-observability
            platform-observability-config
            platform-observability-digest
            platform-databases
            platform-storage
            platform-backup
            platform-backup-config
            platform-crowdsec
            platform-authentik
            platform-upgrade
            platform-upgrade-plans
          )

          for ks in "${KUSTOMIZATIONS[@]}"; do
            KS_DIFF=$(flux diff kustomization "$ks" --namespace flux-system 2>&1) || true
            if [ -n "$KS_DIFF" ]; then
              HAS_DIFF=true
              echo "<details>" >> "$COMMENT_FILE"
              echo "<summary><code>$ks</code></summary>" >> "$COMMENT_FILE"
              echo "" >> "$COMMENT_FILE"
              echo '```diff' >> "$COMMENT_FILE"
              echo "$KS_DIFF" >> "$COMMENT_FILE"
              echo '```' >> "$COMMENT_FILE"
              echo "</details>" >> "$COMMENT_FILE"
              echo "" >> "$COMMENT_FILE"
            fi
          done

          if [ "$HAS_DIFF" = "false" ]; then
            echo "_No changes to cluster state detected._" >> "$COMMENT_FILE"
          fi

          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file "$COMMENT_FILE" \
            --repo "${{ github.repository }}"

  # ─── Post-merge: Production health check ──────────────────────────────────
  # Runs on self-hosted runner (bran) after every infra push to main.
  # Forces Flux to reconcile, waits for all kustomizations to be Ready,
  # then verifies Traefik is responding. Fails loudly if anything is wrong.
  health-check:
    name: Production health check
    runs-on: [self-hosted, linux, homelab, bran-k3s]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Trigger Flux reconcile
        run: |
          echo "Forcing Flux to pull latest commit from Git..."
          flux reconcile source git flux-system \
            --namespace flux-system \
            --timeout=60s

      - name: Wait for all kustomizations to be Ready
        run: |
          KUSTOMIZATIONS=(
            platform-networking
            platform-networking-config
            platform-networking-tls
            platform-security
            platform-security-issuers
            platform-namespaces
            platform-observability
            platform-observability-config
            platform-observability-digest
            platform-databases
            platform-storage
            platform-backup
            platform-backup-config
            platform-crowdsec
            platform-authentik
            platform-upgrade
            platform-upgrade-plans
            apps
          )
          for ks in "${KUSTOMIZATIONS[@]}"; do
            echo "Waiting for kustomization/${ks}..."
            kubectl wait kustomization/"${ks}" \
              --for=condition=ready \
              --timeout=10m \
              --namespace flux-system
          done
          echo "All kustomizations Ready."

      - name: Check for unhealthy pods
        run: |
          NAMESPACES="flux-system ingress cert-manager monitoring storage velero metallb-system auth crowdsec databases apps"
          UNHEALTHY=""
          for ns in $NAMESPACES; do
            PODS=$(kubectl get pods -n "$ns" --no-headers 2>/dev/null \
              | grep -Ev 'Running|Completed|Succeeded' || true)
            if [ -n "$PODS" ]; then
              UNHEALTHY="${UNHEALTHY}--- ${ns} ---\n${PODS}\n"
            fi
          done
          if [ -n "$UNHEALTHY" ]; then
            echo "Unhealthy pods found:"
            echo -e "$UNHEALTHY"
            exit 1
          fi
          echo "All pods healthy."

      - name: Smoke test — Traefik responds
        run: |
          HTTP_CODE=$(curl -s --max-time 15 \
            --write-out '%{http_code}' --output /dev/null \
            http://10.0.10.110)
          if [ "$HTTP_CODE" = "000" ]; then
            echo "ERROR: Traefik not reachable at 10.0.10.110 (connection refused or timeout)"
            exit 1
          fi
          echo "Traefik responding at 10.0.10.110 — HTTP ${HTTP_CODE}"

      - name: Write step summary
        if: always()
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "### Production health check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${SHORT_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Flux:** all kustomizations reconciled" >> "$GITHUB_STEP_SUMMARY"
          echo "**Traefik:** responding at 10.0.10.110" >> "$GITHUB_STEP_SUMMARY"
