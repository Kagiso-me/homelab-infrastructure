---
# Docker host deployment pipeline
#
# Triggers on push to main when compose files change. The self-hosted runner
# (varys, 10.0.10.10) SSHes to docked (10.0.10.20) via Ansible and reconciles
# all Docker stacks to match what is in git.
#
# This gives the Docker host the same GitOps model as the k3s cluster:
#   git push → CI → Ansible → Docker host matches repo
#
# Manual trigger: Actions → docker-deploy → Run workflow
#
# Required: SSH key from varys to docked must be established
#   (runner user's ~/.ssh/id_ed25519 trusted by kagiso@10.0.10.20)

name: docker-deploy

on:
  pull_request:
    branches: [main]
    paths:
      - 'docker/compose/**'
      - 'docker/config/**'
      - 'docker/scripts/**'
      - 'ansible/playbooks/docker/**'
  push:
    branches: [main]
    paths:
      - 'docker/compose/**'
      - 'docker/config/**'
  workflow_dispatch:
    inputs:
      target_stack:
        description: 'Stack to deploy (all / media-stack / proxy-stack / monitoring-stack)'
        required: false
        default: 'all'

jobs:
  validate:
    name: validate-docker-config
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Prepare CI env file
        run: cp docker/compose/.env.example docker/compose/.env

      - name: Validate compose files
        run: |
          docker compose --env-file docker/compose/.env -f docker/compose/media-stack.yml config -q
          docker compose --env-file docker/compose/.env -f docker/compose/proxy-stack.yml config -q
          docker compose --env-file docker/compose/.env -f docker/compose/monitoring-stack.yml config -q

      - name: Validate backup and restore scripts
        run: |
          bash -n docker/scripts/backup_docker.sh
          bash -n docker/scripts/restore_docker.sh

  deploy:
    name: deploy-docker-host
    runs-on: [self-hosted, linux, homelab]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Deploy Docker stacks
        run: |
          ansible-playbook \
            -i ansible/inventory/homelab.yml \
            ansible/playbooks/docker/deploy.yml \
            -e target_stack=${{ github.event.inputs.target_stack || 'all' }}

      - name: Verify containers are running
        run: |
          ansible docker -i ansible/inventory/homelab.yml \
            -m shell \
            -a "docker ps --filter status=running"
