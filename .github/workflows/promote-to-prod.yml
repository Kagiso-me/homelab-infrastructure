name: Promote to Production

# Triggered on every push to main that touches cluster-relevant paths.
# Pipeline is fully gated — staging must be healthy before prod is ever touched.
#
# Jobs:
#   validate       — runs on GitHub-hosted ubuntu-latest (no cluster access needed)
#   staging-health — runs on self-hosted runner (direct LAN access to 10.0.10.x)
#   promote        — runs on GitHub-hosted ubuntu-latest (git operations only)
#   prod-health    — runs on self-hosted runner (direct LAN access to 10.0.10.x)
#
# Required GitHub repository secrets:
#   STAGING_KUBECONFIG  — kubeconfig for staging cluster (server = 10.0.10.31:6443)
#   PROD_KUBECONFIG     — kubeconfig for prod cluster    (server = 10.0.10.11:6443)
#
# Self-hosted runner: install on bran (10.0.10.10) — see docs/adr/ADR-007-self-hosted-runners.md
# See docs/guides/04-Flux-GitOps.md for full setup instructions.

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "platform/**"
      - "clusters/staging/**"

jobs:
  # ─── Stage 1: Manifest validation ─────────────────────────────────────────
  validate:
    name: Validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="v0.6.7"
          curl -sSL \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform
          chmod +x /usr/local/bin/kubeconform

      - name: Install kustomize
        run: |
          curl -sSL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/

      - name: Validate with kubeconform
        run: |
          find platform/ apps/ clusters/ \
            -type f \( -name "*.yaml" -o -name "*.yml" \) \
            ! -name "gotk-components.yaml" \
          | xargs kubeconform \
              -strict \
              -ignore-missing-schemas \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              -summary

      - name: Kustomize build — apps/prod
        run: kustomize build apps/prod

      - name: Kustomize build — apps/staging
        run: kustomize build apps/staging

  # ─── Stage 2: Staging health check ────────────────────────────────────────
  # Runs on a self-hosted runner (bran, 10.0.10.10) which has direct LAN access
  # to the staging cluster. No VPN required.
  # Waits for staging to sync this specific commit, then verifies all
  # kustomizations are Ready and Traefik responds.
  # Promotion is blocked if staging is unhealthy.
  staging-health:
    name: Staging health check
    runs-on: [self-hosted, linux, homelab]
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Configure staging kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STAGING_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Wait for staging to sync this commit
        run: |
          EXPECTED_SHA=$(git rev-parse HEAD)
          echo "Triggering immediate Flux source reconcile..."
          flux reconcile source git flux-system -n flux-system --timeout=60s || true
          echo "Waiting for staging to sync commit ${EXPECTED_SHA}..."
          timeout 180 bash -c "
            until kubectl get gitrepository flux-system -n flux-system \
              -o jsonpath='{.status.artifact.revision}' 2>/dev/null \
              | grep -q '${EXPECTED_SHA}'; do
              echo '  still waiting...'
              sleep 10
            done
          "
          echo "Staging synced ${EXPECTED_SHA}"

      - name: Wait for all staging kustomizations to be Ready
        run: |
          for ks in platform-networking platform-security platform-namespaces platform-storage apps; do
            echo "Waiting for kustomization/${ks}..."
            kubectl wait kustomization/${ks} \
              --for=condition=ready \
              --timeout=5m \
              -n flux-system
          done

      - name: Check for unhealthy pods
        run: |
          UNHEALTHY=$(kubectl get pods -A --no-headers \
            | grep -Ev 'Running|Completed|Succeeded' || true)
          if [ -n "$UNHEALTHY" ]; then
            echo "Unhealthy pods found on staging:"
            echo "$UNHEALTHY"
            exit 1
          fi
          echo "All staging pods healthy"

      - name: Smoke test — Traefik responds
        run: |
          TRAEFIK_IP=$(kubectl get svc traefik -n ingress \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "Staging Traefik IP: ${TRAEFIK_IP}"
          HTTP_CODE=$(curl -s --max-time 15 \
            --write-out '%{http_code}' --output /dev/null \
            "http://${TRAEFIK_IP}")
          if [ "$HTTP_CODE" = "000" ]; then
            echo "ERROR: Staging Traefik not reachable (connection refused or timeout)"
            exit 1
          fi
          echo "Staging Traefik responding: HTTP ${HTTP_CODE}"

  # ─── Stage 3: Promote to prod branch ──────────────────────────────────────
  promote:
    name: Promote main → prod
    runs-on: ubuntu-latest
    needs: staging-health
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge main into prod branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin prod 2>/dev/null || true
          git checkout prod 2>/dev/null || git checkout -b prod

          git merge main --no-edit -m "chore: promote main → prod [$(git rev-parse --short main)]"
          git push origin prod

      - name: Summary
        run: |
          SHORT_SHA=$(git rev-parse --short main)
          echo "### Promoted to production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${SHORT_SHA}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`prod\`" >> $GITHUB_STEP_SUMMARY
          echo "**Flux prod cluster will reconcile within 1 minute.**" >> $GITHUB_STEP_SUMMARY

  # ─── Stage 4: Production health check ─────────────────────────────────────
  # Runs on a self-hosted runner (bran, 10.0.10.10) which has direct LAN access
  # to the prod cluster. Waits for Flux to reconcile the new prod branch commit.
  # Fails the run (and alerts) if prod is unhealthy.
  prod-health:
    name: Production health check
    runs-on: [self-hosted, linux, homelab]
    needs: promote
    steps:
      - uses: actions/checkout@v4
        with:
          ref: prod

      - name: Configure prod kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.PROD_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Wait for prod to sync the promoted commit
        run: |
          EXPECTED_SHA=$(git rev-parse HEAD)
          echo "Waiting for prod to sync commit ${EXPECTED_SHA}..."
          timeout 180 bash -c "
            until kubectl get gitrepository flux-system -n flux-system \
              -o jsonpath='{.status.artifact.revision}' 2>/dev/null \
              | grep -q '${EXPECTED_SHA}'; do
              echo '  still waiting...'
              sleep 15
            done
          "
          echo "Prod synced ${EXPECTED_SHA}"

      - name: Wait for all prod kustomizations to be Ready
        run: |
          for ks in platform-networking platform-security platform-namespaces \
                    platform-storage platform-observability apps; do
            echo "Waiting for kustomization/${ks}..."
            kubectl wait kustomization/${ks} \
              --for=condition=ready \
              --timeout=10m \
              -n flux-system
          done

      - name: Check for unhealthy pods
        run: |
          UNHEALTHY=$(kubectl get pods -A --no-headers \
            | grep -Ev 'Running|Completed|Succeeded' || true)
          if [ -n "$UNHEALTHY" ]; then
            echo "Unhealthy pods found on prod:"
            echo "$UNHEALTHY"
            exit 1
          fi
          echo "All prod pods healthy"

      - name: Smoke test — Traefik responds
        run: |
          HTTP_CODE=$(curl -s --max-time 15 \
            --write-out '%{http_code}' --output /dev/null \
            http://10.0.10.110)
          if [ "$HTTP_CODE" = "000" ]; then
            echo "ERROR: Prod Traefik not reachable"
            exit 1
          fi
          echo "Prod Traefik responding: HTTP ${HTTP_CODE}"
