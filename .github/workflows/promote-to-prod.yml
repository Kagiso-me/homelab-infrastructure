name: Promote to Production

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "platform/**"
      - "clusters/staging/**"

jobs:
  # ─── Stage 1: Manifest validation ────────────────────────────────────────
  validate:
    name: Validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz && sudo mv kubeconform /usr/local/bin/

      - name: Install kustomize
        run: |
          curl -sL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/

      - name: Validate with kubeconform
        run: |
          find platform/ apps/ clusters/ \
            -name "*.yaml" -o -name "*.yml" | \
          xargs kubeconform \
            -strict \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -summary

      - name: Kustomize build — prod
        run: kustomize build apps/prod

      - name: Kustomize build — staging
        run: kustomize build apps/staging

  # ─── Stage 2: Staging health check (active once staging cluster exists) ──
  staging-health:
    name: Staging health check
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Check staging cluster availability
        id: staging-check
        run: |
          # This step is a no-op until the staging cluster is bootstrapped.
          # Once the staging cluster exists, replace this block with:
          #
          #   - name: Configure kubeconfig for staging
          #     run: |
          #       mkdir -p ~/.kube
          #       echo "${{ secrets.STAGING_KUBECONFIG }}" > ~/.kube/config
          #
          #   - name: Wait for Flux staging reconciliation
          #     run: |
          #       kubectl wait kustomization/apps \
          #         --for=condition=ready \
          #         --timeout=5m \
          #         -n flux-system
          #
          #   - name: Check all pods healthy
          #     run: |
          #       kubectl get pods -A --field-selector=status.phase!=Running,status.phase!=Succeeded \
          #         | grep -v "Completed" && exit 1 || exit 0
          #
          #   - name: Smoke test — Traefik responds
          #     run: curl -sf http://10.0.10.110/ping || exit 1

          echo "Staging cluster not yet provisioned — skipping health check."
          echo "Promotion will proceed directly. Add STAGING_KUBECONFIG secret when staging is ready."

  # ─── Stage 3: Promote to prod branch ─────────────────────────────────────
  promote:
    name: Promote main → prod
    runs-on: ubuntu-latest
    needs: staging-health
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge main into prod branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create prod branch if it doesn't exist
          git fetch origin prod 2>/dev/null || true
          git checkout prod 2>/dev/null || git checkout -b prod

          git merge main --no-edit -m "chore: promote main → prod [$(git rev-parse --short main)]"
          git push origin prod

      - name: Summary
        run: |
          SHORT_SHA=$(git rev-parse --short main)
          echo "### Promoted to production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${SHORT_SHA}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`prod\`" >> $GITHUB_STEP_SUMMARY
          echo "**Flux prod cluster will reconcile within 1 minute.**" >> $GITHUB_STEP_SUMMARY

  # ─── Stage 4: Production health check ────────────────────────────────────
  prod-health:
    name: Production health check
    runs-on: ubuntu-latest
    needs: promote
    steps:
      - name: Verify prod cluster health
        run: |
          # Once you add PROD_KUBECONFIG as a GitHub secret, replace with:
          #
          #   mkdir -p ~/.kube
          #   echo "${{ secrets.PROD_KUBECONFIG }}" > ~/.kube/config
          #   kubectl wait kustomization/apps \
          #     --for=condition=ready --timeout=10m -n flux-system
          #   kubectl get pods -A | grep -v Running | grep -v Completed | grep -v NAME \
          #     && echo "Unhealthy pods found" && exit 1 || echo "All pods healthy"

          echo "Add PROD_KUBECONFIG secret to enable production health checks."
          echo "See docs/guides/04-Flux-GitOps.md for setup instructions."
