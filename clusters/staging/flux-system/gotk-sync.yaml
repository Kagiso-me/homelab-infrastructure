# Staging cluster Flux sync configuration.
# This cluster watches the `main` branch — all changes land here first.
# Production cluster watches the `prod` branch (promoted via GitHub Actions).
#
# To bootstrap the staging cluster (single-node k3s on Docker NUC):
#   kubectl create namespace flux-system
#   kubectl create secret generic sops-age \
#     --namespace=flux-system \
#     --from-file=age.agekey=~/.config/sops/age/keys.txt
#   flux bootstrap git \
#     --url=ssh://git@github.com/Kagiso-me/homelab-infrastructure.git \
#     --branch=main \
#     --path=clusters/staging \
#     --private-key-file=$HOME/.ssh/flux_deploy_key
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: main
  secretRef:
    name: flux-system
  url: ssh://git@github.com/Kagiso-me/homelab-infrastructure
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./clusters/staging
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
