# Staging platform — mirrors prod with reduced resource limits.
# Staging uses the letsencrypt-staging ClusterIssuer (already defined in platform/security).
# MetalLB IP pool for staging: 10.0.10.190-10.0.10.199 (patched via platform-networking-config).
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-networking
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/networking
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
# Separate kustomization for MetalLB CRs (IPAddressPool, L2Advertisement).
# Must depend on platform-networking so MetalLB CRDs exist before dry-run.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-networking-config
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/networking/metallb-config
  prune: true
  dependsOn:
    - name: platform-networking
  patches:
    - patch: |
        - op: replace
          path: /spec/addresses/0
          value: 10.0.10.190-10.0.10.199
      target:
        kind: IPAddressPool
        name: homelab-pool
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-security
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/security
  prune: true
  wait: true
  dependsOn:
    - name: platform-networking
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-namespaces
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/namespaces
  prune: true
  dependsOn:
    - name: platform-networking
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-observability
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/observability
  prune: true
  dependsOn:
    - name: platform-security
    - name: platform-namespaces
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-storage
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/storage
  prune: true
  dependsOn:
    - name: platform-namespaces
  decryption:
    provider: sops
    secretRef:
      name: sops-age
