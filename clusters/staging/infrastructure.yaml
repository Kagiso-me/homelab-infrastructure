# Staging platform — mirrors prod with reduced resource limits.
# Staging uses the letsencrypt-staging ClusterIssuer (defined in platform-security-issuers).
# MetalLB IP pool for staging: 10.0.10.190-10.0.10.199 (patched via platform-networking-config).
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-networking
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/networking
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  patches:
    - patch: |
        - op: replace
          path: /spec/values/service/annotations/metallb.universe.tf~1loadBalancerIPs
          value: "10.0.10.190"
      target:
        kind: HelmRelease
        name: traefik
---
# Traefik CRs (Middleware, TLSStore) + wildcard Certificate.
# Split from platform-networking so Traefik and cert-manager CRDs exist before dry-run.
# Depends on platform-networking (Traefik CRDs) and platform-security (cert-manager CRDs).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-networking-tls
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/networking/traefik-config
  prune: true
  dependsOn:
    - name: platform-networking
    - name: platform-security-issuers
  patches:
    - patch: |
        - op: replace
          path: /spec/issuerRef/name
          value: letsencrypt-staging
      target:
        kind: Certificate
        name: wildcard-kagiso-me
---
# ClusterIssuers (letsencrypt-prod, letsencrypt-staging, internal-ca).
# Split from platform-security so cert-manager CRDs exist before dry-run.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-security-issuers
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/security/cluster-issuers
  prune: true
  dependsOn:
    - name: platform-security
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
# Separate kustomization for MetalLB CRs (IPAddressPool, L2Advertisement).
# Must depend on platform-networking so MetalLB CRDs exist before dry-run.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-networking-config
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/networking/metallb-config
  prune: true
  dependsOn:
    - name: platform-networking
  patches:
    - patch: |
        - op: replace
          path: /spec/addresses/0
          value: 10.0.10.190-10.0.10.199
      target:
        kind: IPAddressPool
        name: homelab-pool
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-security
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/security
  prune: true
  wait: true
  dependsOn:
    - name: platform-networking
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-namespaces
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/namespaces
  prune: true
  dependsOn:
    - name: platform-networking
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-observability
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/observability
  prune: true
  wait: true
  dependsOn:
    - name: platform-security
    - name: platform-namespaces
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
# AlertmanagerConfig, PrometheusRules — split so monitoring CRDs exist before dry-run.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-observability-config
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/observability/observability-config
  prune: true
  dependsOn:
    - name: platform-observability
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-storage
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/storage
  prune: true
  dependsOn:
    - name: platform-namespaces
  decryption:
    provider: sops
    secretRef:
      name: sops-age
