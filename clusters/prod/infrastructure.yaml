---
# Platform Networking — MetalLB, Traefik (no dependencies, deploys first)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-networking
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/networking
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
# MetalLB CRs (IPAddressPool, L2Advertisement) — split so MetalLB CRDs exist before dry-run.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-networking-config
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/networking/metallb-config
  prune: true
  dependsOn:
    - name: platform-networking
---
# Traefik CRs (Middleware, TLSStore) + wildcard Certificate.
# Split from platform-networking so Traefik and cert-manager CRDs exist before dry-run.
# Depends on platform-networking (Traefik CRDs) and platform-security (cert-manager CRDs).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-networking-tls
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/networking/traefik-config
  prune: true
  dependsOn:
    - name: platform-networking
    - name: platform-security-issuers
---
# ClusterIssuers (letsencrypt-prod, letsencrypt-staging, internal-ca).
# Split from platform-security so cert-manager CRDs exist before dry-run.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-security-issuers
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/security/cluster-issuers
  prune: true
  dependsOn:
    - name: platform-security
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
# Platform Security — cert-manager + ClusterIssuers (depends on networking for ingress)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-security
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/security
  prune: true
  wait: true
  dependsOn:
    - name: platform-networking
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
# Platform Namespaces — creates all platform namespaces before workloads deploy
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-namespaces
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/namespaces
  prune: true
  dependsOn:
    - name: platform-networking
---
# Platform Observability — kube-prometheus-stack, Loki, Alertmanager config
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-observability
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/observability
  prune: true
  wait: true
  dependsOn:
    - name: platform-security
    - name: platform-namespaces
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
# AlertmanagerConfig, PrometheusRules — split so monitoring CRDs exist before dry-run.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-observability-config
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/observability/observability-config
  prune: true
  dependsOn:
    - name: platform-observability
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
# Platform Storage — NFS provisioner, StorageClasses
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-storage
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/storage
  prune: true
  dependsOn:
    - name: platform-namespaces
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
# Platform Backup — Velero with MinIO on TrueNAS
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-backup
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/backup
  prune: true
  wait: true
  dependsOn:
    - name: platform-storage
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
# Velero CRs (BackupStorageLocation, Schedule) — split so Velero CRDs exist before dry-run.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-backup-config
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/backup/velero-config
  prune: true
  dependsOn:
    - name: platform-backup
---
# Central Databases — PostgreSQL and Redis, both pinned to control plane.
# Depends on platform-namespaces (databases namespace must exist first).
# See ADR-011.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-databases
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/databases
  prune: true
  wait: true
  dependsOn:
    - name: platform-namespaces
    - name: platform-storage
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
# Platform Upgrade — k3s System Upgrade Controller
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-upgrade
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/upgrade
  prune: true
  wait: true
  dependsOn:
    - name: platform-networking
---
# k3s upgrade Plans — split so upgrade-controller CRDs exist before dry-run.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-upgrade-plans
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/upgrade/upgrade-plans
  prune: true
  dependsOn:
    - name: platform-upgrade
---
# CrowdSec — community threat intelligence + Traefik ForwardAuth bouncer.
# Deploys LAPI (decision engine), agent (log parser DaemonSet), and bouncer.
# Must be deployed before apps so traffic flows through the ForwardAuth check.
# Also must deploy before platform-networking applies the global entrypoint
# middleware — see platform/networking/traefik/helmrelease.yaml.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-crowdsec
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/security/crowdsec
  prune: true
  wait: true
  dependsOn:
    - name: platform-namespaces
    - name: platform-networking
    - name: platform-storage
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
# Authentik — SSO / identity provider for all cluster applications.
# Must be fully ready before any app that delegates authentication to it.
# Depends on namespaces (auth ns), networking-tls (IngressRoute + cert), storage.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-authentik
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/security/authentik
  prune: true
  wait: true
  dependsOn:
    - name: platform-namespaces
    - name: platform-networking-tls
    - name: platform-storage
  decryption:
    provider: sops
    secretRef:
      name: sops-age
