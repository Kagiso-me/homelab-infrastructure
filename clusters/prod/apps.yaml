---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/prod
  prune: true
  dependsOn:
    - name: platform-networking-tls
    - name: platform-observability
    - name: platform-storage
    - name: platform-authentik
    - name: platform-crowdsec
  decryption:
    provider: sops
    secretRef:
      name: sops-age
