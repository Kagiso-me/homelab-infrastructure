# Production cluster Flux sync configuration.
# This cluster watches the `prod` branch — changes reach here only after staging validation.
# Staging cluster watches the `main` branch (see clusters/staging/flux-system/gotk-sync.yaml).
#
# Promotion workflow:
#   1. Commit and push to `main` → staging reconciles and validates
#   2. When staging is healthy, push main commits to prod:
#      git push origin main:prod
#   3. Prod cluster detects the new commit on `prod` branch and reconciles
#
# To re-bootstrap the prod cluster after a rebuild:
#   cd ~/homelab-infrastructure/ansible
#   ansible-playbook -i inventory/homelab.yml playbooks/lifecycle/install-platform.yml
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: prod
  secretRef:
    name: flux-system
  url: ssh://git@github.com/Kagiso-me/homelab-infrastructure
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./clusters/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
