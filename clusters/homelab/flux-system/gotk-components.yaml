# gotk-components.yaml
#
# This file is generated by `flux bootstrap` and MUST NOT be edited manually.
# It contains all Flux controller deployments, CRDs, and RBAC:
#   source-controller, kustomize-controller, helm-controller, notification-controller
#
# During initial cluster setup, run:
#   flux bootstrap git \
#     --url=ssh://git@github.com/<YOUR-USER>/homelab-infrastructure.git \
#     --branch=main \
#     --path=clusters/homelab \
#     --private-key-file=$HOME/.ssh/flux_deploy_key
#
# flux bootstrap will overwrite this file with the real controller manifests
# and commit the result back to the repository automatically.
#
# This placeholder exists so that clusters/homelab/flux-system/kustomization.yaml
# can reference it without causing a file-not-found error in the IDE or linters.
# On a live cluster, the real gotk-components.yaml from flux bootstrap takes precedence.
